name: 每日業績快照

on:
  schedule:
    # 每天 20:00 Asia/Taipei = 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch: # 允許手動觸發測試

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 抓取 GSheet 快照
        run: python scripts/fetch_perf_snapshot.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/perf-snapshots.json
          if git diff --cached --quiet; then
            echo "無變動，跳過 commit"
            exit 0
          fi
          TAIPEI_TIME=$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')
          git commit -m "auto: 業績快照 ${TAIPEI_TIME}"
          git push
