<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>窩的家 行動辦公室</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="app"></div>

  <script type="module">
    import { ensureAuth, renderUserBadge, isManager } from './js/shared.js';

    const app = document.getElementById('app');
    const user = await ensureAuth(app);

    const cards = [
      { title: '開發募集', desc: '新增/編輯開發屋主、591 物件管理', icon: '📞', href: 'outreach.html', color: 'blue' },
      { title: '租賃物件', desc: '物件總表新增、編輯、查詢', icon: '🏠', href: 'property.html', color: 'emerald', wip: true },
      { title: '定金 / 斡旋', desc: '定金收據、斡旋金紀錄', icon: '💰', href: 'earnest.html', color: 'amber' },
      { title: '租押金 / 服務費', desc: '簽約時的租押金、服務費收據', icon: '📝', href: 'deposit.html', color: 'rose', wip: true },
    ];

    app.innerHTML = `
      <div class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
          <div>
            <h1 class="text-2xl font-bold text-slate-900">🏠 窩的家 行動辦公室</h1>
            <p class="text-slate-500 text-sm mt-1">${isManager(user.name) ? '管理層檢視' : user.name + '（' + user.dept + '）'}</p>
          </div>
          <div id="userBadge"></div>
        </div>

        <!-- Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          ${cards.map(c => `
            <a href="${c.wip ? 'javascript:void(0)' : c.href}" class="relative bg-white rounded-2xl p-6 shadow-sm border border-slate-100 ${c.wip ? 'opacity-60 cursor-not-allowed' : 'hover:shadow-md hover:border-' + c.color + '-200'} transition group">
              ${c.wip ? '<span class="absolute top-3 right-3 text-xs bg-slate-200 text-slate-500 px-2 py-0.5 rounded-full">施工中</span>' : ''}
              <div class="text-3xl mb-3">${c.icon}</div>
              <h2 class="text-lg font-bold text-slate-900 ${c.wip ? '' : 'group-hover:text-' + c.color + '-600'} transition">${c.title}</h2>
              <p class="text-slate-500 text-sm mt-1">${c.desc}</p>
            </a>
          `).join('')}
        </div>
      </div>`;

    renderUserBadge(document.getElementById('userBadge'), user);
  </script>
</body>
</html>
