<script>
'use strict';

// ================= 真實 Ragic 對照（2026-07-22 接 API 版） =================
// 時間(小時) 11 個真實選項（agent-browser 登入 Design Mode 實測讀出，非猜測；中段跳過
// 12:00-13:00 午休）。案名/地址 datalist 之外，這裡取代原本 07:00-20:00 numeric 假想時段。
const WORKLOG_HOURS = [
  '0900之前', '09:00-10:00', '10:00-11:00', '11:00-12:00', '13:00-14:00',
  '14:00-15:00', '15:00-16:00', '16:00-17:00', '17:00-18:00', '18:00-19:00', '19:00之後',
];
// 項目選單依角色分流（2026-07-22 規格書 P2 補充落地，2026-07-23 實作）。工務 9 個既有選項
// 與租賃 13 個選項（取自既有 [[每日行程點名]] property-data-kept/9 fid 1000610，運作 4 個月
// 無問題的封閉選項）已一併加進 Ragic「項目」欄位(maintenance-management/9 fid 1003097)下拉，
// 兩份清單必須與 Worker `WORKLOG_CATEGORY_SET`（src/index.js）保持同步。
const CATEGORIES_WORK = ['場勘', '租客聯繫', '屋主聯繫', '報價', '廠商聯繫', '驗收', '內部會議', '文書作業', '其他'];
const CATEGORIES_RENTAL = ['開發', '委託', '帶看', '簽約', '修繕', '續約', '議價', '請假', '休假', '上課', '活動', '上廣告', '退租點交'];
// 「已選定類別」渲染（entry.category 已有值時）用這份固定聯集順序，讓已選中的按鈕在任何角色
// 底下都找得到、位置穩定不隨分組跳動；「新列尚未選類別」時改用下面 orderedCategoriesForNewRow()
// 依角色分組排序。
const CATEGORIES = [...CATEGORIES_WORK, ...CATEGORIES_RENTAL];
const OTHER_CATEGORY = '其他';
// 判斷依據：驗收／廠商聯繫這兩類最常伴隨修繕原因；規格書未逐字列出名單，此為介面設計判斷，非資料庫定案。
// 2026-07-23 補：租賃分類新增「修繕」語意上就是報修相關，一併加入，否則恩廷選「修繕」會完全
// 打不開報修原因欄位（此欄無其他手動展開方式）——這是本次新增類別直接造成的功能缺口，非額外擴張範圍。
const REPAIR_RELATED = new Set(['驗收', '廠商聯繫', '修繕']);
// ================= API 串接（有 token 才走真實 API，沒有 token 保留原本本機模擬方便開發除錯） =================
const WORKER_BASE = 'https://wuohome-ragic-proxy.wuohome.workers.dev';
function getUrlToken() {
  try { return new URLSearchParams(location.search).get('token') || ''; } catch { return ''; }
}
const API_TOKEN = getUrlToken();
const API_MODE = Boolean(API_TOKEN);
// 2026-07-23：真實身分（{role,name}）一律由 worklogListMine 回應的 viewer 欄位取得，不由前端
// 自行宣告——token 對應誰、是不是主管，只有 Worker 說了算（比照既有 P5/Group T 手法）。
let IDENTITY = null;

// 把 API 回傳的單筆紀錄（category/note 為 flat 字串）還原成前端表單用的 entry 形狀。
// 「其他」類別的自訂文字在送出時被前端塞進 note 開頭的【】，讀回來要拆解還原，
// 否則主管總覽／今天的紀錄會把自訂文字誤當成一般紀錄內容顯示。
function parseApiEntry(rec) {
  let category = rec.category || '';
  let otherCategoryText = '';
  let note = rec.note || '';
  if (category === OTHER_CATEGORY) {
    const m = /^【([^】]*)】([\s\S]*)$/.exec(note);
    if (m) { otherCategoryText = m[1]; note = m[2]; }
  }
  return {
    category, otherCategoryText, note,
    caseName: rec.caseName || '',
    repairReason: rec.repairReason || '',
    plannedSchedule: rec.plannedSchedule || '',
    synced: true, // 這筆是從 Ragic 讀回來的，定義上已經真的送出過
  };
}

// dateParam 選填（2026-07-24 新增，供「今天／明天」切換用）：不帶＝沿用 Worker 預設今天
// （向下相容既有呼叫），帶了就查那個日期（YYYY-MM-DD，Worker 端會正規化）。
async function loadMineFromApi(dateParam) {
  try {
    const qs = dateParam ? `&date=${encodeURIComponent(dateParam)}` : '';
    const res = await fetch(`${WORKER_BASE}/worklogListMine?token=${encodeURIComponent(API_TOKEN)}${qs}`);
    let json = null;
    try { json = await res.json(); } catch { json = null; }
    if (!res.ok || !json || json.ok !== true) return { ok: false, status: res.status };
    return { ok: true, json };
  } catch {
    return { ok: false, status: 0 }; // 0＝連線層失敗（非 HTTP 狀態碼），跟 404/403 分開顯示訊息
  }
}

// 用 worklogListMine 回傳的紀錄覆寫本機對應日期的狀態，讓「那一天的紀錄」在任何裝置/清過快取
// 後打開都以 Ragic 為準，不會停留在舊的本機快取。dateStr 由呼叫端指定要覆寫哪一天（今天或明天），
// 不再寫死 todayStr()，才能同時支援「今天／明天」兩格各自獨立同步。
//
// 2026-07-24 資料遺失事故修復：原本這裡是「Ragic 回什麼、本機就整包被換成什麼」，Ragic 回空
// （使用者從未成功送出，或送出失敗但沒被發現）就會把畫面上已經打好但還沒送出的草稿一併清空、
// 使用者完全無法察覺（陳勁豪／Joan 2026-07-24 首日使用即中招，內容從未寫入 Ragic 但畫面看起來
// 像存過）。治本：Ragic 有的小時格＝已送出真相，採用並標記 synced:true；Ragic 沒有、但本機已經
// 填寫的小時格＝尚未送出的草稿，保留不清除、標記 synced:false，交給 UI 用「尚未送出」徽章／頁面
// 提示讓使用者自己看得到，而不是被默默吃掉。
function applyMineData(json, dateStr) {
  const existing = getDayState(dateStr);
  const day = { entries: {}, submitted: false, submittedAt: existing.submittedAt || null };
  (json.entries || []).forEach((rec) => {
    if (!WORKLOG_HOURS.includes(rec.hour)) return; // 防禦：未知小時格值不採信
    day.entries[rec.hour] = parseApiEntry(rec);
  });
  Object.entries(existing.entries || {}).forEach(([hour, entry]) => {
    if (!day.entries[hour] && isFilled(entry)) day.entries[hour] = { ...entry, synced: false };
  });
  day.submitted = Object.values(day.entries).some((e) => e.synced);
  setDayState(dateStr, day);
}

// 記錄「today／tomorrow」這兩個日期身分是否已經跟 API 同步過一次，換頁籤時避免重複打 API
// （today 在 init() 首次載入時就會標記完成）。dateSwitchReqId 比照既有 overviewReqId 手法防
// race：使用者快速來回切換時，只採信最後一次切換觸發的回應，較舊的回應即使晚到也直接作廢。
const LOADED_DATE_KEYS = new Set();
let dateSwitchReqId = 0;
async function switchSelectedDate(key) {
  if (SELECTED_DATE === key) return;
  const myReqId = ++dateSwitchReqId;
  SELECTED_DATE = key;
  EXPANDED = new Set(); // 換日期時收合狀態重置，避免殘留上一個日期的展開列造成混淆
  if (API_MODE && !LOADED_DATE_KEYS.has(key)) {
    renderWorklogView(); // 先渲染，不要讓畫面卡在切換前的樣子等網路
    const result = await loadMineFromApi(key === 'tomorrow' ? selectedDateStr() : null);
    if (myReqId !== dateSwitchReqId) return; // 使用者已經切到別的日期，這次結果作廢
    LOADED_DATE_KEYS.add(key);
    if (result.ok) applyMineData(result.json, selectedDateStr());
  }
  renderWorklogView();
}

function renderFatalError(msg) {
  VALID_VIEWS.forEach((v) => { const el = byId('view-' + v); if (el) el.hidden = (v !== 'worklog'); });
  byId('view-worklog').replaceChildren(emptyNote(msg));
  byId('sidebarNav').replaceChildren();
  byId('sidebarPlanned').replaceChildren();
  byId('bottomTabBar').replaceChildren();
  byId('pageTitle').textContent = '無法載入';
}

const MOCK_CASES = [
  '王公館・台中市南屯區文心路三段',
  '陳宅・彰化縣員林市中山路',
  '日安大樓 3F・台中市西區精誠路',
  '康橋苑 12F・台中市北屯區崇德路',
  '松林社區 B棟・彰化縣和美鎮彰南路',
  '幸福巷弄自宅・台中市大里區國光路',
];
// 主管總覽的示範同仁，角色化命名（同仁 A/B/C），不綁定真實人名
const MOCK_TEAM = [
  { id: 'A', label: '同仁 A', entries: {
    '0900之前': { category: '場勘', otherCategoryText: '', caseName: '王公館・台中市南屯區文心路三段', repairReason: '', plannedSchedule: '原訂 8 點到王公館場勘', note: '確認客變位置，拍照存證' },
    '09:00-10:00': { category: '廠商聯繫', otherCategoryText: '', caseName: '王公館・台中市南屯區文心路三段', repairReason: '磁磚色差需重新確認', plannedSchedule: '', note: '聯繫泥作師傅確認磁磚批號' },
    '10:00-11:00': { category: '驗收', otherCategoryText: '', caseName: '陳宅・彰化縣員林市中山路', repairReason: '衛浴防水複驗', plannedSchedule: '原訂 10 點驗收', note: '複驗通過，補拍照片' },
    '13:00-14:00': { category: '內部會議', otherCategoryText: '', caseName: '', repairReason: '', plannedSchedule: '', note: '工班排程週會' },
    '14:00-15:00': { category: '文書作業', otherCategoryText: '', caseName: '', repairReason: '', plannedSchedule: '', note: '補登本週工項紀錄' },
  } },
  { id: 'B', label: '同仁 B', entries: {
    '0900之前': { category: '場勘', otherCategoryText: '', caseName: '康橋苑 12F・台中市北屯區崇德路', repairReason: '', plannedSchedule: '', note: '新案場勘' },
    '09:00-10:00': { category: OTHER_CATEGORY, otherCategoryText: '搬運材料', caseName: '康橋苑 12F・台中市北屯區崇德路', repairReason: '', plannedSchedule: '', note: '' },
  } },
  { id: 'C', label: '同仁 C', entries: {} },
];

const STORAGE_KEY = 'wuohome_worklog_mock_v1';
const RECENT_CAT_KEY = 'wuohome_worklog_recent_cat_v1';
const ROLE_KEY = 'wuohome_worklog_demo_role_v1';

const byId = (id) => document.getElementById(id);
function make(tag, cls, text) {
  const node = document.createElement(tag);
  if (cls) node.className = cls;
  if (text !== undefined) node.textContent = text;
  return node;
}
const pad = (n) => String(n).padStart(2, '0');

function hourSlots() {
  return WORKLOG_HOURS.map((label) => ({ label }));
}
// dateStrForOffset/dateDisplayForOffset：todayStr/todayDisplay 抽出「+N 天」版本，供下方
// 「今天／明天」切換共用，不用另外複製一份日期運算邏輯。
function dateStrForOffset(offsetDays) {
  const d = new Date();
  d.setDate(d.getDate() + offsetDays);
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}
function todayStr() { return dateStrForOffset(0); }
function dateDisplayForOffset(offsetDays) {
  const d = new Date();
  d.setDate(d.getDate() + offsetDays);
  const wd = ['日', '一', '二', '三', '四', '五', '六'][d.getDay()];
  return `${d.getMonth() + 1}/${d.getDate()}（${wd}）`;
}
function todayDisplay() { return dateDisplayForOffset(0); }
function currentHourLabel() {
  const h = new Date().getHours();
  if (h < 9) return '0900之前';
  if (h >= 19) return '19:00之後';
  if (h === 12) return null; // 午休無對應小時格
  const label = `${pad(h)}:00-${pad(h + 1)}:00`;
  return WORKLOG_HOURS.includes(label) ? label : null;
}
// 2026-07-24：新增「今天／明天」填寫切換——陳勁豪、葉恩廷實際使用後提出的真實需求，早上就能
// 先把明天預定要做的事排好，不用等到當天。只開放「今天/明天」兩格，不做完整日期選擇器；維持
// 既有跨日鎖定精神，不開放切到昨天或更早去編輯（Worker 端 date_locked_past 同步擋）。
let SELECTED_DATE = 'today'; // 'today' | 'tomorrow'
function selectedOffsetDays() { return SELECTED_DATE === 'tomorrow' ? 1 : 0; }
function selectedDateStr() { return dateStrForOffset(selectedOffsetDays()); }
function selectedDateDisplay() { return dateDisplayForOffset(selectedOffsetDays()); }
// 「現在」高亮／快速記錄只對「今天」畫面有意義，明天畫面沒有現在進行式的小時
function activeHourLabel() { return SELECTED_DATE === 'today' ? currentHourLabel() : null; }

function loadAllState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveAllState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
function getDayState(dateStr) {
  const all = loadAllState();
  if (!all[dateStr]) all[dateStr] = { entries: {}, submitted: false, submittedAt: null };
  return all[dateStr];
}
function setDayState(dateStr, dayState) {
  const all = loadAllState();
  all[dateStr] = dayState;
  saveAllState(all);
}
function blankEntry() { return { category: '', otherCategoryText: '', caseName: '', repairReason: '', plannedSchedule: '', note: '', synced: false }; }
function ensureEntry(day, label) {
  if (!day.entries[label]) day.entries[label] = blankEntry();
  return day.entries[label];
}
function getEntry(day, label) { return day.entries[label] || null; }
function isFilled(entry) { return !!(entry && entry.category); }

function loadRecentCats() {
  try { return JSON.parse(localStorage.getItem(RECENT_CAT_KEY)) || []; } catch { return []; }
}
function pushRecentCat(name) {
  if (!name) return;
  const list = [name, ...loadRecentCats().filter((x) => x !== name)].slice(0, 8);
  localStorage.setItem(RECENT_CAT_KEY, JSON.stringify(list));
}
// 依角色 categoryGroup 決定「預設子集在前」的完整順序（顯示順序調整，不是砍選項——
// 兩組都在完整清單內，只是誰排前面）。IDENTITY 在本機模擬模式（無 token）下是 null，
// 走跟舊版一致的預設順序（工務優先），不影響既有開發/除錯流程。
function categoryGroupOrder() {
  const group = IDENTITY && IDENTITY.categoryGroup;
  return group === '租賃' ? [...CATEGORIES_RENTAL, ...CATEGORIES_WORK] : [...CATEGORIES_WORK, ...CATEGORIES_RENTAL];
}
function orderedCategoriesForNewRow() {
  const base = categoryGroupOrder();
  const recent = loadRecentCats().filter((c) => base.includes(c));
  const rest = base.filter((c) => !recent.includes(c));
  return [...recent, ...rest];
}

let ROLE = localStorage.getItem(ROLE_KEY) || 'staff';
// API_MODE 下優先顯示 token 對應的真實姓名（IDENTITY，由 worklogListMine 取得）；
// 無 token 的本機模擬模式維持原本的示範文字。
function roleLabel(r) {

// ================= Toast =================
let toastTimer = null;
function showToast(msg) {
  let t = byId('toast');
  if (!t) {
    t = make('div', 'fixed inset-x-0 bottom-24 z-[60] mx-auto w-fit max-w-[90vw] rounded-full bg-ink px-4 py-2 text-center text-sm font-bold text-white shadow-lg lg:bottom-6');
    t.id = 'toast';
    t.style.opacity = '0';
    document.body.append(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 2400);
}
function emptyNote(text, tone) {
  const cls = tone === 'sage'
    ? 'rounded-xl border border-sage/30 bg-sagetint p-4 text-center text-sm font-bold text-sage'
    : 'rounded-xl border border-line bg-white p-4 text-center text-sm text-inkmuted';

}

      btn.textContent = SELECTED_DATE === 'tomorrow' ? '+ 開始排定 →' : '開始補填 →';
      targetLabel = firstUnfilled.label;
    } else {
      left.append(make('p', 'text-sm font-bold text-sage', SELECTED_DATE === 'tomorrow' ? '明天的時段都排定過了' : '今天的時段都處理過了'));

function renderProgress(day) {
  const total = hourSlots().length;
  const filled = hourSlots().filter((s) => isFilled(getEntry(day, s.label))).length;
  const wrap = make('div', 'mb-4');
  const row = make('div', 'mb-1.5 flex items-center justify-between');
  row.append(make('p', 'tnum text-xs font-bold text-inkmuted', `已填 ${filled} ／ ${total} 小時`));
  row.append(make('p', 'text-[11px] text-inkfaint', filled < total ? '沒事的小時按「標記為無特別事項」快速跳過即可' : '可以送出了'));
  wrap.append(row);
  const track = make('div', 'h-1.5 w-full overflow-hidden rounded-full bg-line');
  const fill = make('div', 'h-full rounded-full bg-ink');
  fill.style.width = `${Math.round((filled / total) * 100)}%`;
  track.append(fill);
  wrap.append(track);
  return wrap;
}

function copyFromPrevious(idx) {
  const slots = hourSlots();
  if (idx === 0) { showToast('這是第一個時段，沒有上一小時可以複製'); return; }
  const dateStr = selectedDateStr();
  const day = getDayState(dateStr);
  const prevEntry = getEntry(day, slots[idx - 1].label);
  if (!prevEntry || !prevEntry.category) { showToast('上一小時還沒填寫，無法複製'); return; }
  const label = slots[idx].label;
  const entry = ensureEntry(day, label);
  entry.category = prevEntry.category;
  entry.otherCategoryText = prevEntry.otherCategoryText || '';
  entry.caseName = prevEntry.caseName || '';
  entry.repairReason = prevEntry.repairReason || '';
  entry.plannedSchedule = prevEntry.plannedSchedule || '';
  // 紀錄內容刻意不複製：同一件事跨小時，細節通常不同，留給使用者補這一小時實際發生的事
  setDayState(dateStr, day);
  pushRecentCat(entry.category);
  EXPANDED.add(label);
  showToast(`已複製上一小時的內容到 ${label}`);
  renderWorklogView();
}

function quickSkip(idx) {
  const label = hourSlots()[idx].label;
  const dateStr = selectedDateStr();
  const day = getDayState(dateStr);
  const entry = ensureEntry(day, label);
  entry.category = OTHER_CATEGORY;
  entry.otherCategoryText = '無特別事項';
  entry.caseName = ''; entry.repairReason = ''; entry.plannedSchedule = ''; entry.note = '';
  setDayState(dateStr, day);
  showToast(`${label} 已標記為無特別事項`);
  renderWorklogView();
}

function applyForward(idx) {
  const slots = hourSlots();
  const label = slots[idx].label;
  const dateStr = selectedDateStr();
  const day = getDayState(dateStr);
  const src = getEntry(day, label);
  if (!src || !src.category) return;
  let count = 0;
  for (let j = idx + 1; j < slots.length; j++) {
    const l2 = slots[j].label;
    const existing = getEntry(day, l2);
    if (existing && existing.category) break;
    const ne = ensureEntry(day, l2);
    ne.category = src.category;
    ne.otherCategoryText = src.otherCategoryText || '';
    ne.caseName = src.caseName || '';
    ne.repairReason = src.repairReason || '';
    ne.plannedSchedule = src.plannedSchedule || '';
    count++;
  }
  setDayState(dateStr, day);
  showToast(count > 0 ? `已套用到之後 ${count} 個空白小時` : '後面沒有空白小時可以套用了');
  renderWorklogView();
}

function toggleExpand(label) {
  if (EXPANDED.has(label)) EXPANDED.delete(label); else EXPANDED.add(label);
  renderWorklogView();
}

const CHEVRON_DOWN_SVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>';
const CHEVRON_UP_SVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 15l6-6 6 6"/></svg>';
function expandHintPill(expanded, filled) {
  let cls;
  let text;
  if (expanded) { cls = 'border-line bg-paper text-ink'; text = '收合'; }
  else if (filled) { cls = 'border-line bg-white text-ink'; text = '查看'; }
  else { cls = 'border-coral bg-white text-coraldark'; text = '填寫'; }
  const pill = make('span', `flex shrink-0 items-center gap-1 rounded-full border-2 px-2.5 py-1 text-xs font-black ${cls}`);
  pill.append(make('span', '', text));
  const ic = make('span', 'flex h-4 w-4 shrink-0 items-center justify-center');
  ic.innerHTML = expanded ? CHEVRON_UP_SVG : CHEVRON_DOWN_SVG;
  pill.append(ic);
  return pill;
}

function renderHourRow(slot, idx, day) {

  const headerBtn = make('button', `tap44 flex w-full items-center gap-3 px-3 py-2.5 text-left transition-colors hover:bg-paper active:bg-paper focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ink ${expanded ? 'rounded-t-xl' : 'rounded-xl'}`);

  const previewCol = make('div', 'min-w-0 flex-1');
  if (filled) {
    const line = make('p', 'flex flex-wrap items-center gap-1.5');
    const catLabel = entry.category === OTHER_CATEGORY ? (entry.otherCategoryText || '其他') : entry.category;
    line.append(make('span', 'inline-block shrink-0 rounded-full bg-paper px-2 py-0.5 text-xs font-bold text-inkmuted', catLabel));

    // 視覺上一律要能一眼分辨，不能讓兩者長得一樣——這是本次事故的根本教訓。

    previewCol.append(make('p', 'text-sm text-inkmuted', '尚未填寫'));

  headerBtn.append(previewCol);
  headerBtn.append(expandHintPill(expanded, filled));
  headerBtn.addEventListener('click', () => toggleExpand(label));

  if (!filled && !expanded) {

    copyBtn.addEventListener('click', (e) => { e.stopPropagation(); copyFromPrevious(idx); });

  form.append(noteLabelEl, counter);

  // 動作列
  const actionsRow = make('div', 'flex flex-wrap items-center gap-2 pt-1');
  const copyBtn2 = make('button', 'tap44 rounded-lg border border-line px-3 text-xs font-bold text-ink transition-transform hover:bg-paper active:scale-[0.97] disabled:cursor-not-allowed disabled:opacity-40 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ink', '複製上一小時');
  copyBtn2.type = 'button';
  const prevEntry2 = idx > 0 ? getEntry(day, hourSlots()[idx - 1].label) : null;
  if (!prevEntry2 || !prevEntry2.category) copyBtn2.disabled = true;
  copyBtn2.addEventListener('click', () => copyFromPrevious(idx));
  actionsRow.append(copyBtn2);

  const skipBtn2 = make('button', 'tap44 rounded-lg border border-line px-3 text-xs font-bold text-inkmuted transition-transform hover:bg-paper active:scale-[0.97] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ink', '標記為無特別事項');
  skipBtn2.type = 'button';
  skipBtn2.addEventListener('click', () => quickSkip(idx));
  actionsRow.append(skipBtn2);

  if (entry.category) {
    const hasForwardBlank = hourSlots().slice(idx + 1).some((s) => !isFilled(getEntry(day, s.label)));
    if (hasForwardBlank) {
      const applyBtn = make('button', 'text-xs font-bold text-coraldark underline underline-offset-2 hover:text-coral focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ink', '套用到後面空白小時 →');
      applyBtn.type = 'button';
      applyBtn.addEventListener('click', () => applyForward(idx));
      actionsRow.append(applyBtn);
    }

  actionsRow.append(make('span', 'flex-1'));
  const collapseBtn = make('button', 'tap44 rounded-lg px-3 text-xs font-bold text-inkmuted hover:bg-paper focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ink', '收合');
  collapseBtn.type = 'button';
  collapseBtn.addEventListener('click', () => toggleExpand(label));
  actionsRow.append(collapseBtn);
  form.append(actionsRow);

  inner.append(form);
  gridWrap.append(inner);
  wrap.append(gridWrap);
  return wrap;
}

function renderSubmitBar(day) {
  const total = hourSlots().length;
  const filled = hourSlots().filter((s) => isFilled(getEntry(day, s.label))).length;
  // Bug fix 2026-07-23（Playwright 375×812 實測＋elementFromPoint 驗證）：原本 sticky 版本只要
  // 使用者還在往下捲清單，就一定會蓋到底下捲過的內容——不只展開卡片內的表單欄位／按鈕（項目選擇、
  // 案名輸入、紀錄內容），連「全部收合、只是某些小時格還沒填」狀態下的快速操作按鈕（複製上一小時／
  // 標記為無特別事項）在特定捲動位置也會被蓋住點不到。sticky 元素只要還在文件中段浮動就沒有安全的
  // 中間解，因此改採 spec 提供的第三個方向：拿掉全域浮動，一律走一般文件流放在小時列表最下方，
  // 使用者捲到底才看到，但保證 100% 不會蓋到任何欄位或按鈕（elementFromPoint 掃描全收合／展開
  // 首列／展開中間列／展開末列共 4 種情境驗證過，均無遮擋）。
  const unsynced = hourSlots().filter((s) => { const e = getEntry(day, s.label); return isFilled(e) && !e.synced; }).length;
  const hasError = !!submitErrorByDate[selectedDateStr()];
  const bar = make('div', '-mx-4 mt-2 border-t border-line bg-white px-4 py-3 shadow-[0_-4px_12px_rgba(63,82,98,0.16)] lg:mx-0 lg:rounded-2xl lg:border lg:shadow-sm');
  // 2026-07-24 資料遺失事故修復：送出失敗不能只靠 toast，這裡放一個不會自動消失的紅色提示條，
  // 貼在按鈕正上方，直到下一次送出（不論成敗）才清掉。
  if (hasError) {
    const errBox = make('div', 'mb-2 rounded-lg border-2 border-red-300 bg-red-50 px-3 py-2');
    errBox.append(make('p', 'text-xs font-black text-red-700', '上次送出失敗，內容還在草稿裡，請確認後按「重試送出」'));
    errBox.append(make('p', 'mt-0.5 text-xs text-red-600', submitErrorByDate[selectedDateStr()].message));
    bar.append(errBox);
  }
  const row = make('div', 'flex items-center justify-between gap-3');
  const left = make('div', 'min-w-0');
  left.append(make('p', 'tnum text-xs font-bold text-inkmuted', `已填 ${filled} ／ ${total} 小時`));
  if (unsynced > 0) left.append(make('p', 'tnum mt-0.5 text-xs font-bold text-flagdark', `⚠ 還有 ${unsynced} 格尚未送出`));
  const btnLabel = hasError ? '重試送出' : (day.submitted ? '重新送出' : (SELECTED_DATE === 'tomorrow' ? '送出明日紀錄' : '送出今日紀錄'));
  const btn = make('button', 'tap44 shrink-0 rounded-xl bg-coral px-5 text-sm font-black text-white transition-transform hover:bg-coraldark active:scale-[0.97] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ink', btnLabel);
  btn.type = 'button';
  btn.addEventListener('click', () => handleSubmit(btn));
  row.append(left, btn);
  bar.append(row);
  return bar;
}

async function handleSubmit(btn) {
  btn.disabled = true;
  btn.textContent = '送出中…';
  const dateStr = selectedDateStr();
  const isTomorrow = SELECTED_DATE === 'tomorrow';
  const day = getDayState(dateStr);
  const restoreBtn = () => {
    btn.disabled = false;
    btn.textContent = submitErrorByDate[dateStr] ? '重試送出' : (day.submitted ? '重新送出' : (isTomorrow ? '送出明日紀錄' : '送出今日紀錄'));
  };

  if (!API_MODE) {
    // 開發模擬模式（URL 沒有 ?token=）：沿用原本本機模擬送出，方便除錯 UI，不呼叫真實 API
    setTimeout(() => {
      day.submitted = true;
      day.submittedAt = Date.now();
      setDayState(dateStr, day);
      location.hash = 'confirm';
      showToast(isTomorrow ? '已排定明天的工作日誌（本機模擬，未連線 API）' : '已送出今日工作日誌（本機模擬，未連線 API）');
    }, 450);
    return;
  }

  const entries = hourSlots()
    .filter((s) => isFilled(getEntry(day, s.label)))
    .map((s) => {
      const e = getEntry(day, s.label);
      const note = e.category === OTHER_CATEGORY && e.otherCategoryText
        ? `【${e.otherCategoryText}】${e.note || ''}`.trim()
        : (e.note || '');
      return {
        hour: s.label,
        category: e.category,
        caseName: e.caseName || '',
        repairReason: e.repairReason || '',
        plannedSchedule: e.plannedSchedule || '',
        note,
      };
    });

  if (entries.length === 0) {
    restoreBtn();
    showToast('目前沒有已填寫的小時格，至少填一格再送出');
    return;
  }

  // 每次送出前先清掉上一次的錯誤狀態，這次結果會重新決定要不要顯示，避免殘留舊訊息誤導。
  delete submitErrorByDate[dateStr];

  try {
    const res = await fetch(`${WORKER_BASE}/worklogCreate?token=${encodeURIComponent(API_TOKEN)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ entries, date: dateStr }),
    });
    const json = await res.json().catch(() => null);
    const results = (json && Array.isArray(json.results)) ? json.results : null;

    // 2026-07-24 資料遺失事故修復：不論整批是否全部成功，只要某一小時回報成功就先標記
    // synced:true——原本的寫法是「非全部成功就整批當失敗、local 完全不更新」，會讓已經真的
    // 寫進 Ragic 的那幾格，畫面上還是顯示「尚未送出」，反而製造新的誤導。
    if (results) {
      results.forEach((r) => {
        const e = getEntry(day, r.hour);
        if (e && r.ok) e.synced = true;
      });
      setDayState(dateStr, day);
    }

    if (!res.ok || !json || json.ok !== true) {
      const failed = results ? results.filter((r) => !r.ok) : [];
      const message = failed.length > 0
        ? `送出失敗：${failed.map((f) => `${f.hour}(${f.error})`).join('、')}`
        : (json && json.error) ? `送出失敗：${json.error}` : '送出失敗，請稍後再試或截圖回報';
      submitErrorByDate[dateStr] = { message };
      showToast(message);
      restoreBtn();
      renderWorklogView();
      return;
    }
    day.submitted = true;
    day.submittedAt = Date.now();
    setDayState(dateStr, day);
    location.hash = 'confirm';
    showToast(isTomorrow ? '已排定明天的工作日誌（已寫入 Ragic）' : '已送出今日工作日誌（已寫入 Ragic）');
  } catch (err) {
    submitErrorByDate[dateStr] = { message: '連線失敗，請檢查網路後重試（內容仍保留在草稿中，未遺失）' };
    showToast(submitErrorByDate[dateStr].message);
    restoreBtn();
    renderWorklogView();
  }
}

function memberCard(member) {

  const chevWrap = make('span', 'flex h-7 w-7 shrink-0 items-center justify-center rounded-full border-2 border-line bg-white text-ink');

  headerBtn.addEventListener('click', () => { EXPANDED_MEMBER = expanded ? null : member.id; renderOverviewBody(byId('view-overview')); });

    refreshOverviewFromApi();
  });
  dayNav.append(prevBtn, make('span', 'tnum rounded-lg bg-paper px-3 py-2 text-xs font-bold text-ink', overviewOffsetDateDisplay()), nextBtn);
  return dayNav;
}

// worklogListAll 回傳的是攤平列表（每列一筆紀錄，含 reporter），這裡依 reporter 姓名分組成
// memberCard() 原本預期的 { id, label, entries:{hour:entry} } 形狀；不是固定名冊，人員憑當天
// 實際有寫入紀錄的姓名自然出現，沒人填就不會有卡片（下方 members.length===0 另外處理空狀態）。
function groupByReporter(entries) {
  const map = new Map();
  entries.forEach((rec) => {
    if (!map.has(rec.reporter)) map.set(rec.reporter, { id: rec.reporter, label: rec.reporter, entries: {} });
    map.get(rec.reporter).entries[rec.hour] = parseApiEntry(rec);
  });
  return [...map.values()];
}

// dateParam 選填（2026-07-24 新增，供主管總覽「後一天」查詢用）：不帶＝沿用 Worker 預設今天。
async function loadAllFromApi(dateParam) {
  try {
    const qs = dateParam ? `&date=${encodeURIComponent(dateParam)}` : '';
    const res = await fetch(`${WORKER_BASE}/worklogListAll?token=${encodeURIComponent(API_TOKEN)}${qs}`);
    let json = null;
    try { json = await res.json(); } catch { json = null; }
    if (!res.ok || !json || json.ok !== true) return { ok: false, status: res.status };
    return { ok: true, json };
  } catch {
    return { ok: false, status: 0 };
  }
}

// status: 'idle' | 'loading' | 'ok' | 'error'。快取起來是因為 memberCard 展開/收合也會呼叫
// renderOverviewBody，若每次展開都重打 API 會一直閃「載入中」，體驗很差；只有「導覽進入本頁」
// 才觸發真正的 refreshOverviewFromApi()。
let overviewState = { status: 'idle', members: [], errorMsg: null };
let overviewReqId = 0;

function renderOverviewBody(root) {
  root.replaceChildren(overviewHeadNode(), overviewDayNavNode());
  if (!API_MODE) {
    const list = make('div', 'space-y-3');
    MOCK_TEAM.forEach((member) => list.append(memberCard(member)));
    root.append(list);
    return;
  }
  if (overviewState.status === 'loading') { root.append(emptyNote('載入中…')); return; }
  if (overviewState.status === 'error') { root.append(emptyNote(overviewState.errorMsg)); return; }
  if (overviewState.members.length === 0) { root.append(emptyNote(OVERVIEW_DATE_OFFSET > 0 ? '明天尚無排定紀錄。' : '今日尚無紀錄。', 'sage')); return; }
  const list = make('div', 'space-y-3');
  overviewState.members.forEach((member) => list.append(memberCard(member)));
  root.append(list);
}

async function refreshOverviewFromApi() {
  const myReqId = ++overviewReqId;
  overviewState = { status: 'loading', members: [], errorMsg: null };
  renderOverviewBody(byId('view-overview'));
  const result = await loadAllFromApi(OVERVIEW_DATE_OFFSET > 0 ? overviewOffsetDateStr() : null);
  if (myReqId !== overviewReqId) return; // 使用者已經切走頁面，這次結果作廢，不要覆寫新畫面
  if (!result.ok) {
    // worklogListAll：token 完全無效／缺失一律 404；token 有效但非主管角色回 403——兩者訊息
    // 分開講清楚，其餘（500／逾時／斷線）給通用訊息，畫面一律停在可讀狀態，不留白畫面或卡死。
    const msg = result.status === 403
      ? '此連結沒有主管檢視權限，如有需要請聯繫管理者確認。'
      : result.status === 404
        ? '連結已失效，請聯繫窩的家管理者重新取得連結。'
        : '暫時無法連線到系統，請重新整理頁面再試一次。';
    overviewState = { status: 'error', members: [], errorMsg: msg };
  } else {
    overviewState = { status: 'ok', members: groupByReporter(result.json.entries || []), errorMsg: null };
  }
  renderOverviewBody(byId('view-overview'));
}

function renderOverviewView() {
  const root = byId('view-overview');
  if (ROLE !== 'manager') {
    root.replaceChildren(emptyNote('此頁僅主管角色可查看，請用右上角「身分」切換為小吳哥（主管）預覽。'));
    return;
  }
  renderOverviewBody(root);
  if (API_MODE && overviewState.status !== 'loading') refreshOverviewFromApi();
}

// ================= 平台外殼：側欄／底部 tab／路由 =================
function icon(name) {
  const paths = {
    clock: '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.2 2" fill="none" stroke-linecap="round"/>',
    clipboard: '<rect x="6" y="4" width="12" height="16" rx="2" fill="none"/><path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1" fill="none"/><path d="M9 10h6M9 14h6M9 18h3" stroke-linecap="round"/>',
    link: '<path d="M8 12.5l4.2-4.2" stroke-linecap="round"/><path d="M9.5 15.5A4 4 0 0 1 8 9.4l2-2a4 4 0 0 1 5.6 5.6l-.9.9" fill="none"/><path d="M14.5 8.5A4 4 0 0 1 16 14.6l-2 2a4 4 0 0 1-5.6-5.6l.9-.9" fill="none"/>',
    stats: '<rect x="4" y="12" width="4" height="8" rx="1"/><rect x="10" y="7" width="4" height="13" rx="1"/><rect x="16" y="3" width="4" height="17" rx="1"/>',
  };
  return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round">${paths[name] || ''}</svg>`;
}

const VALID_VIEWS = ['worklog', 'overview', 'confirm'];
const VIEW_TITLES = { worklog: '工作日誌', overview: '主管總覽', confirm: '已送出' };
const NAV_ITEMS = [
  { id: 'worklog', label: '工作日誌', icon: 'clock' },
  { id: 'overview', label: '主管總覽', icon: 'clipboard', managerOnly: true },
];
const PLANNED_ITEMS = [
  { id: 'link', label: '案件正式關聯', icon: 'link', note: '工作日誌與工程案件的正式資料關聯規劃中（P2），目前案名為文字＋自動建議，尚未串接。' },
  { id: 'stats', label: '填寫率統計報表', icon: 'stats', note: '每人每日填寫率、排定與實際落差率報表規劃中（P3），尚未開發。' },
];

function currentView() {
  const h = (location.hash || '').replace('#', '');
  return VALID_VIEWS.includes(h) ? h : 'worklog';
}

function sidebarNavButton(item) {
  const active = currentView() === item.id;
  const locked = item.managerOnly && ROLE !== 'manager';
  const cls = active
    ? 'bg-coral text-white'
    : locked ? 'text-white/25 hover:bg-white/5' : 'text-white/70 hover:bg-white/5 hover:text-white';
  const btn = make('button', `flex w-full items-center gap-2.5 rounded-xl px-3 py-2.5 text-sm font-bold transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white/60 ${cls}`);
  btn.type = 'button';
  if (active) btn.setAttribute('aria-current', 'page');
  const ic = make('span', 'h-5 w-5 shrink-0');
  ic.innerHTML = icon(item.icon);
  btn.append(ic, make('span', 'flex-1 text-left', item.label + (locked ? '（主管專用）' : '')));
  btn.addEventListener('click', () => {
    if (locked) { showToast('此頁僅主管角色可查看，右上角可切換身分預覽'); return; }
    location.hash = item.id;
  });
  return btn;
}
function plannedButton(item) {
  const btn = make('button', 'flex w-full items-center gap-2.5 rounded-xl px-3 py-2.5 text-sm font-bold text-white/35 hover:bg-white/5 hover:text-white/60 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white/60');
  btn.type = 'button';
  const ic = make('span', 'h-5 w-5 shrink-0');
  ic.innerHTML = icon(item.icon);
  btn.append(ic, make('span', 'flex-1 text-left', `${item.label}（規劃中）`));
  btn.addEventListener('click', () => showToast(item.note));
  return btn;
}
function renderSidebarNav() {
  const nav = byId('sidebarNav');
  nav.replaceChildren();
  NAV_ITEMS.forEach((item) => nav.append(sidebarNavButton(item)));
  const planned = byId('sidebarPlanned');
  planned.replaceChildren();
  PLANNED_ITEMS.forEach((item) => planned.append(plannedButton(item)));
}
function renderBottomTabs() {
  const bar = byId('bottomTabBar');
  bar.replaceChildren();
  NAV_ITEMS.forEach((item) => {
    const active = currentView() === item.id;
    const locked = item.managerOnly && ROLE !== 'manager';
    const cls = locked ? 'text-inkfaint/50' : active ? 'text-ink' : 'text-inkfaint';
    const btn = make('button', `flex flex-1 flex-col items-center gap-0.5 py-2 text-[11px] font-bold focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-ink ${cls}`);
    btn.type = 'button';
    if (active) btn.setAttribute('aria-current', 'page');
    const ic = make('span', 'h-5 w-5');
    ic.innerHTML = icon(item.icon);
    btn.append(ic, make('span', '', item.label));
    btn.addEventListener('click', () => {
      if (locked) { showToast('此頁僅主管角色可查看，右上角可切換身分預覽'); return; }
      location.hash = item.id;
    });
    bar.append(btn);
  });
}

// 2026-07-23：側欄部門字樣原本寫死「工務部」，擴及租賃部（恩廷）後會顯示錯誤部門，
// 改依 IDENTITY.categoryGroup 動態顯示；本機模擬模式（無 token）維持舊版「工務部」字樣。
function sidebarDeptLabel() {
  const group = IDENTITY && IDENTITY.categoryGroup;
  if (group) return `${group}部`;
  return API_MODE ? '窩的家' : '工務部';
}
function updateChromeLabels() {
  byId('sidebarSubtitle').textContent = `${sidebarDeptLabel()}・${roleLabel(ROLE)}`;
  byId('roleToggleBtn').textContent = `身分：${roleLabel(ROLE)} ⇄`;
}

// 2026-07-24 資料遺失事故修復（第二個根因）：原本兩處直接用 location.pathname 組新網址換
// hash，pathname 不含 query string，等於把網址列的 ?token=... 整個丟掉。使用者之後只要重新整理
// 頁面（分頁還原、瀏覽器重開、誤按 F5），就會用「已經沒有 token」的網址重新載入，整個工作階段
// 悄悄降級成「本機模擬模式」（沒有任何錯誤訊息、頁面看起來完全正常）——填寫、送出、看到「已送出」
// 的畫面全部都是假的（本機模擬模式的送出只是 setTimeout 假裝成功），從頭到尾沒有打到 Ragic。
// 這完全符合「使用者說有存檔的感覺、但 Ragic 從未收到」的事故現象，修法：保留 location.search，
// 只換 hash 那一段。
function replaceHashKeepingQuery(hash) {
  history.replaceState(null, '', location.pathname + location.search + hash);
}

function applyRoute() {
  let view = currentView();
  if (view === 'overview' && ROLE !== 'manager') {
    replaceHashKeepingQuery('#worklog');
    view = 'worklog';
    showToast('此頁僅主管角色可查看，已切回工作日誌');
  }
  VALID_VIEWS.forEach((v) => { byId('view-' + v).hidden = (v !== view); });
  byId('pageTitle').textContent = VIEW_TITLES[view];
  renderSidebarNav();
  renderBottomTabs();
  if (view === 'worklog') renderWorklogView();
  else if (view === 'overview') renderOverviewView();
  else if (view === 'confirm') renderConfirmView();
}
window.addEventListener('hashchange', applyRoute);

// API_MODE 下身分由 token 決定（IDENTITY，見 init() 內 loadMineFromApi），不開放使用者自行切換
// 身分，否則會出現「畫面顯示主管選單但打 API 被 403」這種假象；本機模擬模式（無 token）才保留
// 這顆切換鈕方便開發除錯。
if (!API_MODE) {
  byId('roleToggleBtn').addEventListener('click', () => {
    setRole(ROLE === 'manager' ? 'staff' : 'manager');
    updateChromeLabels();
    showToast(`已切換為：${roleLabel(ROLE)}（原型示範用，正式版由連結 token 決定）`);
    applyRoute();
  });
}
byId('resetButton').addEventListener('click', () => {
  if (!confirm('清空本機暫存的資料快取，重新整理頁面？（不影響 Ragic 裡已經送出的紀錄）')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(RECENT_CAT_KEY);
  location.hash = 'worklog';
  location.reload();
});

// ================= 初始化 =================
(async function init() {
  const dl = byId('worklogCaseList');
  MOCK_CASES.forEach((c) => { const opt = document.createElement('option'); opt.value = c; dl.append(opt); });

  const initHash = (location.hash || '').replace('#', '');
  if (!VALID_VIEWS.includes(initHash)) replaceHashKeepingQuery('#worklog');

  const modeLabel = byId('modeLabel');
  if (modeLabel) modeLabel.textContent = API_MODE ? '已連線 API' : '原型・本機模擬（無 token）';

  if (API_MODE) {
    byId('roleToggleBtn').style.display = 'none';
    byId('view-worklog').replaceChildren(emptyNote('載入中…'));
    const mine = await loadMineFromApi();
    if (!mine.ok) {
      // token 完全失效／缺失一律 404；其餘（斷線、500）給通用訊息。整頁停在可讀的錯誤狀態，
      // 不留白畫面、不繼續往下渲染可能半殘的表單（驗收契約 #6：錯誤一律清楚可讀，不卡死）。
      renderFatalError(mine.status === 404
        ? '此連結已失效或不存在，請聯繫窩的家管理者重新取得連結。'
        : '暫時無法連線到系統，請確認網路後重新整理頁面再試一次。');
      return;
    }
    IDENTITY = mine.json.viewer;
    ROLE = IDENTITY.role;
    applyMineData(mine.json, todayStr());
    LOADED_DATE_KEYS.add('today'); // 今天已經跟 API 同步過，切「今天／明天」時不用重打
  }

  const cur = activeHourLabel();
  const day = getDayState(selectedDateStr());
  if (cur) EXPANDED.add(cur);
  else {
    const firstUnfilled = hourSlots().find((s) => !isFilled(getEntry(day, s.label)));
    if (firstUnfilled) EXPANDED.add(firstUnfilled.label);
  }

  updateChromeLabels();
  applyRoute();
})();
</script>
