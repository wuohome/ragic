  <title>窩的家工程平台｜設計部</title>
  <script>
  (function () {
    var u = new URL(location.href);
    if (!u.searchParams.has('v')) {
      u.searchParams.set('v', new Date().toISOString().slice(0, 10).replace(/-/g, ''));
      location.replace(u.toString());
    }
  })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Monday 原味方案 A（2026-07-22 Joan 拍板）：白底＋淺灰側欄，狀態色改高飽和 Monday 系，
            // 窩的家 CI 色（coral）退場只留 logo；ink 系改為 Monday 中性文字色階。

            sagetint: '#EAF3EE',

<body class="min-h-screen bg-paper text-ink">

<script>
'use strict';
const API_BASE = 'https://wuohome-ragic-proxy.wuohome.workers.dev';
const TOKEN = new URLSearchParams(location.search).get('token') || '';
const STATUS_ACTIVE = '🛠️工程中';
const STALE_DAYS = 7;
const PX_PER_DAY_FULL = 6; // 「看全程」模式固定密度，容許橫向捲動
const LABEL_COL_MAIN = 230;
const LABEL_COL_ITEM = 110;

const byId = (id) => document.getElementById(id);
const clean = (v) => String(v ?? '').trim();
const money = (v) => (v === null || v === undefined || v === '') ? '—' : `NT$ ${Number(v).toLocaleString('zh-TW')}`;
const pct = (v) => (v === null || v === undefined || v === '') ? '—' : `${Math.round(Number(v) * 100)}%`;

function make(tag, cls, text) {
  const node = document.createElement(tag);
  if (cls) node.className = cls;
  if (text !== undefined) node.textContent = text;
  return node;
}

function parseDateOnly(s) {
  const m = /^(\d{4})\/(\d{2})\/(\d{2})/.exec(clean(s));
  return m ? new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3])) : null;
}
function todayDate() { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function daysBetween(a, b) { return Math.round((b - a) / 86400000); }
function fmtShort(d) { return d ? `${d.getMonth() + 1}/${d.getDate()}` : '—'; }

// 主約工期資料品質：任一空值 or 訖<起（填錯）—— 判定邏輯照現版，不變
function dateIssue(c) {
  const s = parseDateOnly(c.startAt), e = parseDateOnly(c.endAt);
  if (!s || !e) return 'missing';
  if (e < s) return 'inverted';
  return null;
}
function isOverdue(c) {
  if (c.status !== STATUS_ACTIVE) return false;
  if (dateIssue(c)) return false;
  return parseDateOnly(c.endAt) < todayDate();
}
function overdueDaysCount(c) {
  if (!isOverdue(c)) return null;
  return daysBetween(parseDateOnly(c.endAt), todayDate());
}
// 催更黃燈判定源與 7 天門檻照現版不變；此處額外算出天數供行動語句顯示用（純呈現）
function staleDaysCount(c) {
  const ref = parseDateOnly(c.lastUpdateAt) || parseDateOnly(c.startAt);
  if (!ref) return null;
  return daysBetween(ref, todayDate());
}
function isStale(c) {
  if (c.status !== STATUS_ACTIVE) return false;
  const d = staleDaysCount(c);
  return d !== null && d >= STALE_DAYS;
}
function insufficientData(c) {
  return c.status === STATUS_ACTIVE && !parseDateOnly(c.lastUpdateAt) && !parseDateOnly(c.startAt);
}
function nextScheduled(c) {
  const today = todayDate();
  const items = (c.progress || [])
    .map((p) => ({ ...p, d: parseDateOnly(p.startAt) }))
    .filter((p) => p.d && p.d > today)
    .sort((a, b) => a.d - b.d);
  return items[0] || null;
}

// ---------- P2：工項分類（12 選項）＋關鍵字兩層掃描（規格書 § 工項順序與關鍵字對照 逐字實作，邏輯不變）----------
const DECOR_CATEGORIES = [
  { name: '拆除工程', layer1: ['拆除'], layer2: ['打牆', '打除', '剔除', '清運', '廢棄物', '保護工程'] },
  { name: '水電工程', layer1: ['水電'], layer2: ['配電', '配管', '管溝', '拉線', '給排水', '電線', '迴路', '弱電', '開關', '插座', '崁燈', '吸頂燈', '熱水器'] },
  { name: '泥作工程', layer1: ['泥作'], layer2: ['防水', '貼磚', '貼覆', '磁磚', '壁磚', '地磚', '板岩磚', '拋光磚', '石英磚', '門檻', '打底', '墊高', '洩水', '砌磚', '粉光', '水泥', '填縫'] },
  { name: '門窗工程', layer1: ['門窗'], layer2: ['鋁窗', '氣密窗', '氣密', '落地窗', '大門', '室內門', '鋁框拉門', '玻璃', '紗窗'] },
  { name: '木作工程', layer1: ['木作', '木工'], layer2: ['天花', '隔間', '輕隔間', '封板', '電視牆', '木地板', '卡扣地板'] },
  { name: '油漆工程', layer1: ['油漆'], layer2: ['批土', '補土', '打磨', '噴漆', '乳膠漆', '上漆'] },
  { name: '系統櫃', layer1: ['系統櫃'], layer2: ['系統家具', '系統板材'] },
  { name: '廚具工程', layer1: ['廚具'], layer2: ['流理台', '櫥櫃', '抽油煙機', '烘碗機', '瓦斯爐', '雙口爐', '水槽', '檯面'] },
  { name: '衛浴設備', layer1: ['衛浴'], layer2: ['馬桶', '面盆', '淋浴', '浴缸', '浴櫃', '乾溼分離', '毛巾架', '化妝鏡'] },
  { name: '空調工程', layer1: ['空調', '冷氣'], layer2: ['風管', '冷媒'] },
  { name: '雜項工程', layer1: ['清潔'], layer2: ['雜項', '窗簾', '燈具安裝', '五金', '收尾', '初驗', '驗收', '交屋'] },
];
const DECOR_CANONICAL_ORDER = DECOR_CATEGORIES.map((c) => c.name);
const GANTT_ROWS = DECOR_CANONICAL_ORDER.concat(['未分類']);
const DECOR_CATEGORY_ORDER = DECOR_CANONICAL_ORDER.concat(['其他']);

function scanLayer(content, layerKey) {
  let best = null;
  DECOR_CATEGORIES.forEach((cat) => {
    cat[layerKey].forEach((kw) => {
      const pos = content.lastIndexOf(kw);
      if (pos >= 0 && (!best || pos > best.pos)) best = { name: cat.name, pos };
    });
  });
  return best ? best.name : null;
}
function classifyLegacy(content) {
  const text = clean(content);
  if (!text) return '未分類';
  return scanLayer(text, 'layer1') || scanLayer(text, 'layer2') || '未分類';
}
function resolveCategory(p) {
  const cat = clean(p.category);
  if (cat && DECOR_CANONICAL_ORDER.includes(cat)) return cat;
  if (cat === '其他') return '未分類';
  return classifyLegacy(p.content);
}
function inferNextStage(c) {
  const list = c.progress || [];
  if (!list.length) return null;
  const cur = resolveCategory(list[list.length - 1]);
  const idx = DECOR_CANONICAL_ORDER.indexOf(cur);
  if (idx < 0 || idx >= DECOR_CANONICAL_ORDER.length - 1) return null;
  return DECOR_CANONICAL_ORDER[idx + 1];
}

const CATEGORY_COLORS = {
  '拆除工程': 'bg-stone-500', '水電工程': 'bg-yellow-500', '泥作工程': 'bg-orange-500',
  '門窗工程': 'bg-cyan-600', '木作工程': 'bg-amber-700', '油漆工程': 'bg-pink-500',
  '系統櫃': 'bg-indigo-500', '廚具工程': 'bg-lime-600', '衛浴設備': 'bg-sky-500',
  '空調工程': 'bg-teal-500', '雜項工程': 'bg-purple-500', '未分類': 'bg-slate-400',
};
const CATEGORY_BADGE = {
  '拆除工程': 'bg-stone-100 text-stone-700', '水電工程': 'bg-yellow-100 text-yellow-800', '泥作工程': 'bg-orange-100 text-orange-700',
  '門窗工程': 'bg-cyan-100 text-cyan-700', '木作工程': 'bg-amber-100 text-amber-800', '油漆工程': 'bg-pink-100 text-pink-700',
  '系統櫃': 'bg-indigo-100 text-indigo-700', '廚具工程': 'bg-lime-100 text-lime-700', '衛浴設備': 'bg-sky-100 text-sky-700',
  '空調工程': 'bg-teal-100 text-teal-700', '雜項工程': 'bg-purple-100 text-purple-700', '未分類': 'bg-slate-100 text-slate-500',
};

let ALL_CASES = [];
let ROLE = ''; let ROLE_LABEL = '';
let FILTER_MODE = null; // null | 'overdue' | 'stale'（僅 admin 有 UI 可觸發）
let GANTT_VIEW_MODE = 'window'; // 'window'（預設，今天±聚焦）| 'full'（看全程）
let PENDING_COUNT = 0; // 資料待補件數，供側欄／更多抽屜 badge 用
let CASES_SUBVIEW = 'active'; // 工程案件模組內部分頁：'active' | 'closed'
let DRAWER_RID = null; // 目前開啟情境面板的案件 rid（null＝關閉）
let DRAWER_LAST_FOCUS = null; // 開啟抽屜前的觸發元素，關閉時歸還焦點
const CASE_VIEW_MODE = new Map(); // rid -> 'gantt' | 'calendar'
const CASE_CAL_MONTH = new Map(); // rid -> { y, m }
let LAST_GANTT_SCROLL_EL = null; // 平台外殼：模組切換時可能在甘特隱藏狀態下渲染，量到的尺寸是 0，
let LAST_GANTT_BOUNDS = null;    // 需要在使用者實際切到甘特頁籤時重新觸發一次今日線捲動定位
function sameDate(a, b) { return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate(); }

async function apiGet(path) {
  const sep = path.includes('?') ? '&' : '?';
  const res = await fetch(`${API_BASE}/${path}${sep}token=${encodeURIComponent(TOKEN)}`);
  let data = null;
  try { data = await res.json(); } catch {}
  if (!res.ok || !data || data.ok !== true) {

// ---------- 甘特圖時間尺度 ----------
function availableTrackWidth(labelColWidth) {
  const main = document.querySelector('main');
  const w = main ? main.clientWidth : 900; // clientWidth 含 main 自己的左右 padding
  return Math.max(w - labelColWidth - 40, 200);
}
function withResponsiveWidth(min, max, labelColWidth) {
  const days = Math.max(daysBetween(min, max), 1);
  const pxPerDay = Math.max(availableTrackWidth(labelColWidth) / days, 10);
  return { min, max, pxPerDay, widthPx: Math.round(pxPerDay * days) };
}
function withFixedWidth(min, max) {
  const days = Math.max(daysBetween(min, max), 1);
  return { min, max, pxPerDay: PX_PER_DAY_FULL, widthPx: Math.max(days * PX_PER_DAY_FULL, 300) };
}
// 今天 −2 週 ~ +6 週，聚焦視窗（P2 起預設模式），今日線永遠在窗內
function computeWindowBounds() {
  const min = todayDate(); min.setDate(min.getDate() - 14);
  const max = todayDate(); max.setDate(max.getDate() + 42);
  return withResponsiveWidth(min, max, LABEL_COL_MAIN);
}
// 看全程／單案自適應：時間軸尺度取「合約起訖 ∪ 全工項起訖」的 min/max（規格書 §空狀態與邊界行為，邏輯不變）
function computeExtentBounds(cases, labelColWidth, fixed) {
  let min = null, max = null;
  const consider = (d) => { if (!d) return; if (!min || d < min) min = d; if (!max || d > max) max = d; };
  cases.forEach((c) => {
    if (!dateIssue(c)) { consider(parseDateOnly(c.startAt)); consider(parseDateOnly(c.endAt)); }
    (c.progress || []).forEach((p) => {
      const s = parseDateOnly(p.startAt), e = parseDateOnly(p.endAt);
      if (s && e && e >= s) { consider(s); consider(e); }
      else if (s && !e) consider(s);
      else if (!s && e) consider(e);
    });
  });
  consider(todayDate());
  if (!min || !max) { min = todayDate(); max = new Date(min); max.setDate(max.getDate() + 30); }
  min = new Date(min); min.setDate(min.getDate() - 3);
  max = new Date(max); max.setDate(max.getDate() + 3);
  return fixed ? withFixedWidth(min, max) : withResponsiveWidth(min, max, labelColWidth);
}
function computeBoundsFull(cases) { return computeExtentBounds(cases, LABEL_COL_MAIN, true); }
function computeItemBounds(c) { return computeExtentBounds([c], LABEL_COL_ITEM, false); }
function offsetPx(date, bounds) { return daysBetween(bounds.min, date) * bounds.pxPerDay; }

function ruler(bounds, labelColWidth) {
  const track = make('div', 'relative h-6');
  track.style.width = `${bounds.widthPx}px`;
  let cursor = new Date(bounds.min);
  cursor.setDate(cursor.getDate() + ((7 - (daysBetween(bounds.min, cursor) % 7)) % 7));
  while (cursor <= bounds.max) {
    const tick = make('div', 'absolute top-0 h-full border-l border-line pl-1 text-[10px] text-inkfaint', fmtShort(cursor));
    tick.style.left = `${offsetPx(cursor, bounds)}px`;
    track.append(tick);
    cursor = new Date(cursor); cursor.setDate(cursor.getDate() + 7);
  }
  const todayTick = make('div', 'gantt-today');
  todayTick.style.left = `${offsetPx(todayDate(), bounds)}px`;
  todayTick.append(make('span', 'gantt-today-label', '今日'));
  track.append(todayTick);
  return track;
}

// 甘特橫條：起日空值不畫、訖日空值視為進行中畫到今天、訖<起不畫（規格書邊界行為，邏輯不變）；
// 聚焦視窗下若日期落在視窗外，做視覺裁切並標小箭頭，不讓極端案把時間軸拉爆。
function ganttBar(startAt, endAt, bounds, colorCls, opts = {}) {
  const s0 = parseDateOnly(startAt);
  let e0 = parseDateOnly(endAt);
  if (!s0) return null;
  if (!e0) e0 = opts.openEnded ? todayDate() : s0;
  if (e0 < s0) return null;
  const clippedLeft = s0 < bounds.min;
  const clippedRight = e0 > bounds.max;
  const s = clippedLeft ? bounds.min : s0;
  const e = clippedRight ? bounds.max : e0;
  if (e < bounds.min || s > bounds.max) return null;
  const bar = make('div', `gantt-bar ${colorCls}`);
  const left = offsetPx(s, bounds);
  const width = Math.max(offsetPx(e, bounds) - left, 6);
  bar.style.left = `${left}px`;
  bar.style.width = `${width}px`;
  if (clippedLeft) bar.append(make('span', 'absolute -left-1 top-1/2 -translate-y-1/2 text-[9px] font-bold leading-none text-white', '‹'));
  if (clippedRight) bar.append(make('span', 'absolute -right-1 top-1/2 -translate-y-1/2 text-[9px] font-bold leading-none text-white', '›'));
  return bar;
}

function trackWrap(bounds) {
  const wrap = make('div', 'relative flex-none');
  wrap.style.width = `${bounds.widthPx}px`;
  const todayLine = make('div', 'gantt-today');
  todayLine.style.left = `${offsetPx(todayDate(), bounds)}px`;
  wrap.append(todayLine);
  return wrap;
}

      const url = `${API_BASE}/decorProgressPhoto?rid=${encodeURIComponent(c.rid)}&row=${encodeURIComponent(p.rowId)}&idx=${i}&token=${encodeURIComponent(TOKEN)}`;
      const link = make('a');
      link.href = url; link.target = '_blank'; link.rel = 'noopener noreferrer';
      const img = document.createElement('img');
      img.src = url; img.loading = 'lazy'; img.alt = '進度照片';
      img.className = 'h-14 w-14 rounded-lg border border-line object-cover bg-paper';
      link.append(img);
      thumbs.append(link);
    }
    row.append(thumbs);
  }
  return row;
}

// P2：新增進度紀錄表單（三種角色 token 皆可寫）。手機直向優先，欄位單欄堆疊。行為與原版一致。
function progressAddForm(c) {
  const box = make('div', 'rounded-lg bg-white p-3');
  box.append(make('p', 'mb-2 text-xs font-bold text-inkmuted', '新增進度紀錄'));
  const form = make('form', 'space-y-2');

  const dateRow = make('div', 'grid grid-cols-2 gap-2');
  const startWrap = make('label', 'block text-xs font-bold text-inkmuted', '工程時間(起) *');
  const startInput = make('input', 'mt-1 block w-full rounded-lg border border-line px-2 py-2 text-sm focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent');
  startInput.type = 'date'; startInput.required = true;
  startWrap.append(startInput);
  const endWrap = make('label', 'block text-xs font-bold text-inkmuted', '工程時間(訖)');
  const endInput = make('input', 'mt-1 block w-full rounded-lg border border-line px-2 py-2 text-sm focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent');
  endInput.type = 'date';
  endWrap.append(endInput);
  dateRow.append(startWrap, endWrap);
  form.append(dateRow);

  const catWrap = make('label', 'block text-xs font-bold text-inkmuted', '工項分類 *');
  const catSelect = make('select', 'mt-1 block w-full rounded-lg border border-line px-2 py-2 text-sm focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent');
  catSelect.required = true;
  const placeholderOpt = make('option', '', '請選擇');
  placeholderOpt.value = '';
  catSelect.append(placeholderOpt);
  DECOR_CATEGORY_ORDER.forEach((name) => {
    const opt = make('option', '', name);
    opt.value = name;
    catSelect.append(opt);
  });
  catWrap.append(catSelect);
  form.append(catWrap);

  const contentWrap = make('label', 'block text-xs font-bold text-inkmuted', '工程內容 *');
  const contentInput = make('textarea', 'mt-1 block w-full rounded-lg border border-line px-2 py-2 text-sm focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent');
  contentInput.required = true; contentInput.rows = 2;
  contentWrap.append(contentInput);
  form.append(contentWrap);

  const photoWrap = make('label', 'block text-xs font-bold text-inkmuted', '進度照片（可多選）');
  const photoInput = make('input', 'mt-1 block w-full text-xs');
  photoInput.type = 'file'; photoInput.accept = 'image/*'; photoInput.multiple = true;
  photoWrap.append(photoInput);
  form.append(photoWrap);

  const msg = make('p', 'hidden text-xs font-bold');
  form.append(msg);

  const submitBtn = make('button', 'w-full rounded-xl bg-accent px-4 py-2 text-sm font-bold text-white hover:bg-accent/90 disabled:opacity-50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent focus-visible:ring-offset-2', '送出進度紀錄');
  submitBtn.type = 'submit';
  form.append(submitBtn);

  form.addEventListener('submit', async (evt) => {
    evt.preventDefault();
    msg.className = 'hidden text-xs font-bold';
    if (!startInput.value || !catSelect.value || !contentInput.value.trim()) {
      msg.textContent = '請填寫必填欄位（起日／工項分類／工程內容）';
      msg.className = 'text-xs font-bold text-mreddark';
      return;
    }
    submitBtn.disabled = true; submitBtn.textContent = '送出中…';
    try {
      const fd = new FormData();
      fd.append('startAt', startInput.value);
      if (endInput.value) fd.append('endAt', endInput.value);
      fd.append('content', contentInput.value.trim());
      fd.append('category', catSelect.value);
      Array.from(photoInput.files || []).forEach((f) => fd.append('photo', f));
      const res = await fetch(`${API_BASE}/decorProgressAdd/${encodeURIComponent(c.rid)}?token=${encodeURIComponent(TOKEN)}`, { method: 'POST', body: fd });
      let data = null; try { data = await res.json(); } catch {}
      if (!res.ok || !data || data.ok !== true) throw new Error((data && data.error) || `HTTP ${res.status}`);
      msg.textContent = '已新增，重新整理中…';
      msg.className = 'text-xs font-bold text-sage';
      await loadAll();
    } catch (err) {
      msg.textContent = `送出失敗：${err.message}`;
      msg.className = 'text-xs font-bold text-mreddark';
      submitBtn.disabled = false; submitBtn.textContent = '送出進度紀錄';
    }
  });

  box.append(form);
  return box;
}

function detailPanel(c) {
  const box = make('div', 'mt-3 space-y-3 rounded-xl bg-paper p-3 sm:p-4');

  // 兩層甘特入口②：詳情抽屜直達該案專屬甘特頁（見 renderGanttDetail）。
  const gotoGanttBtn = make('button', 'flex w-full items-center justify-center gap-1.5 rounded-xl border border-line bg-white py-2 text-xs font-bold text-ink hover:bg-paper focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent', '看此案甘特圖 →');
  gotoGanttBtn.type = 'button';
  gotoGanttBtn.addEventListener('click', () => {
    closeCaseDrawer();
    location.hash = 'gantt/' + encodeURIComponent(c.rid);
  });
  box.append(gotoGanttBtn);

  const stageBox = make('div', 'rounded-lg bg-white p-3 text-sm');
  const next = nextScheduled(c);
  const curP = make('p', '');
  curP.innerHTML = `<span class="font-bold text-inkmuted">目前工項：</span><span class="font-bold text-ink">${clean(c.lastWorkItem) || '—'}</span>`;
  stageBox.append(curP);
  const nextP = make('p', 'mt-1 flex flex-wrap items-center gap-1');
  if (next) {
    nextP.innerHTML = `<span class="font-bold text-inkmuted">下一排定工項：</span><span class="font-bold text-ink">${clean(next.content) || '（未填內容）'}</span><span class="tnum text-inkmuted">（${fmtShort(next.d)}）</span>`;
  } else {
    const inferred = inferNextStage(c);
    if (inferred) {
      nextP.innerHTML = `<span class="font-bold text-inkmuted">下一排定工項：</span><span class="font-bold text-ink">${inferred}</span>`;
      nextP.append(badge('推斷（依慣例順序，非真實排程）', 'bg-flagtint text-flagdark'));
    } else {
      nextP.innerHTML = `<span class="font-bold text-inkmuted">下一排定工項：</span><span class="text-inkmuted">尚未排定下一工項</span>`;
    }
  }
  stageBox.append(nextP);
  box.append(stageBox);

  const progressBox = make('div', 'rounded-lg bg-white p-3');
  progressBox.append(make('p', 'mb-1 text-xs font-bold text-inkmuted', '進度時間軸'));
  const rows = (c.progress || []).slice().sort((a, b) => {
    const da = parseDateOnly(a.startAt), db = parseDateOnly(b.startAt);
    if (!da && !db) return 0; if (!da) return 1; if (!db) return -1; return da - db;
  });
  if (!rows.length) progressBox.append(make('p', 'text-sm text-inkfaint', '尚無進度紀錄'));
  else rows.forEach((p) => progressBox.append(progressLine(p, c)));
  box.append(progressBox);

  box.append(progressAddForm(c));

  const payBox = make('div', 'rounded-lg bg-white p-3');
  const payHead = make('p', 'mb-1 flex items-center justify-between text-xs font-bold text-inkmuted');
  payHead.innerHTML = `<span>各期款狀態</span><span class="tnum">已繳款比例 ${pct(c.paidRatio)}</span>`;
  payBox.append(payHead);
  if (!(c.payments || []).length) payBox.append(make('p', 'text-sm text-inkfaint', '尚無款項紀錄'));
  else c.payments.forEach((p) => payBox.append(paymentRow(p)));
  box.append(payBox);

  if ((c.addons || []).length) {
    const addonBox = make('div', 'rounded-lg bg-white p-3');
    addonBox.append(make('p', 'mb-1 text-xs font-bold text-inkmuted', '追加款'));
    c.addons.forEach((a) => addonBox.append(addonRow(a)));
    box.append(addonBox);
  }

  const fileBox = make('div', 'rounded-lg bg-white p-3');
  const contractCount = Number(c.contractFileCount) || (c.hasContract ? 1 : 0);
  if (contractCount > 1) {
    const list = make('div', 'flex flex-wrap gap-2');
    for (let i = 0; i < contractCount; i++) {
      const link = make('a', 'inline-block rounded-xl bg-accent px-3 py-2 text-xs font-bold text-white hover:bg-accent/90', `合約附件 ${i + 1}`);
      link.href = `${API_BASE}/decorContractFile?rid=${encodeURIComponent(c.rid)}&idx=${i}&token=${encodeURIComponent(TOKEN)}`;
      link.target = '_blank'; link.rel = 'noopener noreferrer';
      list.append(link);
    }
    fileBox.append(list);
  } else if (contractCount === 1) {
    const link = make('a', 'inline-block rounded-xl bg-accent px-4 py-2 text-sm font-bold text-white hover:bg-accent/90', '開啟合約附件');
    link.href = `${API_BASE}/decorFile/${encodeURIComponent(c.rid)}?token=${encodeURIComponent(TOKEN)}`;
    link.target = '_blank'; link.rel = 'noopener noreferrer';
    fileBox.append(link);
  } else {
    const btn = make('button', 'cursor-not-allowed rounded-xl bg-line px-4 py-2 text-sm font-bold text-inkmuted', '未上傳合約');
    btn.type = 'button'; btn.disabled = true;
    fileBox.append(btn);
  }
  if (c.contractTotal !== null) fileBox.append(make('p', 'tnum mt-2 text-xs text-inkmuted', `合約總價款 ${money(c.contractTotal)}`));
  const missingStartCount = (c.progress || []).filter((p) => !parseDateOnly(p.startAt)).length;
  if (missingStartCount > 0) fileBox.append(make('p', 'mt-2 text-xs text-flagdark', `資料品質提示：${missingStartCount} 筆工項缺少起日，未顯示於甘特圖`));
  box.append(fileBox);

  return box;
}

// ---------- 案件詳情情境面板（一方參照版：右側抽屜／手機全屏，取代卡片內展開）----------
function renderDrawerContent(c) {
  byId('caseDrawerName').textContent = c.name;
  byId('caseDrawerMeta').textContent = `監工 ${c.supervisor || '—'}・接案 ${c.assignee || '—'}`;
  const body = byId('caseDrawerBody');
  body.replaceChildren();
  body.append(detailPanel(c));
}
function openCaseDrawer(c, triggerEl) {
  DRAWER_RID = c.rid;
  DRAWER_LAST_FOCUS = triggerEl || document.activeElement;
  renderDrawerContent(c);
  byId('caseDrawer').hidden = false;
  document.body.style.overflow = 'hidden';
  requestAnimationFrame(() => {
    byId('caseDrawerPanel').classList.remove('translate-x-full');
    byId('caseDrawerBackdrop').classList.remove('opacity-0');
  });
  byId('caseDrawerClose').focus();
}
function closeCaseDrawer() {
  if (byId('caseDrawer').hidden) return;
  byId('caseDrawerPanel').classList.add('translate-x-full');
  byId('caseDrawerBackdrop').classList.add('opacity-0');
  document.body.style.overflow = '';
  setTimeout(() => { byId('caseDrawer').hidden = true; }, 300);
  DRAWER_RID = null;
  if (DRAWER_LAST_FOCUS && typeof DRAWER_LAST_FOCUS.focus === 'function') DRAWER_LAST_FOCUS.focus();
}
// renderLists() 每次重繪（篩選／新增進度／展開等）都會呼叫，讓已開啟的抽屜內容跟著最新資料更新，不強制關閉。
function refreshDrawerIfOpen() {
  if (!DRAWER_RID) return;
  const c = ALL_CASES.find((x) => x.rid === DRAWER_RID);
  if (!c) { closeCaseDrawer(); return; }
  renderDrawerContent(c);
}
byId('caseDrawerClose').addEventListener('click', closeCaseDrawer);
byId('caseDrawerBackdrop').addEventListener('click', closeCaseDrawer);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !byId('caseDrawer').hidden) closeCaseDrawer(); });

function renderCaseBlock(c, bounds) {

// ---------- P2：圖一式甘特（展開單案）----------
function renderCaseItemGantt(c) {
  const bounds = computeItemBounds(c);
  const scroll = make('div', 'gantt-scroll rounded-xl border border-line bg-white');
  const inner = make('div', 'inline-block min-w-full');
  const rulerRow = make('div', 'flex items-stretch border-b border-line bg-paper');
  const rulerLabel = make('div', 'sticky left-0 z-10 flex-none border-r border-line bg-paper p-2 text-xs font-bold text-inkmuted', '工項');
  rulerLabel.style.width = `${LABEL_COL_ITEM}px`;
  rulerRow.append(rulerLabel);
  rulerRow.append(ruler(bounds, LABEL_COL_ITEM));
  inner.append(rulerRow);

  const grouped = {};
  GANTT_ROWS.forEach((name) => { grouped[name] = []; });
  (c.progress || []).forEach((p) => { grouped[resolveCategory(p)].push(p); });

  GANTT_ROWS.forEach((name) => {
    const items = grouped[name];
    const rowEl = make('div', 'flex items-stretch border-b border-line/60 last:border-b-0');
    const label = make('div', `sticky left-0 z-10 flex-none border-r border-line bg-white p-2 text-xs font-bold ${name === '未分類' ? 'text-inkfaint' : 'text-inkmuted'}`, name);
    label.style.width = `${LABEL_COL_ITEM}px`;
    rowEl.append(label);
    const track = trackWrap(bounds);
    if (!items.length) {
      track.style.minHeight = '30px';
    } else {
      items.forEach((p, i) => {
        const bar = ganttBar(p.startAt, p.endAt, bounds, CATEGORY_COLORS[name] || 'bg-slate-400', { openEnded: true });
        if (!bar) return;
        if (items.length > 1) { bar.style.top = `${6 + i * 18}px`; bar.style.transform = 'none'; }
        track.append(bar);
      });
      track.style.minHeight = `${Math.max(30, items.length * 18 + 8)}px`;
    }
    rowEl.append(track);
    inner.append(rowEl);
  });
  scroll.append(inner);
  return scroll;
}

// ---------- P2：月曆視圖（展開單案）----------
function renderCaseCalendar(c) {
  let state = CASE_CAL_MONTH.get(c.rid);
  if (!state) { const d = new Date(); state = { y: d.getFullYear(), m: d.getMonth() }; CASE_CAL_MONTH.set(c.rid, state); }
  const first = new Date(state.y, state.m, 1);
  const startWeekday = first.getDay();
  const daysInMonth = new Date(state.y, state.m + 1, 0).getDate();
  const today = todayDate();

  const wrap = make('div', 'rounded-xl border border-line bg-white p-3');
  const nav = make('div', 'mb-2 flex items-center justify-between');
  const prevBtn = make('button', 'rounded-lg border border-line px-3 py-1 text-xs font-bold text-ink hover:bg-paper', '‹ 上月');
  prevBtn.type = 'button';
  const label = make('span', 'tnum text-sm font-bold text-ink', `${state.y} 年 ${state.m + 1} 月`);
  const nextBtn = make('button', 'rounded-lg border border-line px-3 py-1 text-xs font-bold text-ink hover:bg-paper', '下月 ›');
  nextBtn.type = 'button';
  prevBtn.addEventListener('click', () => { const d = new Date(state.y, state.m - 1, 1); CASE_CAL_MONTH.set(c.rid, { y: d.getFullYear(), m: d.getMonth() }); renderLists(); });
  nextBtn.addEventListener('click', () => { const d = new Date(state.y, state.m + 1, 1); CASE_CAL_MONTH.set(c.rid, { y: d.getFullYear(), m: d.getMonth() }); renderLists(); });
  nav.append(prevBtn, label, nextBtn);
  wrap.append(nav);

  const weekHead = make('div', 'grid grid-cols-7 gap-1 text-center text-[10px] font-bold text-inkfaint');
  ['日', '一', '二', '三', '四', '五', '六'].forEach((d) => weekHead.append(make('div', '', d)));
  wrap.append(weekHead);

  const grid = make('div', 'mt-1 grid grid-cols-7 gap-1');
  for (let i = 0; i < startWeekday; i++) grid.append(make('div', 'min-h-[56px] rounded-lg'));
  for (let day = 1; day <= daysInMonth; day++) {
    const cellDate = new Date(state.y, state.m, day);
    const isToday = sameDate(cellDate, today);
    const cell = make('div', `min-h-[56px] rounded-lg border p-1 text-left ${isToday ? 'border-accent bg-accenttint' : 'border-line bg-white'}`);
    cell.append(make('p', 'tnum text-[10px] font-bold text-inkmuted', String(day)));
    const dots = make('div', 'mt-1 flex flex-wrap gap-0.5');
    (c.progress || []).forEach((p) => {
      const s = parseDateOnly(p.startAt);
      if (!s) return;
      let e = parseDateOnly(p.endAt);
      if (!e) e = today > s ? today : s;
      if (e < s) return;
      if (cellDate >= s && cellDate <= e) {
        const cat = resolveCategory(p);
        dots.append(make('span', `inline-block h-2 w-2 rounded-full ${CATEGORY_COLORS[cat] || 'bg-slate-400'}`));
      }
    });
    if (dots.childElementCount) cell.append(dots);
    grid.append(cell);
  }
  wrap.append(grid);
  return wrap;
}

function viewToggle(c) {
  const mode = CASE_VIEW_MODE.get(c.rid) || 'gantt';
  const row = make('div', 'flex gap-2');
  const ganttBtn = make('button', `rounded-lg px-3 py-1 text-xs font-bold ${mode === 'gantt' ? 'bg-accent text-white' : 'border border-line text-inkmuted'}`, '圖一式甘特');
  ganttBtn.type = 'button';
  const calBtn = make('button', `rounded-lg px-3 py-1 text-xs font-bold ${mode === 'calendar' ? 'bg-accent text-white' : 'border border-line text-inkmuted'}`, '月曆');
  calBtn.type = 'button';
  ganttBtn.addEventListener('click', (e) => { e.stopPropagation(); CASE_VIEW_MODE.set(c.rid, 'gantt'); renderLists(); });
  calBtn.addEventListener('click', (e) => { e.stopPropagation(); CASE_VIEW_MODE.set(c.rid, 'calendar'); renderLists(); });
  row.append(ganttBtn, calBtn);
  return row;
}

// ================= 兩層甘特：單案專屬甘特頁（#gantt/<rid>）=================
// 圖一式工項分行（renderCaseItemGantt）／月曆（renderCaseCalendar）／甘特-月曆切換（viewToggle）／
// 時間尺度（computeItemBounds＝合約起訖∪全工項起訖 min/max）全部沿用既有 P2 邏輯，本節只加頁面外殼與路由，
// 不改動上述任一函式（規格書紅線：圖一式與月曆邏輯抬升重用、不重寫）。

function ganttDetailHeader(c) {
  const overdue = isOverdue(c);
  const stale = isStale(c);
  const wrap = make('div', 'mb-4 space-y-3');

  const topRow = make('div', 'flex flex-wrap items-center justify-between gap-2');
  const backBtn = make('button', 'inline-flex items-center gap-1 rounded-xl border border-line px-3 py-1.5 text-xs font-bold text-ink hover:bg-paper focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent', '← 回到設計部總覽');
  backBtn.type = 'button';

// 單案甘特頁的今日線初始捲動定位——比照總覽既有修法（見 scheduleGanttTodayScroll 上方註解），
// 獨立實作、不動總覽那支既有函式，避免影響已驗收過的總覽今日線行為。
function scrollItemGanttToToday(scrollEl, bounds) {
  if (!scrollEl || !bounds) return;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const maxScroll = scrollEl.scrollWidth - scrollEl.clientWidth;
    if (maxScroll <= 0) return;
    const visibleTrackWidth = Math.max(scrollEl.clientWidth - LABEL_COL_ITEM, 0);
    const target = offsetPx(todayDate(), bounds) - visibleTrackWidth / 3;
    scrollEl.scrollLeft = Math.max(0, Math.min(maxScroll, target));
  }));
}

function renderGanttDetail(c) {
  const wrap = byId('ganttDetail');
  wrap.replaceChildren();
  wrap.append(ganttDetailHeader(c));
  wrap.append(viewToggle(c));

  const mode = CASE_VIEW_MODE.get(c.rid) || 'gantt';
  if (mode === 'calendar') {
    wrap.append(renderCaseCalendar(c));
  } else {
    const bounds = computeItemBounds(c);
    const scrollEl = renderCaseItemGantt(c);
    wrap.append(scrollEl);
    scrollItemGanttToToday(scrollEl, bounds);
  }
}

function currentGanttRid() {
  const h = (location.hash || '').replace('#', '');
  const parts = h.split('/');
  if (parts[0] !== 'gantt' || !parts[1]) return null;
  return decodeURIComponent(parts[1]);
}

// applyRoute()（模組切換）與 renderLists()（資料重繪／篩選／新增進度後）皆會呼叫本函式，
// 讓 #gantt/<rid> 深連結、重新整理、資料更新後都能正確顯示總覽或單案頁（比照 refreshDrawerIfOpen 模式）。
function renderGanttRoute() {
  const rid = currentGanttRid();
  const overviewEl = byId('ganttOverview');
  const detailEl = byId('ganttDetail');
  const onGanttView = currentView() === 'gantt';
  if (!rid) {
    overviewEl.hidden = false;
    detailEl.hidden = true;
    if (onGanttView) byId('pageTitle').textContent = VIEW_TITLES.gantt;
    return;
  }
  overviewEl.hidden = true;
  detailEl.hidden = false;
  const c = ALL_CASES.find((x) => String(x.rid) === String(rid));
  if (!c) {
    detailEl.replaceChildren(ganttDetailNotFoundBox());
    if (onGanttView) byId('pageTitle').textContent = VIEW_TITLES.gantt;
    return;
  }
  renderGanttDetail(c);
  if (onGanttView) byId('pageTitle').textContent = c.name;
}

// 平台外殼：模組切換時甘特頁籤可能是 hidden 狀態，此時 clientWidth/scrollWidth 量到的是 0，
// 今日線捲動定位要延到使用者實際切到甘特頁籤（applyRoute 偵測到 view==='gantt'）時才重新觸發。
function scheduleGanttTodayScroll() {
  if (!LAST_GANTT_SCROLL_EL || !LAST_GANTT_BOUNDS) return;
  if (GANTT_VIEW_MODE !== 'window') return;
  const scroll = LAST_GANTT_SCROLL_EL, bounds = LAST_GANTT_BOUNDS;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const maxScroll = scroll.scrollWidth - scroll.clientWidth;
    if (maxScroll > 0) {
      const visibleTrackWidth = Math.max(scroll.clientWidth - LABEL_COL_MAIN, 0);
      const target = offsetPx(todayDate(), bounds) - visibleTrackWidth / 3;
      scroll.scrollLeft = Math.max(0, Math.min(maxScroll, target));
    }
  }));
}

function renderGantt(cases) {
  const wrap = byId('ganttWrap');
  wrap.replaceChildren();
  byId('ganttRangeToggle').textContent = GANTT_VIEW_MODE === 'full' ? '回到本週視窗' : '看全程';
  if (!cases.length) {
    wrap.append(make('div', 'p-8 text-center text-sm text-inkmuted', '目前沒有工程中案件'));
    LAST_GANTT_SCROLL_EL = null; LAST_GANTT_BOUNDS = null;
    return;
  }
  const bounds = GANTT_VIEW_MODE === 'full' ? computeBoundsFull(cases) : computeWindowBounds();
  const scroll = make('div', 'gantt-scroll');
  const inner = make('div', 'inline-block min-w-full');

  const rulerRow = make('div', 'flex items-stretch border-b border-line bg-paper');
  const rulerLabel = make('div', 'sticky left-0 z-10 flex-none border-r border-line bg-paper p-2 text-xs font-bold text-inkmuted', '案件 / 時間軸');
  rulerLabel.style.width = `${LABEL_COL_MAIN}px`;
  rulerRow.append(rulerLabel);
  rulerRow.append(ruler(bounds, LABEL_COL_MAIN));
  inner.append(rulerRow);

  cases.forEach((c) => inner.append(renderCaseBlock(c, bounds)));
  scroll.append(inner);
  wrap.append(scroll);

  // bugfix 2026-07-22：聚焦視窗模式下把橫向捲動初始位置移到「今日線約在可視寬度 1/3 處」，
  // 避免手機小螢幕（固定 230px 案名欄吃掉大半視寬）今日線初始貼右邊緣幾乎看不到。
  // 案名欄是 sticky+z-10、永遠釘在可視區左側 230px，track 實際「看得到」的寬度只有
  // clientWidth-LABEL_COL_MAIN；今日線落點要以這段可視 track 寬度的 1/3 為準，
  // 不能直接用整個 clientWidth 的 1/3（那樣算出的捲動量會讓今日線剛好落在 sticky 欄底下、
  // z-index 蓋住等於白算，已實測抓到這個坑）。
  // 桌機視窗夠寬時 maxScroll<=0，不動作，對桌機無害；「看全程」模式不受影響。
  // 用雙 rAF 延後讀版面尺寸：Tailwind CDN 是 runtime JIT，新插入的 class（inline-block/min-w-full 等）
  // 要等它的 MutationObserver 注入樣式後 clientWidth/scrollWidth 才準確，插入當下同步讀值會量錯（已實測）。
  // 平台外殼版：若渲染當下甘特頁籤是 hidden（使用者停在別的模組），量到的尺寸會是 0，
  // 此處先存 bounds/scroll 供 applyRoute() 在使用者切到甘特頁籤時重新觸發一次。
  LAST_GANTT_SCROLL_EL = scroll; LAST_GANTT_BOUNDS = bounds;
  scheduleGanttTodayScroll();
}

// ---------- 主渲染流程 ----------
function renderLists() {
  const active = ALL_CASES.filter((c) => c.status === STATUS_ACTIVE);

  if (!active.length) {
    byId('actionSection').hidden = true;
    byId('progressSection').hidden = true;
    renderFilterBanner();
    renderNormalList([]);
    renderGantt([]);
    renderDataIssueList([]);
    renderClosed();
    refreshDrawerIfOpen();
    renderGanttRoute();
    return;
  }
  byId('actionSection').hidden = false;
  byId('progressSection').hidden = false;

  const dataIssueCases = active.filter((c) => dateIssue(c));
  const workable = active.filter((c) => !dateIssue(c));
  let urgent = workable.filter((c) => isOverdue(c) || isStale(c));
  let normal = workable.filter((c) => !isOverdue(c) && !isStale(c));

  if (FILTER_MODE === 'overdue') { urgent = urgent.filter((c) => isOverdue(c)); normal = []; }
  // bugfix 2026-07-22：黃燈篩選口徑比照「逾期」寫法——直接從 active 全集合用 isStale() 撈，
  // 不再局限於 workable（漏掉同時逾期／資料待補 bucket 的黃燈案）。isStale()/isOverdue() 判定函式本身不變。
  else if (FILTER_MODE === 'stale') { urgent = active.filter((c) => isStale(c)); normal = []; }

  urgent.sort((a, b) => {
    const aOverdue = isOverdue(a), bOverdue = isOverdue(b);
    if (aOverdue !== bOverdue) return aOverdue ? -1 : 1;
    if (aOverdue) return (overdueDaysCount(b) || 0) - (overdueDaysCount(a) || 0);
    return (staleDaysCount(b) || 0) - (staleDaysCount(a) || 0);
  });
  normal.sort((a, b) => {
    const da = parseDateOnly(a.endAt), db = parseDateOnly(b.endAt);
    if (!da && !db) return 0; if (!da) return 1; if (!db) return -1; return da - db;
  });

  renderFilterBanner();
  renderActionFeed(urgent);
  renderProgressGroup(normal);
  renderNormalList(normal);
  renderGantt(FILTER_MODE ? urgent : urgent.concat(normal));
  renderDataIssueList(dataIssueCases);
  renderClosed();
  refreshDrawerIfOpen();
  renderGanttRoute();
}

function renderClosed() {
  const rest = ALL_CASES.filter((c) => c.status !== STATUS_ACTIVE);
  const closedList = byId('closedList');
  closedList.replaceChildren();
  if (!rest.length) closedList.append(emptyNote('目前沒有已結案或暫停中案件。'));
  else rest.forEach((c) => closedList.append(closedCard(c)));
  renderCasesSubTabLabels(rest.length);
}

function icon(name) {
  const paths = {
    dashboard: '<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>',
    cases: '<path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/>',
    gantt: '<rect x="3" y="5" width="12" height="3" rx="1.5"/><rect x="3" y="10.5" width="17" height="3" rx="1.5"/><rect x="3" y="16" width="8" height="3" rx="1.5"/>',
    pending: '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3" fill="none" stroke-linecap="round"/>',
    more: '<circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/>',
    repair: '<path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L4 17l3 3 5.3-5.3a4 4 0 0 0 5.4-5.4l-2.6 2.6-2-2z" fill="none" stroke-linejoin="round"/>',
    quote: '<path d="M6 3h9l3 3v15H6z" fill="none"/><path d="M9 9h6M9 13h6M9 17h3" stroke-linecap="round"/>',
  };
  return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round">${paths[name] || ''}</svg>`;
}

];

];

function currentView() {
  // #gantt/<rid> 亦屬 gantt 模組（單案甘特頁），故只取 '/' 前的頂層 hash 段判斷。
  const h = (location.hash || '').replace('#', '').split('/')[0];
  return VALID_VIEWS.includes(h) ? h : 'dashboard';
}

let toastTimer = null;
function showToast(msg) {
  let t = byId('toast');
  if (!t) {
    t = make('div', 'fixed inset-x-0 bottom-24 z-[60] mx-auto w-fit max-w-[90vw] rounded-full bg-ink px-4 py-2 text-center text-sm font-bold text-white shadow-lg lg:bottom-6');
    t.id = 'toast';
    t.style.opacity = '0';
    document.body.append(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 2400);
}

function updateBadges() {
  const b1 = byId('sidebarPendingBadge'); if (b1) b1.textContent = String(PENDING_COUNT);
  const b2 = byId('moreSheetPendingBadge'); if (b2) b2.textContent = String(PENDING_COUNT);

function renderSidebarNav() {

// ---------- 工程案件模組：進行中／已結案暫停中 分頁 ----------

  CASES_CLOSED_COUNT = closedCount;

byId('casesTabClosed').addEventListener('click', () => { CASES_SUBVIEW = 'closed'; applyCasesSubTabStyles(); });

// ---------- 路由 ----------
function applyRoute() {
  const view = currentView();
  VALID_VIEWS.forEach((v) => { byId('view-' + v).hidden = (v !== view); });
  byId('pageTitle').textContent = VIEW_TITLES[view];
  renderSidebarNav();
  renderBottomTabs();
  closeMoreSheet();
  if (view === 'gantt') {
    renderGanttRoute();
    scheduleGanttTodayScroll();
  }
}
window.addEventListener('hashchange', applyRoute);

async function loadAll() {
  setGlobalMessage('loading', '載入中…');
  try {
    const data = await apiGet('decorListAll');
    ALL_CASES = Array.isArray(data.cases) ? data.cases : [];
    ROLE = data.role || ''; ROLE_LABEL = data.label || '';
    renderHeader();
    renderStats(data.stats);
    renderLists();
    setGlobalMessage(null);
    byId('updatedAt').textContent = `更新：${new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' })}`;
  } catch (error) {
    if (error.status === 404) { showInvalid(); return; }
    setGlobalMessage('error', `載入失敗：${error.message}（請按右上角「重新整理」再試一次）`);
  }
}

function showInvalid() {
  byId('invalidScreen').hidden = false;
  byId('app').hidden = true;
}

byId('refreshButton').addEventListener('click', loadAll);
byId('ganttRangeToggle').addEventListener('click', () => {
  GANTT_VIEW_MODE = GANTT_VIEW_MODE === 'full' ? 'window' : 'full';
  renderLists();
});
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (!byId('app').hidden) renderLists(); }, 150);
});

if (!TOKEN) {
  showInvalid();
} else {
  byId('app').hidden = false;
  const initHashTop = (location.hash || '').replace('#', '').split('/')[0];
  if (!VALID_VIEWS.includes(initHashTop)) {
    history.replaceState(null, '', location.pathname + location.search + '#dashboard');
  }
  applyCasesSubTabStyles();
  applyRoute();
  loadAll();
}
</script>
</body>
</html>
