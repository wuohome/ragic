<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">

  <meta name="referrer" content="no-referrer">

  <script>
  (function () {
    var u = new URL(location.href);
    if (!u.searchParams.has('v')) {
      u.searchParams.set('v', new Date().toISOString().slice(0, 10).replace(/-/g, ''));
      location.replace(u.toString());
    }
  })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", "Segoe UI", sans-serif; }
    button, select { min-height: 40px; }

<body class="min-h-screen bg-slate-100 text-slate-800">
  <div id="invalidLink" class="hidden min-h-screen items-center justify-center p-6">
    <div class="w-full max-w-md rounded-2xl border border-red-200 bg-white p-8 text-center shadow-sm">

      <p class="mt-2 text-sm text-slate-500">請使用管理員提供的設計部工作檯專屬連結。</p>
    </div>
  </div>

  <div id="app" class="hidden">
    <header class="sticky top-0 z-30 border-b border-slate-200 bg-white/95 backdrop-blur">

        <div>
          <p id="roleLabel" class="text-xs font-bold tracking-widest text-orange-600">窩的家・設計部工作檯</p>
          <h1 class="text-xl font-extrabold text-slate-900">工程進度工作檯</h1>
        </div>
        <div class="flex items-center gap-2">
          <span id="updatedAt" class="hidden text-xs text-slate-500 sm:inline"></span>
          <button id="refreshButton" type="button" class="rounded-xl border border-slate-300 px-4 text-sm font-bold hover:bg-slate-50">重新整理</button>
        </div>

    <main class="mx-auto max-w-7xl space-y-6 px-4 py-5">

      <div id="globalMessage" class="rounded-2xl border border-slate-200 bg-white p-5 text-center text-sm text-slate-500">載入中…</div>

      <section aria-labelledby="ganttTitle">
        <div class="mb-3">
          <p class="text-xs font-bold tracking-widest text-orange-600">甘特圖 ＋ 案件總覽</p>

          <p class="mt-1 text-sm text-slate-500">點案名可展開工項橫條與詳情；紅色代表合約已逾期。手機可左右滑動看時間軸。</p>
        </div>
        <div id="ganttWrap" class="rounded-2xl border border-slate-200 bg-white"></div>
      </section>

      <section aria-labelledby="closedTitle" class="border-t border-slate-200 pt-6">

          <summary class="cursor-pointer text-sm font-bold text-slate-500">
            <span id="closedTitle">已結案／暫停中案件</span>
          </summary>
          <div id="closedList" class="mt-3 grid gap-3 sm:grid-cols-2 lg:grid-cols-3"></div>
        </details>
      </section>
    </main>
  </div>

<script>
'use strict';
const API_BASE = 'https://wuohome-ragic-proxy.wuohome.workers.dev';
const TOKEN = new URLSearchParams(location.search).get('token') || '';
const STATUS_ACTIVE = '🛠️工程中';
const STALE_DAYS = 7;
const PX_PER_DAY = 6;

const byId = (id) => document.getElementById(id);
const clean = (v) => String(v ?? '').trim();
const money = (v) => (v === null || v === undefined || v === '') ? '—' : `NT$ ${Number(v).toLocaleString('zh-TW')}`;
const pct = (v) => (v === null || v === undefined || v === '') ? '—' : `${Math.round(Number(v) * 100)}%`;

function make(tag, cls, text) {
  const node = document.createElement(tag);
  if (cls) node.className = cls;
  if (text !== undefined) node.textContent = text;
  return node;
}

function parseDateOnly(s) {
  const m = /^(\d{4})\/(\d{2})\/(\d{2})/.exec(clean(s));
  return m ? new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3])) : null;
}
function todayDate() { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function daysBetween(a, b) { return Math.round((b - a) / 86400000); }
function fmtShort(d) { return d ? `${d.getMonth() + 1}/${d.getDate()}` : '—'; }

// 主約工期資料品質：任一空值 or 訖<起（填錯）
function dateIssue(c) {
  const s = parseDateOnly(c.startAt), e = parseDateOnly(c.endAt);
  if (!s || !e) return 'missing';
  if (e < s) return 'inverted';
  return null;
}
function isOverdue(c) {
  if (c.status !== STATUS_ACTIVE) return false;
  if (dateIssue(c)) return false;
  return parseDateOnly(c.endAt) < todayDate();
}
function isStale(c) {
  if (c.status !== STATUS_ACTIVE) return false;
  const ref = parseDateOnly(c.lastUpdateAt) || parseDateOnly(c.startAt);
  if (!ref) return false;
  return daysBetween(ref, todayDate()) >= STALE_DAYS;
}
function insufficientData(c) {
  return c.status === STATUS_ACTIVE && !parseDateOnly(c.lastUpdateAt) && !parseDateOnly(c.startAt);
}
function nextScheduled(c) {
  const today = todayDate();
  const items = (c.progress || [])
    .map((p) => ({ ...p, d: parseDateOnly(p.startAt) }))
    .filter((p) => p.d && p.d > today)
    .sort((a, b) => a.d - b.d);
  return items[0] || null;
}

// ---------- P2：工項分類（12 選項）＋關鍵字兩層掃描（規格書 § 工項順序與關鍵字對照 逐字實作）----------
// 每項 layer1=工種詞（規格書明列「第一層只掃工種詞」的觸發字）、layer2=細項詞（第一層零命中才掃）。
const DECOR_CATEGORIES = [
  { name: '拆除工程', layer1: ['拆除'], layer2: ['打牆', '打除', '剔除', '清運', '廢棄物', '保護工程'] },
  { name: '水電工程', layer1: ['水電'], layer2: ['配電', '配管', '管溝', '拉線', '給排水', '電線', '迴路', '弱電', '開關', '插座', '崁燈', '吸頂燈', '熱水器'] },
  { name: '泥作工程', layer1: ['泥作'], layer2: ['防水', '貼磚', '貼覆', '磁磚', '壁磚', '地磚', '板岩磚', '拋光磚', '石英磚', '門檻', '打底', '墊高', '洩水', '砌磚', '粉光', '水泥', '填縫'] },
  { name: '門窗工程', layer1: ['門窗'], layer2: ['鋁窗', '氣密窗', '氣密', '落地窗', '大門', '室內門', '鋁框拉門', '玻璃', '紗窗'] },
  { name: '木作工程', layer1: ['木作', '木工'], layer2: ['天花', '隔間', '輕隔間', '封板', '電視牆', '木地板', '卡扣地板'] },
  { name: '油漆工程', layer1: ['油漆'], layer2: ['批土', '補土', '打磨', '噴漆', '乳膠漆', '上漆'] },
  { name: '系統櫃', layer1: ['系統櫃'], layer2: ['系統家具', '系統板材'] },
  { name: '廚具工程', layer1: ['廚具'], layer2: ['流理台', '櫥櫃', '抽油煙機', '烘碗機', '瓦斯爐', '雙口爐', '水槽', '檯面'] },
  { name: '衛浴設備', layer1: ['衛浴'], layer2: ['馬桶', '面盆', '淋浴', '浴缸', '浴櫃', '乾溼分離', '毛巾架', '化妝鏡'] },
  { name: '空調工程', layer1: ['空調', '冷氣'], layer2: ['風管', '冷媒'] },
  { name: '雜項工程', layer1: ['清潔'], layer2: ['雜項', '窗簾', '燈具安裝', '五金', '收尾', '初驗', '驗收', '交屋'] },
];
const DECOR_CANONICAL_ORDER = DECOR_CATEGORIES.map((c) => c.name); // 11 項，核定預設順序
const GANTT_ROWS = DECOR_CANONICAL_ORDER.concat(['未分類']); // 圖一式左側固定 12 列
const DECOR_CATEGORY_ORDER = DECOR_CANONICAL_ORDER.concat(['其他']); // 新增表單下拉，12 選項

function scanLayer(content, layerKey) {
  let best = null;
  DECOR_CATEGORIES.forEach((cat) => {
    cat[layerKey].forEach((kw) => {
      const pos = content.lastIndexOf(kw);
      if (pos >= 0 && (!best || pos > best.pos)) best = { name: cat.name, pos };
    });
  });
  return best ? best.name : null;
}
// 既有紀錄無「工項分類」值時，依工程內容近似歸類；無命中歸「未分類」，不強猜。
function classifyLegacy(content) {
  const text = clean(content);
  if (!text) return '未分類';
  return scanLayer(text, 'layer1') || scanLayer(text, 'layer2') || '未分類';
}
// 決定一筆進度紀錄要落在圖一式／月曆的哪一列：有效的 11 項分類值直接採用；「其他」與空值／
// 非白名單值一律走未分類桶（圖一式左側固定列只有 11+未分類，共 12 列，見規格書 §核心視圖）。
function resolveCategory(p) {
  const cat = clean(p.category);
  if (cat && DECOR_CANONICAL_ORDER.includes(cat)) return cat;
  if (cat === '其他') return '未分類';
  return classifyLegacy(p.content);
}
// 下一階段推斷：取「目前工項」（=Ragic LAST(C16) 對應的最後一筆子表列，即 c.progress 陣列最後
// 一項）的分類，在核定順序找下一項；找不到（未分類/其他/已是最後一項雜項工程）回 null 交由呼叫端
// fallback 顯示「尚未排定下一工項」。
function inferNextStage(c) {
  const list = c.progress || [];
  if (!list.length) return null;
  const cur = resolveCategory(list[list.length - 1]);
  const idx = DECOR_CANONICAL_ORDER.indexOf(cur);
  if (idx < 0 || idx >= DECOR_CANONICAL_ORDER.length - 1) return null;
  return DECOR_CANONICAL_ORDER[idx + 1];
}

const CATEGORY_COLORS = {
  '拆除工程': 'bg-stone-500', '水電工程': 'bg-yellow-500', '泥作工程': 'bg-orange-500',
  '門窗工程': 'bg-cyan-600', '木作工程': 'bg-amber-700', '油漆工程': 'bg-pink-500',
  '系統櫃': 'bg-indigo-500', '廚具工程': 'bg-lime-600', '衛浴設備': 'bg-sky-500',
  '空調工程': 'bg-teal-500', '雜項工程': 'bg-purple-500', '未分類': 'bg-slate-400',
};
const CATEGORY_BADGE = {
  '拆除工程': 'bg-stone-100 text-stone-700', '水電工程': 'bg-yellow-100 text-yellow-800', '泥作工程': 'bg-orange-100 text-orange-700',
  '門窗工程': 'bg-cyan-100 text-cyan-700', '木作工程': 'bg-amber-100 text-amber-800', '油漆工程': 'bg-pink-100 text-pink-700',
  '系統櫃': 'bg-indigo-100 text-indigo-700', '廚具工程': 'bg-lime-100 text-lime-700', '衛浴設備': 'bg-sky-100 text-sky-700',
  '空調工程': 'bg-teal-100 text-teal-700', '雜項工程': 'bg-purple-100 text-purple-700', '未分類': 'bg-slate-100 text-slate-500',
};

let ALL_CASES = [];
let ROLE = ''; let ROLE_LABEL = '';
const EXPANDED = new Set();
const CASE_VIEW_MODE = new Map(); // rid -> 'gantt' | 'calendar'（案件詳情內圖一式／月曆切換，預設 gantt）
const CASE_CAL_MONTH = new Map(); // rid -> { y, m }（月曆目前顯示的年月，預設本月）
function sameDate(a, b) { return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate(); }

async function apiGet(path) {
  const sep = path.includes('?') ? '&' : '?';
  const res = await fetch(`${API_BASE}/${path}${sep}token=${encodeURIComponent(TOKEN)}`);
  let data = null;
  try { data = await res.json(); } catch {}
  if (!res.ok || !data || data.ok !== true) {
    const err = new Error((data && data.error) || `HTTP ${res.status}`);
    err.status = res.status;
    throw err;
  }
  return data;
}

function showLoading() {
  const m = byId('globalMessage');
  m.className = 'rounded-2xl border border-slate-200 bg-white p-5 text-center text-sm text-slate-500';
  m.textContent = '載入中…';
  m.classList.remove('hidden');
}
function showError(msg) {
  const m = byId('globalMessage');
  m.className = 'rounded-2xl border border-red-200 bg-red-50 p-5 text-center text-sm text-red-700';
  m.textContent = `載入失敗：${msg}（請按右上角「重新整理」再試一次）`;
  m.classList.remove('hidden');
}
function hideLoading() { byId('globalMessage').classList.add('hidden'); }

function metric(label, value, accent) {
  const card = make('div', 'rounded-2xl border border-slate-200 bg-white p-5 shadow-sm');
  card.append(make('p', 'text-sm font-bold text-slate-500', label), make('p', `mt-2 text-3xl font-black ${accent}`, String(value)));
  return card;
}

function renderStats(stats) {
  const row = byId('statsRow');
  if (!stats) { row.classList.add('hidden'); return; }
  row.replaceChildren(
    metric('工程中件數', stats.active ?? 0, 'text-orange-600'),
    metric('逾期件數', stats.overdue ?? 0, 'text-red-600'),
    metric('停更黃燈件數', stats.stale ?? 0, 'text-amber-600')
  );
  row.classList.remove('hidden');
}

function badge(text, cls) { return make('span', `inline-block rounded-full px-2 py-0.5 text-xs font-bold ${cls}`, text); }

function caseBadges(c) {
  const list = [];
  const issue = dateIssue(c);
  if (issue === 'missing') list.push(badge('⚠️工期未填', 'bg-slate-200 text-slate-700'));
  if (issue === 'inverted') list.push(badge('⚠️工期日期有誤', 'bg-slate-200 text-slate-700'));
  if (isOverdue(c)) list.push(badge('逾期', 'bg-red-100 text-red-700'));
  if (isStale(c)) list.push(badge('催更', 'bg-amber-100 text-amber-800'));
  if (insufficientData(c)) list.push(badge('⚠️資料不足', 'bg-slate-200 text-slate-600'));
  return list;
}

// ---------- 甘特圖時間尺度 ----------
function computeBounds(cases) {
  let min = null, max = null;
  const consider = (d) => { if (!d) return; if (!min || d < min) min = d; if (!max || d > max) max = d; };
  cases.forEach((c) => {
    if (!dateIssue(c)) { consider(parseDateOnly(c.startAt)); consider(parseDateOnly(c.endAt)); }
    (c.progress || []).forEach((p) => {
      const s = parseDateOnly(p.startAt), e = parseDateOnly(p.endAt);
      if (s && e && e >= s) { consider(s); consider(e); }
      else if (s && !e) consider(s);
      else if (!s && e) consider(e);
    });
  });
  consider(todayDate());
  if (!min || !max) { min = todayDate(); max = new Date(min); max.setDate(max.getDate() + 30); }
  min = new Date(min); min.setDate(min.getDate() - 3);
  max = new Date(max); max.setDate(max.getDate() + 3);
  return { min, max, widthPx: Math.max(daysBetween(min, max) * PX_PER_DAY, 300) };
}
function offsetPx(date, min) { return daysBetween(min, date) * PX_PER_DAY; }

function ruler(bounds) {
  const track = make('div', 'relative h-6');
  track.style.width = `${bounds.widthPx}px`;
  let cursor = new Date(bounds.min);
  cursor.setDate(cursor.getDate() + ((7 - (daysBetween(bounds.min, cursor) % 7)) % 7));
  while (cursor <= bounds.max) {
    const tick = make('div', 'absolute top-0 h-full border-l border-slate-200 pl-1 text-[10px] text-slate-400', fmtShort(cursor));
    tick.style.left = `${offsetPx(cursor, bounds.min)}px`;
    track.append(tick);
    cursor = new Date(cursor); cursor.setDate(cursor.getDate() + 7);
  }
  const todayTick = make('div', 'gantt-today');
  todayTick.style.left = `${offsetPx(todayDate(), bounds.min)}px`;
  todayTick.style.top = '0'; todayTick.style.height = '100%';
  track.append(todayTick);
  return track;
}

function ganttBar(startAt, endAt, bounds, colorCls, opts = {}) {
  const s = parseDateOnly(startAt);
  let e = parseDateOnly(endAt);
  if (!s) return null; // 工項列起日空值 → 該列不畫條
  if (!e) e = opts.openEnded ? todayDate() : s; // 訖日空值視為進行中，畫到今天
  if (e < s) return null; // 訖日早於起日（填錯）→ 不畫條
  const bar = make('div', `gantt-bar ${colorCls}`);
  const left = offsetPx(s, bounds.min);
  const width = Math.max(offsetPx(e, bounds.min) - left, 6);
  bar.style.left = `${left}px`;
  bar.style.width = `${width}px`;
  return bar;
}

function trackWrap(bounds) {
  const wrap = make('div', 'relative flex-none');
  wrap.style.width = `${bounds.widthPx}px`;
  const todayLine = make('div', 'gantt-today');
  todayLine.style.left = `${offsetPx(todayDate(), bounds.min)}px`;
  wrap.append(todayLine);
  return wrap;
}

function paymentRow(p) {
  const row = make('div', 'flex items-center justify-between border-b border-slate-100 py-1.5 text-sm');
  row.append(
    make('span', 'text-slate-600', clean(p.name) || '（未命名期別）'),
    make('span', 'flex items-center gap-2 font-bold')
  );
  const right = row.lastChild;
  right.append(
    make('span', 'text-slate-500', pct(p.ratio)),
    badge(p.paid ? '已收' : '未收', p.paid ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-600')
  );
  return row;
}

function addonRow(a) {
  const row = make('div', 'flex items-center justify-between border-b border-slate-100 py-1.5 text-sm');
  row.append(
    make('span', 'text-slate-600', `${clean(a.date) || '—'}・${clean(a.item) || '（未命名項目）'}`),
    make('span', 'font-bold text-slate-800', money(a.amount))
  );
  return row;
}

function progressLine(p, c) {
  const s = parseDateOnly(p.startAt), e = parseDateOnly(p.endAt);
  let dateText;
  if (!s) dateText = '（缺起日）';
  else if (e && e < s) dateText = `${clean(p.startAt)} ~ ${clean(p.endAt)}（日期填反）`;
  else dateText = `${clean(p.startAt)} ~ ${e ? clean(p.endAt) : '進行中'}`;
  const row = make('div', 'border-b border-slate-100 py-1.5 text-sm');
  const top = make('div', 'flex flex-wrap items-start gap-2');
  const catName = resolveCategory(p);
  top.append(
    make('span', 'shrink-0 text-xs font-bold text-slate-400', dateText),
    badge(clean(p.category) || `${catName}（推測）`, CATEGORY_BADGE[catName] || 'bg-slate-100 text-slate-600'),
    make('span', 'text-slate-700', clean(p.content) || '（未填工程內容）')
  );
  row.append(top);
  // P2：進度照片縮圖，點開經 decorProgressPhoto 代理回看（禁裸連 Ragic 附件 URL）
  const count = Number(p.photoCount) || 0;
  if (count > 0) {
    const thumbs = make('div', 'mt-1.5 flex flex-wrap gap-1.5');
    for (let i = 0; i < count; i++) {
      const url = `${API_BASE}/decorProgressPhoto?rid=${encodeURIComponent(c.rid)}&row=${encodeURIComponent(p.rowId)}&idx=${i}&token=${encodeURIComponent(TOKEN)}`;
      const link = make('a');
      link.href = url; link.target = '_blank'; link.rel = 'noopener noreferrer';
      const img = document.createElement('img');
      img.src = url; img.loading = 'lazy'; img.alt = '進度照片';
      img.className = 'h-14 w-14 rounded-lg border border-slate-200 object-cover bg-slate-100';
      link.append(img);
      thumbs.append(link);
    }
    row.append(thumbs);
  }
  return row;
}

// P2：新增進度紀錄表單（三種角色 token 皆可寫）。手機直向優先，欄位單欄堆疊。
function progressAddForm(c) {
  const box = make('div', 'rounded-lg bg-white p-3');
  box.append(make('p', 'mb-2 text-xs font-bold text-slate-500', '新增進度紀錄'));
  const form = make('form', 'space-y-2');

  const dateRow = make('div', 'grid grid-cols-2 gap-2');
  const startWrap = make('label', 'block text-xs font-bold text-slate-500', '工程時間(起) *');
  const startInput = make('input', 'mt-1 block w-full rounded-lg border border-slate-300 px-2 py-2 text-sm');
  startInput.type = 'date'; startInput.required = true;
  startWrap.append(startInput);
  const endWrap = make('label', 'block text-xs font-bold text-slate-500', '工程時間(訖)');
  const endInput = make('input', 'mt-1 block w-full rounded-lg border border-slate-300 px-2 py-2 text-sm');
  endInput.type = 'date';
  endWrap.append(endInput);
  dateRow.append(startWrap, endWrap);
  form.append(dateRow);

  const catWrap = make('label', 'block text-xs font-bold text-slate-500', '工項分類 *');
  const catSelect = make('select', 'mt-1 block w-full rounded-lg border border-slate-300 px-2 py-2 text-sm');
  catSelect.required = true;
  const placeholderOpt = make('option', '', '請選擇');
  placeholderOpt.value = '';
  catSelect.append(placeholderOpt);
  DECOR_CATEGORY_ORDER.forEach((name) => {
    const opt = make('option', '', name);
    opt.value = name;
    catSelect.append(opt);
  });
  catWrap.append(catSelect);
  form.append(catWrap);

  const contentWrap = make('label', 'block text-xs font-bold text-slate-500', '工程內容 *');
  const contentInput = make('textarea', 'mt-1 block w-full rounded-lg border border-slate-300 px-2 py-2 text-sm');
  contentInput.required = true; contentInput.rows = 2;
  contentWrap.append(contentInput);
  form.append(contentWrap);

  const photoWrap = make('label', 'block text-xs font-bold text-slate-500', '進度照片（可多選）');
  const photoInput = make('input', 'mt-1 block w-full text-xs');
  photoInput.type = 'file'; photoInput.accept = 'image/*'; photoInput.multiple = true;
  photoWrap.append(photoInput);
  form.append(photoWrap);

  const msg = make('p', 'hidden text-xs font-bold');
  form.append(msg);

  const submitBtn = make('button', 'w-full rounded-xl bg-orange-600 px-4 py-2 text-sm font-bold text-white hover:bg-orange-700 disabled:opacity-50', '送出進度紀錄');
  submitBtn.type = 'submit';
  form.append(submitBtn);

  form.addEventListener('submit', async (evt) => {
    evt.preventDefault();
    msg.className = 'hidden text-xs font-bold';
    if (!startInput.value || !catSelect.value || !contentInput.value.trim()) {
      msg.textContent = '請填寫必填欄位（起日／工項分類／工程內容）';
      msg.className = 'text-xs font-bold text-red-600';
      return;
    }
    submitBtn.disabled = true; submitBtn.textContent = '送出中…';
    try {
      const fd = new FormData();
      fd.append('startAt', startInput.value);
      if (endInput.value) fd.append('endAt', endInput.value);
      fd.append('content', contentInput.value.trim());
      fd.append('category', catSelect.value);
      Array.from(photoInput.files || []).forEach((f) => fd.append('photo', f));
      const res = await fetch(`${API_BASE}/decorProgressAdd/${encodeURIComponent(c.rid)}?token=${encodeURIComponent(TOKEN)}`, { method: 'POST', body: fd });
      let data = null; try { data = await res.json(); } catch {}
      if (!res.ok || !data || data.ok !== true) throw new Error((data && data.error) || `HTTP ${res.status}`);
      msg.textContent = '已新增，重新整理中…';
      msg.className = 'text-xs font-bold text-emerald-600';
      await loadAll();
    } catch (err) {
      msg.textContent = `送出失敗：${err.message}`;
      msg.className = 'text-xs font-bold text-red-600';
      submitBtn.disabled = false; submitBtn.textContent = '送出進度紀錄';
    }
  });

  box.append(form);
  return box;
}

function detailPanel(c) {
  const box = make('div', 'space-y-4 rounded-xl bg-slate-50 p-4');

  const stageBox = make('div', 'rounded-lg bg-white p-3 text-sm');
  const next = nextScheduled(c);
  stageBox.append(
    make('p', '', ''),
  );
  stageBox.firstChild.innerHTML = `<span class="font-bold text-slate-500">目前工項：</span><span class="font-bold text-slate-900">${clean(c.lastWorkItem) || '—'}</span>`;
  // P2 精確版：真實排程優先（子表有未來排定工項）；無排定時以「目前工項分類＋核定順序」推斷，
  // 明確標示為推斷、與真實排程區分（規格書 § 工項順序與關鍵字對照）。
  const nextP = make('p', 'mt-1 flex flex-wrap items-center gap-1');
  if (next) {
    nextP.innerHTML = `<span class="font-bold text-slate-500">下一排定工項：</span><span class="font-bold text-slate-900">${clean(next.content) || '（未填內容）'}</span><span class="text-slate-500">（${fmtShort(next.d)}）</span>`;
  } else {
    const inferred = inferNextStage(c);
    if (inferred) {
      nextP.innerHTML = `<span class="font-bold text-slate-500">下一排定工項：</span><span class="font-bold text-slate-900">${inferred}</span>`;
      nextP.append(badge('推斷（依慣例順序，非真實排程）', 'bg-amber-100 text-amber-800'));
    } else {
      nextP.innerHTML = `<span class="font-bold text-slate-500">下一排定工項：</span><span class="text-slate-500">尚未排定下一工項</span>`;
    }
  }
  stageBox.append(nextP);
  box.append(stageBox);

  const progressBox = make('div', 'rounded-lg bg-white p-3');
  progressBox.append(make('p', 'mb-1 text-xs font-bold text-slate-500', '進度時間軸'));
  const rows = (c.progress || []).slice().sort((a, b) => {
    const da = parseDateOnly(a.startAt), db = parseDateOnly(b.startAt);
    if (!da && !db) return 0; if (!da) return 1; if (!db) return -1; return da - db;
  });
  if (!rows.length) progressBox.append(make('p', 'text-sm text-slate-400', '尚無進度紀錄'));
  else rows.forEach((p) => progressBox.append(progressLine(p, c)));
  box.append(progressBox);

  box.append(progressAddForm(c));

  const payBox = make('div', 'rounded-lg bg-white p-3');
  payBox.append(make('p', 'mb-1 flex items-center justify-between text-xs font-bold text-slate-500', ''));
  payBox.firstChild.innerHTML = `<span>各期款狀態</span><span>已繳款比例 ${pct(c.paidRatio)}</span>`;
  if (!(c.payments || []).length) payBox.append(make('p', 'text-sm text-slate-400', '尚無款項紀錄'));
  else c.payments.forEach((p) => payBox.append(paymentRow(p)));
  box.append(payBox);

  if ((c.addons || []).length) {
    const addonBox = make('div', 'rounded-lg bg-white p-3');
    addonBox.append(make('p', 'mb-1 text-xs font-bold text-slate-500', '追加款'));
    c.addons.forEach((a) => addonBox.append(addonRow(a)));
    box.append(addonBox);
  }

  const fileBox = make('div', 'rounded-lg bg-white p-3');
  if (c.hasContract) {
    const link = make('a', 'inline-block rounded-xl bg-slate-900 px-4 py-2 text-sm font-bold text-white', '開啟合約附件');
    link.href = `${API_BASE}/decorFile/${encodeURIComponent(c.rid)}?token=${encodeURIComponent(TOKEN)}`;
    link.target = '_blank'; link.rel = 'noopener noreferrer';
    fileBox.append(link);
  } else {
    const btn = make('button', 'cursor-not-allowed rounded-xl bg-slate-200 px-4 py-2 text-sm font-bold text-slate-500', '未上傳合約');
    btn.type = 'button'; btn.disabled = true;
    fileBox.append(btn);
  }
  if (c.contractTotal !== null) fileBox.append(make('p', 'mt-2 text-xs text-slate-500', `合約總價款 ${money(c.contractTotal)}`));
  const missingStartCount = (c.progress || []).filter((p) => !parseDateOnly(p.startAt)).length;
  if (missingStartCount > 0) fileBox.append(make('p', 'mt-2 text-xs text-amber-700', `資料品質提示：${missingStartCount} 筆工項缺少起日，未顯示於甘特圖`));
  box.append(fileBox);

  return box;
}

function renderCaseBlock(c, bounds) {
  const overdue = isOverdue(c);
  const wrapper = make('div', `border-b border-slate-100 last:border-b-0 ${overdue ? 'bg-red-50/40' : ''}`);

  const row = make('div', 'flex w-full cursor-pointer items-stretch text-left');
  row.setAttribute('role', 'button');
  row.setAttribute('tabindex', '0');
  const label = make('div', `sticky left-0 z-10 w-[230px] flex-none border-r border-slate-100 bg-white p-3 ${overdue ? 'bg-red-50' : ''}`);
  label.append(make('p', 'text-sm font-extrabold text-slate-900', c.name));
  const metaLine = make('p', 'mt-0.5 text-xs text-slate-500', `監工 ${c.supervisor || '—'}・接案 ${c.assignee || '—'}`);
  label.append(metaLine);
  label.append(make('p', 'mt-0.5 text-xs text-slate-500', `${c.startAt || '—'} ~ ${c.endAt || '—'}・已繳 ${pct(c.paidRatio)}`));
  const lastWorkItemLine = make('p', 'mt-0.5 truncate text-xs font-semibold text-slate-600', `最新工項：${clean(c.lastWorkItem) || '—'}`);
  lastWorkItemLine.title = clean(c.lastWorkItem) || '—';
  label.append(lastWorkItemLine);
  const badgeRow = make('div', 'mt-1 flex flex-wrap gap-1');
  caseBadges(c).forEach((b) => badgeRow.append(b));
  if (badgeRow.childElementCount) label.append(badgeRow);
  row.append(label);

  const track = trackWrap(bounds);
  // 案級橫條：起訖任一空值或訖<起（填錯）→ 不入甘特圖（僅畫灰色佔位條，badge 已標警示）
  const bar = dateIssue(c) ? null : ganttBar(c.startAt, c.endAt, bounds, overdue ? 'bg-red-500' : 'bg-blue-500');
  if (bar) track.append(bar);
  else {
    const placeholder = make('div', 'gantt-bar bg-slate-200');
    placeholder.style.left = '0px'; placeholder.style.width = '80px';
    track.append(placeholder);
  }
  row.append(track);

  const expanded = EXPANDED.has(c.rid);
  const toggle = () => { if (expanded) EXPANDED.delete(c.rid); else EXPANDED.add(c.rid); renderLists(); };
  row.addEventListener('click', toggle);
  row.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); } });
  wrapper.append(row);

  if (expanded) {
    const sub = make('div', 'p-3 space-y-3 bg-slate-50');
    sub.append(make('p', 'text-xs font-bold tracking-widest text-orange-600', '工項分行視圖'));
    sub.append(viewToggle(c));
    const mode = CASE_VIEW_MODE.get(c.rid) || 'gantt';
    sub.append(mode === 'calendar' ? renderCaseCalendar(c) : renderCaseItemGantt(c));
    const detailRow = make('div', '');
    detailRow.append(detailPanel(c));
    sub.append(detailRow);
    wrapper.append(sub);
  }

  return wrapper;
}

// ---------- P2：圖一式甘特（展開單案）----------
// 左側固定 12 列＝11 工項（核定預設順序）＋「未分類」；每列橫條＝該分類子表紀錄起訖。
// 用該案自己的日期範圍（非總覽的全案共用尺度），子表紀錄較密集時橫條才不會擠成一團。
function renderCaseItemGantt(c) {
  const bounds = computeBounds([c]);
  const scroll = make('div', 'gantt-scroll rounded-xl border border-slate-200 bg-white');
  const inner = make('div', 'inline-block min-w-full');
  const rulerRow = make('div', 'flex items-stretch border-b border-slate-200 bg-slate-50');
  rulerRow.append(make('div', 'sticky left-0 z-10 w-[110px] flex-none border-r border-slate-100 bg-slate-50 p-2 text-xs font-bold text-slate-500', '工項'));
  rulerRow.append(ruler(bounds));
  inner.append(rulerRow);

  const grouped = {};
  GANTT_ROWS.forEach((name) => { grouped[name] = []; });
  (c.progress || []).forEach((p) => { grouped[resolveCategory(p)].push(p); });

  GANTT_ROWS.forEach((name) => {
    const items = grouped[name];
    const rowEl = make('div', 'flex items-stretch border-b border-slate-100 last:border-b-0');
    const label = make('div', `sticky left-0 z-10 w-[110px] flex-none border-r border-slate-100 bg-white p-2 text-xs font-bold ${name === '未分類' ? 'text-slate-400' : 'text-slate-600'}`, name);
    rowEl.append(label);
    const track = trackWrap(bounds);
    if (!items.length) {
      track.style.minHeight = '30px';
    } else {
      items.forEach((p, i) => {
        const bar = ganttBar(p.startAt, p.endAt, bounds, CATEGORY_COLORS[name] || 'bg-slate-400', { openEnded: true });
        if (!bar) return;
        if (items.length > 1) { bar.style.top = `${6 + i * 18}px`; bar.style.transform = 'none'; }
        track.append(bar);
      });
      track.style.minHeight = `${Math.max(30, items.length * 18 + 8)}px`;
    }
    rowEl.append(track);
    inner.append(rowEl);
  });
  scroll.append(inner);
  return scroll;
}

// ---------- P2：月曆視圖（展開單案）----------
function renderCaseCalendar(c) {
  let state = CASE_CAL_MONTH.get(c.rid);
  if (!state) { const d = new Date(); state = { y: d.getFullYear(), m: d.getMonth() }; CASE_CAL_MONTH.set(c.rid, state); }
  const first = new Date(state.y, state.m, 1);
  const startWeekday = first.getDay();
  const daysInMonth = new Date(state.y, state.m + 1, 0).getDate();
  const today = todayDate();

  const wrap = make('div', 'rounded-xl border border-slate-200 bg-white p-3');
  const nav = make('div', 'mb-2 flex items-center justify-between');
  const prevBtn = make('button', 'rounded-lg border border-slate-300 px-3 py-1 text-xs font-bold hover:bg-slate-50', '‹ 上月');
  prevBtn.type = 'button';
  const label = make('span', 'text-sm font-bold text-slate-700', `${state.y} 年 ${state.m + 1} 月`);
  const nextBtn = make('button', 'rounded-lg border border-slate-300 px-3 py-1 text-xs font-bold hover:bg-slate-50', '下月 ›');
  nextBtn.type = 'button';
  prevBtn.addEventListener('click', () => { const d = new Date(state.y, state.m - 1, 1); CASE_CAL_MONTH.set(c.rid, { y: d.getFullYear(), m: d.getMonth() }); renderLists(); });
  nextBtn.addEventListener('click', () => { const d = new Date(state.y, state.m + 1, 1); CASE_CAL_MONTH.set(c.rid, { y: d.getFullYear(), m: d.getMonth() }); renderLists(); });
  nav.append(prevBtn, label, nextBtn);
  wrap.append(nav);

  const weekHead = make('div', 'grid grid-cols-7 gap-1 text-center text-[10px] font-bold text-slate-400');
  ['日', '一', '二', '三', '四', '五', '六'].forEach((d) => weekHead.append(make('div', '', d)));
  wrap.append(weekHead);

  const grid = make('div', 'mt-1 grid grid-cols-7 gap-1');
  for (let i = 0; i < startWeekday; i++) grid.append(make('div', 'min-h-[56px] rounded-lg'));
  for (let day = 1; day <= daysInMonth; day++) {
    const cellDate = new Date(state.y, state.m, day);
    const isToday = sameDate(cellDate, today);
    const cell = make('div', `min-h-[56px] rounded-lg border p-1 text-left ${isToday ? 'border-rose-300 bg-rose-50' : 'border-slate-100 bg-white'}`);
    cell.append(make('p', 'text-[10px] font-bold text-slate-500', String(day)));
    const dots = make('div', 'mt-1 flex flex-wrap gap-0.5');
    (c.progress || []).forEach((p) => {
      const s = parseDateOnly(p.startAt);
      if (!s) return;
      let e = parseDateOnly(p.endAt);
      if (!e) e = today > s ? today : s; // 訖日空值視為進行中，畫到今天（同甘特規則）
      if (e < s) return; // 日期填反不畫
      if (cellDate >= s && cellDate <= e) {
        const cat = resolveCategory(p);
        dots.append(make('span', `inline-block h-2 w-2 rounded-full ${CATEGORY_COLORS[cat] || 'bg-slate-400'}`));
      }
    });
    if (dots.childElementCount) cell.append(dots);
    grid.append(cell);
  }
  wrap.append(grid);
  return wrap;
}

function viewToggle(c) {
  const mode = CASE_VIEW_MODE.get(c.rid) || 'gantt';
  const row = make('div', 'flex gap-2');
  const ganttBtn = make('button', `rounded-lg px-3 py-1 text-xs font-bold ${mode === 'gantt' ? 'bg-slate-900 text-white' : 'border border-slate-300 text-slate-600'}`, '圖一式甘特');
  ganttBtn.type = 'button';
  const calBtn = make('button', `rounded-lg px-3 py-1 text-xs font-bold ${mode === 'calendar' ? 'bg-slate-900 text-white' : 'border border-slate-300 text-slate-600'}`, '月曆');
  calBtn.type = 'button';
  ganttBtn.addEventListener('click', (e) => { e.stopPropagation(); CASE_VIEW_MODE.set(c.rid, 'gantt'); renderLists(); });
  calBtn.addEventListener('click', (e) => { e.stopPropagation(); CASE_VIEW_MODE.set(c.rid, 'calendar'); renderLists(); });
  row.append(ganttBtn, calBtn);
  return row;
}

function renderGantt(cases) {
  const wrap = byId('ganttWrap');
  wrap.replaceChildren();
  if (!cases.length) {
    wrap.append(make('div', 'p-8 text-center text-sm text-slate-500', '目前沒有工程中案件'));
    return;
  }
  const bounds = computeBounds(cases);
  const scroll = make('div', 'gantt-scroll');
  const inner = make('div', 'inline-block min-w-full');

  const rulerRow = make('div', 'flex items-stretch border-b border-slate-200 bg-slate-50');
  rulerRow.append(make('div', 'sticky left-0 z-10 w-[230px] flex-none border-r border-slate-100 bg-slate-50 p-2 text-xs font-bold text-slate-500', '案件 / 時間軸'));
  rulerRow.append(ruler(bounds));
  inner.append(rulerRow);

  cases.forEach((c) => inner.append(renderCaseBlock(c, bounds)));
  scroll.append(inner);
  wrap.append(scroll);
}

function closedCard(c) {
  const card = make('div', 'rounded-xl border border-slate-200 bg-white p-4 text-sm');
  const head = make('div', 'flex items-center justify-between');
  head.append(make('p', 'font-extrabold text-slate-900', c.name), badge(c.status, 'bg-slate-100 text-slate-600'));
  card.append(head);
  card.append(make('p', 'mt-2 text-xs text-slate-500', `監工 ${c.supervisor || '—'}・接案 ${c.assignee || '—'}`));
  card.append(make('p', 'mt-1 text-xs text-slate-500', `${c.startAt || '—'} ~ ${c.endAt || '—'}・已繳 ${pct(c.paidRatio)}`));
  const closedWorkItem = make('p', 'mt-1 truncate text-xs font-semibold text-slate-600', `最新工項：${clean(c.lastWorkItem) || '—'}`);
  closedWorkItem.title = clean(c.lastWorkItem) || '—';
  card.append(closedWorkItem);
  return card;
}

function renderLists() {
  const active = ALL_CASES.filter((c) => c.status === STATUS_ACTIVE);
  renderGantt(active);

  const rest = ALL_CASES.filter((c) => c.status !== STATUS_ACTIVE);
  byId('closedTitle').textContent = `已結案／暫停中案件（${rest.length}）`;
  const closedList = byId('closedList');
  closedList.replaceChildren();
  if (!rest.length) closedList.append(make('p', 'text-sm text-slate-400', '目前沒有已結案或暫停中案件'));
  else rest.forEach((c) => closedList.append(closedCard(c)));
}

function renderHeader() {
  byId('roleLabel').textContent = `窩的家・設計部工作檯（${ROLE_LABEL || ROLE}）`;
}

async function loadAll() {
  showLoading();
  try {
    const data = await apiGet('decorListAll');
    ALL_CASES = Array.isArray(data.cases) ? data.cases : [];
    ROLE = data.role || ''; ROLE_LABEL = data.label || '';
    renderHeader();
    renderStats(data.stats);
    renderLists();
    hideLoading();
    byId('updatedAt').textContent = `更新：${new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' })}`;
  } catch (error) {
    if (error.status === 404) { showInvalid(); return; }
    showError(error.message);
  }
}

function showInvalid() {
  byId('invalidLink').classList.remove('hidden');
  byId('invalidLink').classList.add('flex');
  byId('app').classList.add('hidden');
}

byId('refreshButton').addEventListener('click', loadAll);
if (!TOKEN) {
  showInvalid();
} else {
  byId('app').classList.remove('hidden');
  loadAll();
}
</script>
