<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>名片資料調查表</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background:#f3f4f6; font-family:'PingFang TC','Microsoft JhengHei',sans-serif; }
</style>
</head>
<body class="antialiased text-gray-800 p-4">
<div class="max-w-lg mx-auto bg-white rounded-2xl shadow-lg overflow-hidden">
  <div class="bg-indigo-600 px-6 py-8 text-white text-center">
    <h1 class="text-2xl font-bold">名片資料調查表</h1>
    <p class="text-indigo-100 mt-2 text-sm">請填寫您的名片資訊，資料將直接更新至人事系統</p>
  </div>
  <div id="loadingMsg" class="p-6 text-center text-gray-500">
    <div class="animate-pulse">載入夥伴清單中⋯</div>
  </div>
  <form id="surveyForm" class="p-6 space-y-5 hidden">
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">請選擇您的姓名 <span class="text-red-500">*</span></label>
      <select id="nameSelect" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-base">
        <option value="">-- 請選擇 --</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">手機號碼 <span class="text-red-500">*</span></label>
      <input type="tel" id="phone" placeholder="例：0912-345-678" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-base">
      <p class="text-xs text-gray-400 mt-1">將作為名片對外聯絡電話</p>
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">不動產營業員證號</label>
      <input type="text" id="agentLicense" placeholder="（可留空）" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-base">
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">租賃住宅管理人員證號</label>
      <input type="text" id="rentalLicense" placeholder="（可留空）" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-base">
    </div>
    <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg text-lg transition-colors">
      送出
    </button>
  </form>
  <div id="successMsg" class="p-8 text-center hidden">
    <div class="text-green-500 text-5xl mb-4">✓</div>
    <h2 class="text-xl font-bold text-gray-800">已送出，謝謝！</h2>
    <p class="text-gray-500 mt-2 text-sm">資料已更新至人事系統</p>
  </div>
  <div id="errorMsg" class="p-6 hidden">
    <div class="bg-red-50 border border-red-200 rounded-lg p-4 text-red-700 text-sm" id="errorText"></div>
    <button id="retryBtn" class="mt-4 w-full border border-indigo-600 text-indigo-600 py-2 rounded-lg">重試</button>
  </div>
</div>
<script>
const PROXY = 'https://wuohome-ragic-proxy.wuohome.workers.dev';

async function loadStaff() {
  try {
    const resp = await fetch(PROXY + '/getBcardStaff');
    const data = await resp.json();
    const sel = document.getElementById('nameSelect');
    (data.staff || []).forEach(function(e) {
      var opt = document.createElement('option');
      opt.value = e.rid;
      opt.textContent = e.name;
      sel.appendChild(opt);
    });
    document.getElementById('loadingMsg').classList.add('hidden');
    document.getElementById('surveyForm').classList.remove('hidden');
  } catch(err) {
    document.getElementById('loadingMsg').textContent = '載入失敗，請重新整理頁面';
    console.error(err);
  }
}

document.addEventListener('DOMContentLoaded', function() {
  loadStaff();
  document.getElementById('surveyForm').addEventListener('submit', function(e) {
    e.preventDefault();
    submitForm();
  });
  document.getElementById('retryBtn').addEventListener('click', resetForm);
});

async function submitForm() {
  var rid    = document.getElementById('nameSelect').value;
  var phone  = document.getElementById('phone').value.trim();
  var agent  = document.getElementById('agentLicense').value.trim();
  var rental = document.getElementById('rentalLicense').value.trim();
  if (!rid)   { alert('請選擇您的姓名'); return; }
  if (!phone) { alert('請填寫手機號碼'); return; }
  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送出中⋯';
  var body = { '3000975': phone };
  if (agent)  body['1002554'] = agent;
  if (rental) body['1002555'] = rental;
  try {
    var resp = await fetch(PROXY + '/submitBcardSurvey?rid=' + encodeURIComponent(rid), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    var result = await resp.json();
    if (result && result.ok) {
      document.getElementById('surveyForm').classList.add('hidden');
      document.getElementById('successMsg').classList.remove('hidden');
    } else {
      showError('送出失敗：' + JSON.stringify(result).slice(0, 200));
      btn.disabled = false;
      btn.textContent = '送出';
    }
  } catch(err) {
    showError('網路錯誤，請重試：' + err.message);
    btn.disabled = false;
    btn.textContent = '送出';
  }
}

function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  document.getElementById('errorMsg').classList.remove('hidden');
}

function resetForm() {
  document.getElementById('errorMsg').classList.add('hidden');
  document.getElementById('surveyForm').classList.remove('hidden');
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').textContent = '送出';
}
</script>
</body>
</html>
