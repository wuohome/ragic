<!DOCTYPE html>
<html lang=zh-TW>
<head>

<script src=https://cdn.tailwindcss.com><\/script>

</head>
<body class=antialiased text-gray-800 p-4>
<div class=max-w-lg mx-auto bg-white rounded-2xl shadow-lg overflow-hidden>
  <div class=bg-indigo-600 px-6 py-8 text-white text-center>
    <h1 class=text-2xl font-bold>еђҚз‰‡иі‡ж–™иҒүжџӨиҰЁ</h1>
    <p class=text-indigo-100 mt-2 text-sm>и«‹еҰ«еҮ«ж‚Ёзљ„еђҚз‰‡иі‡иЁЉпәЊиі‡ж–™е°‡з›өжҺӨж›өж–°и‡ідғғдғ‹зі»зµ±</p>
  </div>
  <div id=loadingMsg class=p-6 text-center text-gray-500>
    <div class=animate-pulse>иә‰е…Өе¤Өдәөжё…е–®дё­в‹Ү</div>
  </div>
  <form id=surveyForm class=p-6 space-y-5 hidden>
    <div>
      <label class=block text-sm font-semibold text-gray-700 mb-1>и«‹йЃёж“‡ж‚Ёзљ„е§“еђҚ <span class=text-red-500>*</span></label>
      <select id=nameSelect required class=w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-base>
        <option value=>-- и«‹йЃёж“‡ --</option>
      </select>
    </div>
    <div>
      <label class=block text-sm font-semibold text-gray-700 mb-1>ж‰‹ж©џи™џзұә <span class=text-red-500>*</span></label>
      <input type=tel id=phone placeholder=дң‹пәљ0912-345-678 class=w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-base>
      <p class=text-xs text-gray-400 mt-1>е°‡дҢњз‚ғеђҚз‰‡е°Қе¤–иЃҮзµҰй›»и©±</p>
    </div>
    <div>
      <label class=block text-sm font-semibold text-gray-700 mb-1>дёҚе‹•з”ұз‡џжӨ­е“Ұи­‰и™џ</label>
      <input type=text id=agentLicense placeholder=пә€еЏҮз•™з©ғпә‰ class=w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-base>
    </div>
    <div>
      <label class=block text-sm font-semibold text-gray-700 mb-1>з§џиіѓдҢЏе®…з®Ұзђ†дғғе“Ұи­‰и™џ</label>
      <input type=text id=rentalLicense placeholder=пә€еЏҮз•™з©ғпә‰ class=w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-base>
    </div>
    <button type=submit id=submitBtn class=w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg text-lg transition-colors>
      йЂЃе‡ғ
    </button>
  </form>
  <div id=successMsg class=p-8 text-center hidden>
    <div class=text-green-500 text-5xl mb-4>вњ“</div>
    <h2 class=text-xl font-bold text-gray-800>е·ІйЂЃе‡ғпәЊи¬қи¬қпәЃ</h2>
    <p class=text-gray-500 mt-2 text-sm>иі‡ж–™е·Іж›өж–°и‡ідғғдғ‹зі»зµ±</p>
  </div>
  <div id=errorMsg class=p-6 hidden>
    <div class=bg-red-50 border border-red-200 rounded-lg p-4 text-red-700 text-sm id=errorText></div>
    <button id=retryBtn class=mt-4 w-full border border-indigo-600 text-indigo-600 py-2 rounded-lg>й‡Қи©¦</button>
  </div>
</div>
<script>
const RAGIC_BASE = 'https://ap15.ragic.com/wuohome';
const SHEET = 'ragicforms4/20004';
const API_KEY_ENC = 'VEZsOEwzYzVJdWdoWXRDM3ptS2YwTFA1M283aGxIUHM1ZjRORmNGbDNHNi9qSnVDNnlYWlhwUmJnMnJIWGo3RQ%3D%3D';
const FID_NAME   = '3000933';
const FID_STATUS = '3000945';
const FID_PHONE  = '3000975';
const FID_AGENT  = '1002554';
const FID_RENTAL = '1002555';

async function loadStaff() {
  try {
    const url = RAGIC_BASE + '/' + SHEET + '?api=true&naming=EID&where=' + FID_STATUS + ',eq,%E5%9C%A8%E8%81%B7&limit=0,500&APIKey=' + API_KEY_ENC;
    const resp = await fetch(url, { mode: 'cors' });
    const data = await resp.json();
    const sel = document.getElementById('nameSelect');
    const entries = Object.entries(data)
      .filter(function(e) { return !isNaN(parseInt(e[0])) && parseInt(e[0]) > 0; })
      .map(function(e) {
        return { rid: e[0], name: e[1][FID_NAME] || '', phone: e[1][FID_PHONE] || '' };
      })
      .filter(function(e) { return e.name; })
      .sort(function(a, b) { return a.name.localeCompare(b.name, 'zh-TW'); });
    window._staffMap = {};
    entries.forEach(function(e) {
      window._staffMap[e.rid] = e;
      var opt = document.createElement('option');
      opt.value = e.rid;
      opt.textContent = e.name;
      sel.appendChild(opt);
    });
    document.getElementById('loadingMsg').classList.add('hidden');
    document.getElementById('surveyForm').classList.remove('hidden');
  } catch(err) {
    document.getElementById('loadingMsg').textContent = 'иә‰е…Өе¤±ж•—пәЊи«‹й‡Қж–°ж•өзђ†й Ѓйқұ';
    console.error(err);
  }
}

document.addEventListener('DOMContentLoaded', function() {
  loadStaff();
  document.getElementById('nameSelect').addEventListener('change', function() {
    var rid = this.value;
    if (rid && window._staffMap && window._staffMap[rid] && window._staffMap[rid].phone) {
      document.getElementById('phone').value = window._staffMap[rid].phone;
    }
  });
  document.getElementById('surveyForm').addEventListener('submit', function(e) {
    e.preventDefault();
    submitForm();
  });
  document.getElementById('retryBtn').addEventListener('click', resetForm);
});

async function submitForm() {
  var rid    = document.getElementById('nameSelect').value;
  var phone  = document.getElementById('phone').value.trim();
  var agent  = document.getElementById('agentLicense').value.trim();
  var rental = document.getElementById('rentalLicense').value.trim();
  if (!rid)   { alert('и«‹йЃёж“‡ж‚Ёзљ„е§“еђҚ'); return; }
  if (!phone) { alert('и«‹еҰ«еҮ«ж‰‹ж©џи™џзұә'); return; }
  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'йЂЃе‡ғдё­в‹Ү';
  var params = new URLSearchParams();
  params.append(FID_PHONE, phone);
  if (agent)  params.append(FID_AGENT, agent);
  if (rental) params.append(FID_RENTAL, rental);
  var url = RAGIC_BASE + '/' + SHEET + '/' + rid + '?api=true&APIKey=' + API_KEY_ENC;
  try {
    var resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString()
    });
    var result = await resp.json();
    if (result && result.status === 'SUCCESS') {
      document.getElementById('surveyForm').classList.add('hidden');
      document.getElementById('successMsg').classList.remove('hidden');
    } else {
      showError('йЂЃе‡ғе¤±ж•—пәљ' + JSON.stringify(result).slice(0, 200));
      btn.disabled = false;
      btn.textContent = 'йЂЃе‡ғ';
    }
  } catch(err) {
    showError('з¶Іи·ҮйЊҮиҒ¤пәЊи«‹й‡Қи©¦пәљ' + err.message);
    btn.disabled = false;
    btn.textContent = 'йЂЃе‡ғ';
  }
}

function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  document.getElementById('errorMsg').classList.remove('hidden');
}

function resetForm() {
  document.getElementById('errorMsg').classList.add('hidden');
  document.getElementById('surveyForm').classList.remove('hidden');
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').textContent = 'йЂЃе‡ғ';
}
<\/script>
</body>
</html>
