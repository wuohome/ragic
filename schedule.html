                ))}
                </>}
                <span className="flex items-center gap-1 text-sm"><span className="w-4 h-4 rounded bg-green-500 inline-block"></span> 排休</span>
                <span className="flex items-center gap-1 text-sm"><span className="w-4 h-4 rounded bg-yellow-500 inline-block"></span> 特休</span>
                <span className="flex items-center gap-1 text-sm"><span className="w-4 h-4 rounded bg-red-500 inline-block"></span> 請假</span>
                <span className="flex items-center gap-1 text-sm"><span className="w-4 h-4 rounded bg-orange-500 inline-block"></span> 值班</span>
                <span className="flex items-center gap-1 text-sm"><span className="w-4 h-4 rounded inline-block" style={{background:"#3b82f6"}}></span> 1F</span>
                <span className="flex items-center gap-1 text-sm"><span className="w-4 h-4 rounded inline-block" style={{background:"#8b5cf6"}}></span> 2F</span>
                <span className="flex items-center gap-1 text-sm"><span className="w-4 h-4 rounded inline-block" style={{background:"#0891b2"}}></span> 3F</span>
                <span className="flex items-center gap-1 text-sm"><span className="w-4 h-4 rounded bg-gray-200 inline-block"></span> 見紅休</span>
                <span className="flex items-center gap-1 text-sm">🚫 禁休</span>
                {!IS_READONLY && <span className="ml-2 text-gray-400 text-sm">{mode === "禁休" ? "點左邊日期欄設定/取消禁休" : `點格子=${mode}，再點=清除`}</span>}
            </div>

            {loading ? (
                <div className="flex items-center justify-center py-20">
                    <div className="cell-spin w-8 h-8 border-4 border-blue-200 border-t-blue-600 rounded-full"></div>
                    <span className="ml-3 text-gray-500">載入中...</span>
                </div>
            ) : (
                <div className="overflow-x-auto bg-white rounded-xl shadow-sm">
                    <table ref={tableRef} className="w-full text-sm sched-table" style={{tableLayout:"fixed"}} onMouseMove={handleTableHover} onMouseLeave={handleTableLeave}>
                        <thead>
                            <tr>
                                <th className="sticky-left bg-white p-2" style={{width:"60px"}} rowSpan={2}>
                                    <span className="text-gray-500 text-xs">日期</span>
                                </th>
                                {(() => {
                                    const result = [];
                                    let i = 0;
                                    while (i < employees.length) {
                                        const dept = employees[i].dept;
                                        let count = 0;
                                        while (i + count < employees.length && employees[i + count].dept === dept) count++;
                                        const color = DEPT_COLORS[dept] || "#6b7280";
                                        result.push(
                                            <th key={dept} colSpan={count} className="p-1 text-white text-xs font-medium" style={{backgroundColor: color}}>
                                                {dept}
                                            </th>
                                        );
                                        i += count;
                                    }
                                    return result;
                                })()}
                            </tr>
                            <tr className="bg-gray-50">
                                {employees.map(emp => {
                                    const ps = prevStats[emp.name];
                                    const pm = month === 1 ? 12 : month - 1;
                                    return (
                                        <th key={emp.name} className="emp-cell p-1 text-center font-medium text-gray-700 text-xs whitespace-nowrap">
                                            <div>{emp.display}</div>
                                            {ps && <div className="font-normal text-gray-400" style={{fontSize:"9px", lineHeight:"1.2"}}>
                                                {pm}月 🧹{ps.duty.toFixed(0)}{emp.hire === "承攬" && emp.dept !== "社宅部" ? ` 🕗${ps.zhiban.toFixed(0)}` : ""}
                                            </div>}
                                        </th>
                                    );
                                })}
                            </tr>
                        </thead>
                        <tbody>
                            {dates.map(({day, dow, isWeekend}) => {
                                const mm = String(month).padStart(2,"0");
                                const dd = String(day).padStart(2,"0");
                                const dateStr = `${year}/${mm}/${dd}`;
                                const isToday = dateStr === todayStr;
                                const nrInfo = noRest[dateStr];
                                const holidayName = GOV_HOLIDAYS_2026[dateStr] || "";
                                const isHoliday = isWeekend || !!holidayName;
                                const rowBg = nrInfo ? "" : isToday ? "bg-yellow-50" : isHoliday ? "bg-blue-50/40" : "";
                                const dutyList = duties[dateStr] || [];
                                const dutyKey = `duty|${dateStr}`;
                                const isDutySaving = saving[dutyKey];
                                const noRestSaving = saving[`norest|${dateStr}`];

                                // 每日驗證：值日每樓層 1 人、值班每天 1 人
                                const warnMsgs = [];
                                if (!nrInfo) {
                                    const floorGroup = { "1F": [], "2F": [], "3F": [], "_none": [] };
                                    dutyList.forEach(d => {
                                        const slot = ["1F","2F","3F"].includes(d.floor) ? d.floor : "_none";
                                        floorGroup[slot].push(d.empName);
                                    });
                                    ["1F","2F","3F"].forEach(f => {
                                        const n = floorGroup[f].length;
                                        if (n === 0) warnMsgs.push(`缺 ${f} 值日`);
                                        else if (n > 1) warnMsgs.push(`${f} 多排：${floorGroup[f].join("、")}`);
                                    });
                                    if (floorGroup["_none"].length > 0) warnMsgs.push(`未註樓層：${floorGroup["_none"].join("、")}`);
                                }
                                const zhibanEmps = [];
                                Object.entries(leaves).forEach(([k, arr]) => {
                                    if (!k.endsWith("|" + dateStr) || !Array.isArray(arr)) return;
                                    arr.forEach(e => { if (e.type === "值班") zhibanEmps.push(k.split("|")[0]); });
                                });
                                if (zhibanEmps.length === 0) warnMsgs.push("缺值班");
                                else if (zhibanEmps.length > 1) warnMsgs.push(`值班多排：${zhibanEmps.join("、")}`);
                                const hasWarn = warnMsgs.length > 0;
                                const dateTitle = [
                                    nrInfo ? "禁休：" + (nrInfo.reason || "無原因") : holidayName || "",
                                    hasWarn ? "⚠ " + warnMsgs.join("；") : ""
                                ].filter(Boolean).join("\n");

                                return (
                                    <tr key={day} className={rowBg} style={nrInfo ? {background:"#fff1f2", outline:"2px solid #fda4af", outlineOffset:"-1px"} : undefined}>
                                        <td className={`sticky-left p-2 text-center font-medium whitespace-nowrap ${nrInfo ? "text-rose-700" : isToday ? "bg-yellow-50" : hasWarn ? "bg-amber-100" : isHoliday ? "bg-blue-50" : "bg-white"} ${!nrInfo && isHoliday ? "text-red-500" : !nrInfo ? "text-gray-700" : ""} ${mode === "禁休" && !IS_READONLY ? "cursor-pointer hover:bg-rose-100" : ""}`}
                                            style={nrInfo ? {background:"#ffe4e6", borderLeft:"3px solid #e11d48"} : hasWarn && !isToday ? {borderLeft:"3px solid #f59e0b"} : undefined}
                                            onClick={() => mode === "禁休" && handleNoRest(dateStr)}
                                            title={dateTitle}>
                                            <span className="text-sm">{day}</span>
                                            <span className="text-xs ml-1 text-gray-400">({dow})</span>
                                            {hasWarn && <span className="ml-1 text-amber-600" title={warnMsgs.join("\n")}>⚠</span>}
                                            {holidayName && !nrInfo && <span className="block text-[9px] text-red-400 font-medium leading-tight">{holidayName}</span>}
                                            {nrInfo && <span className="block text-[9px] text-rose-600 font-bold leading-tight mt-0.5">🚫{nrInfo.reason ? " "+nrInfo.reason : ""}</span>}
                                        </td>
                                        {employees.map(emp => {
                                            const key = `${emp.name}|${dateStr}`;
                                            const leaveList = leaves[key] || [];
                                            const myDuties = dutyList.filter(d => d.empName === emp.name);
                                            const myDuty = myDuties[0] || null;
                                            const hasMultiFloor = myDuties.length > 1;
                                            const isGovRest = !nrInfo && GOV_REST_EMPLOYEES.has(emp.name) && isGovHoliday(dateStr, isWeekend);
                                            const savingKey = mode === "值日" ? `duty|${dateStr}` : key;
                                            const cellSaving = saving[savingKey];
                                            const floorLabel = hasMultiFloor
                                                ? myDuties.map(d => d.floor || "值").join("+")
                                                : myDuty ? (myDuty.floor || "值") : "";
                                            // 組合所有彩色段：每個 leave 類型 + 值日（若有）
                                            const leaveColor = (t) => t === "排休" ? "#22c55e" : t === "特休" ? "#eab308" : t === "值班" ? "#f97316" : "#dc2626";
                                            const leaveShort = (t) => t === "排休" ? "休" : t === "特休" ? "特" : t === "值班" ? "班" : "假";
                                            const segments = [];
                                            leaveList.forEach(l => segments.push({ color: leaveColor(l.type), label: l.type, short: leaveShort(l.type) }));
                                            if (myDuty && !myDuties.some(d => d.missed)) {
                                                if (hasMultiFloor) {
                                                    myDuties.forEach(d => segments.push({ color: FLOOR_COLORS[d.floor] || "#3b82f6", label: d.floor || "值", short: d.floor || "值" }));
                                                } else {
                                                    segments.push({ color: FLOOR_COLORS[myDuty.floor] || "#3b82f6", label: myDuty.floor || "值", short: myDuty.floor || "值" });
                                                }
                                            }
                                            const nSeg = segments.length;
                                            const bg = nSeg === 0 ? null :
                                                nSeg === 1 ? segments[0].color :
                                                "linear-gradient(135deg, " + segments.map((s, i) => {
                                                    const p1 = (i / nSeg * 100).toFixed(1);
                                                    const p2 = ((i + 1) / nSeg * 100).toFixed(1);
                                                    return s.color + " " + p1 + "%, " + s.color + " " + p2 + "%";
                                                }).join(", ") + ")";
                                            // 文字：單段用全名，多段用簡短
                                            const label = nSeg === 0 ? "" : nSeg === 1 ? segments[0].label : segments.map(s => s.short).join("");
                                            const textSizeClass = nSeg >= 3 ? "text-[9px]" : nSeg === 2 ? "text-[10px]" : "text-xs";
                                            // 生日判斷
                                            const isBirthday = SC.isBirthday(emp, month, day);
                                            const birthdayStyle = isBirthday
                                                ? {outline:"2px dashed #eab308", outlineOffset:"-2px", ...((nSeg === 0 && !isGovRest) ? {background:"#fef9c3"} : {})}
                                                : undefined;
                                            const titleText = isBirthday ? `🎂 ${emp.name} 生日`
                                                : nSeg > 1 ? `${emp.name}：${segments.map(s => s.label).join(" + ")}`
                                                : hasMultiFloor ? `${emp.name} 值日：${floorLabel}`
                                                : undefined;
                                            return (
                                                <td key={key}
                                                    onClick={() => !IS_READONLY && !isGovRest && mode !== "禁休" && handleClick(emp.name, dateStr)}
                                                    className={`emp-cell p-0 text-center transition-colors select-none ${isGovRest ? "cursor-default" : mode === "禁休" ? "cursor-default" : "cursor-pointer hover:bg-gray-100"} ${cellSaving ? "opacity-50" : ""}`}
                                                    style={{...(nrInfo && nSeg === 0 && !isGovRest ? {background:"#fff1f2"} : undefined), ...birthdayStyle}}
                                                    title={titleText}>
                                                    {cellSaving ? (
                                                        <span className="cell-spin inline-block w-4 h-4 border-2 border-gray-300 border-t-blue-500 rounded-full"></span>
                                                    ) : isGovRest ? (
                                                        <span className="inline-block w-full leading-[32px] text-xs font-bold text-gray-400 bg-gray-100">休</span>
                                                    ) : myDuties.some(d => d.missed) ? (
                                                        <span className="inline-block w-full leading-[32px] text-[10px] font-bold" style={{background:"#fff1f2", color:"#be123c", border:"2px dashed #f87171"}}>{floorLabel}未掃</span>
                                                    ) : nSeg > 0 ? (
                                                        <span className={`inline-block w-full leading-[32px] ${textSizeClass} font-bold text-white`} style={{background: bg}}>{label}</span>
                                                    ) : isBirthday ? (
                                                        <span className="inline-block w-full leading-[32px] text-sm">🎂</span>
                                                    ) : null}
                                                </td>
                                            );
                                        })}
                                    </tr>
                                );
                            })}
                        </tbody>
                        <tfoot>
                            <tr className="bg-gray-50 font-medium">
                                <td className="sticky-left bg-gray-50 p-2 text-center text-xs text-gray-500">合計</td>
                                {employees.map(emp => {
                                    const s = getStats(emp.name);
                                    return (
                                        <td key={emp.name} className="emp-cell p-1 text-center text-xs whitespace-nowrap">
                                            {(() => {
                                                const restShort = 8 - s.totalRest;
                                                return restShort > 0
                                                    ? <div className="text-red-500 font-bold" title={`總休 ${s.totalRest} 天（排休${s.paixiu}+特休${s.texiu}+請假${s.qingjia}${s.govRestDays > 0 ? "+見紅休" + s.govRestDays : ""}），還差 ${restShort} 天`}>未休{restShort}天</div>
                                                    : null;
                                            })()}
                                            <div>
                                                {s.paixiu > 0 && <span className="text-green-600">{s.paixiu}休</span>}
                                                {s.texiu > 0 && <span className="text-yellow-600"> {s.texiu}特</span>}
                                                {s.qingjia > 0 && <span className="text-red-600"> {s.qingjia}假</span>}
                                            </div>
                                            <div>
                                                {s.zhiban > 0 && <span className="text-orange-600">{s.zhiban}班</span>}
                                                {(s.f1 + s.f2 + s.f3 + s.dutyOther) > 0 && <span className="text-blue-600"> {s.f1 + s.f2 + s.f3 + s.dutyOther}值</span>}
                                                {s.missed > 0 && <span className="text-purple-500"> {s.missed}未掃</span>}
                                            </div>
                                            {s.paixiu === 0 && s.texiu === 0 && s.qingjia === 0 && s.zhiban === 0 && s.f1 === 0 && s.f2 === 0 && s.f3 === 0 && s.dutyOther === 0 && s.missed === 0 && <span className="text-gray-300">-</span>}
                                        </td>
                                    );
                                })}
                            </tr>
                        </tfoot>
                    </table>
                </div>
            )}

            {toast && (
                <div className={`fixed bottom-6 right-6 px-5 py-3 rounded-lg shadow-lg text-white font-medium z-50 ${toast.ok ? "bg-gray-800" : "bg-red-500"}`}>
                    {toast.msg}
                </div>
            )}
        </div>
    );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
