<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>窩的家 — 排班表（排班模式）</title>
    <script>
        if (/iPhone|iPad|Android/i.test(navigator.userAgent)) {
            if (confirm("排班模式建議使用電腦操作。\n\n要切換到閱覽模式嗎？")) {
                window.location.href = "schedule-view.html";
            }
        }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f8fafc; font-family: "Microsoft JhengHei","Noto Sans TC",sans-serif; }
        .cell-spin { animation: spin .6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        table { border-collapse: collapse; }
        th, td { border: 1px solid #e2e8f0; }
        tbody td { height: 32px; }
        .emp-cell { min-width: 48px; box-sizing: border-box; }
        .sticky-left { position: sticky; left: 0; z-index: 2; }
        /* 十字準星高亮 */
        tbody tr:hover { background: rgba(250,204,21,0.15) !important; }
        tbody tr:hover td { background: inherit; }
        tbody tr:hover td.sticky-left { background: #fefce8 !important; }
        table { position: relative; }
        .emp-col-highlight { position: relative; }
        td.col-hover, th.col-hover { background: rgba(250,204,21,0.15) !important; }
    </style>
</head>
<body>
<div id="root"></div>
<script src="schedule-common.js"></script>
<script type="text/babel">

const CONFIG = {
    BASE: SC.BASE_URL, KEY: SC.API_KEY,
    EMP_PATH: SC.EMP_PATH, LEAVE_PATH: SC.LEAVE_PATH,
    F_EMP: SC.F_EMP, F_LEAVE: SC.F_LEAVE,
};

// leaveWhere → SC.leaveWhere（共用常數檔）

// apiFetch → SC.apiFetch（共用常數檔）

const sleep = (ms) => new Promise(r => setTimeout(r, ms));

// 逐筆 POST（Ragic batch JSON API 在此表單會建空白紀錄，改逐筆送）
const apiBatchCreate = async (path, records, onProgress) => {
    const results = [];
    for (let i = 0; i < records.length; i++) {
        if (onProgress) onProgress(i + 1, records.length);
        const params = new URLSearchParams();
        for (const [k, v] of Object.entries(records[i])) {
            params.append(k, v);
        }
        const res = await SC.apiFetch(path, {
            method: "POST",
            headers: {"Content-Type":"application/x-www-form-urlencoded"},
            body: params.toString()
        });
        results.push({ ragicId: String(res.ragicId || "") });
        if (i < records.length - 1) await sleep(150);
    }
    return results;
};
const DAYS = SC.DAYS_TW;
const DEPT_COLORS = SC.DEPT_COLORS;
const DEPT_ORDER = SC.DEPT_ORDER;
// 社宅部不排值班，只排值日生

// 見紅休人員（設計部 + 瓊安）
const GOV_REST_EMPLOYEES = new Set(SC.GOV_REST_NAMES);

// 2026/03/30 起搬到平安街，每天 3 位值日生（1F/2F/3F）
const FLOORS = SC.FLOORS;
const FLOOR_COLORS = SC.FLOOR_COLORS;

// 2026 台灣國定假日（非週末的放假日）— 含名稱
const GOV_HOLIDAYS_2026 = SC.HOLIDAYS_2026;

const isGovHoliday = SC.isGovHoliday;

const EDIT_PASSWORD = "0718";
const isOpenPeriod = SC.isOpenPeriod;
const IS_READONLY = new URLSearchParams(window.location.search).has('readonly');

const App = () => {
    const [unlocked, setUnlocked] = React.useState(IS_READONLY ? true : isOpenPeriod());
    const [pwInput, setPwInput] = React.useState("");
    const [pwError, setPwError] = React.useState(false);
    // 20號後自動顯示下個月
    const initDate = (() => {
        const now = new Date();
        let y = now.getFullYear(), m = now.getMonth() + 1;
        if (isOpenPeriod()) { m++; if (m > 12) { m = 1; y++; } }
        return { y, m };
    })();
    const [year, setYear] = React.useState(initDate.y);
    const [month, setMonth] = React.useState(initDate.m);
    const [employees, setEmployees] = React.useState([]);
    const [allEmployees, setAllEmployees] = React.useState([]);
    const [leaves, setLeaves] = React.useState({});
    const [loading, setLoading] = React.useState(true);
    const [saving, setSaving] = React.useState({});
    const [duties, setDuties] = React.useState({});
    const [prevStats, setPrevStats] = React.useState({}); // { name: { duty: N, zhiban: N } }
    const [toast, setToast] = React.useState(null);
    const [autoScheduling, setAutoScheduling] = React.useState(false);
    const [autoZhiban, setAutoZhiban] = React.useState(false);
    const [showRules, setShowRules] = React.useState(false);
    const [progress, setProgress] = React.useState(null); // { text, current, total }
    const [mode, setMode] = React.useState("排休");
    const [noRest, setNoRest] = React.useState({}); // { dateStr: { ragicId, reason } }
    const tableRef = React.useRef(null);
    const hoverStyleRef = React.useRef(null);
    React.useEffect(() => {
        const style = document.createElement("style");
        document.head.appendChild(style);
        hoverStyleRef.current = style;
        return () => style.remove();
    }, []);
    const handleTableHover = React.useCallback((e) => {
        const td = e.target.closest("td, th");
        if (!td || !tableRef.current) return;
        const ci = td.cellIndex;
        const isHeader = td.tagName === "TH";
        // 表頭第二行沒有日期欄（rowSpan=2），所以 emp[0] 的 cellIndex=0
        // body 行有日期欄，emp[0] 的 cellIndex=1
        const empIdx = isHeader ? ci : ci - 1; // 0-based 員工索引
        if (empIdx < 0) { hoverStyleRef.current.textContent = ""; return; }
        const bodyNth = empIdx + 2; // body td: nth-child 1-based + 日期欄
        const headerNth = empIdx + 1; // 表頭 th: nth-child 1-based, 無日期欄
        hoverStyleRef.current.textContent =
            `table.sched-table tbody td:nth-child(${bodyNth}), table.sched-table thead tr:last-child th:nth-child(${headerNth}) { background-color: rgba(250,204,21,0.15) !important; }`;
    }, []);
    const handleTableLeave = React.useCallback(() => {
        if (hoverStyleRef.current) hoverStyleRef.current.textContent = "";
    }, []);

    const showToast = (msg, ok=true) => {
        setToast({msg, ok});
        setTimeout(() => setToast(null), 2500);
    };

    const load = async () => {
        setLoading(true);
        try {
            const empJson = await SC.apiFetch(CONFIG.EMP_PATH);
            // 樓層累計次數：從歷史值日紀錄即時計算（員工表 FL 欄位已不可寫）
            // 起算點：2026/03/30（平安街樓層制度啟用）
            const histEnd = `${year}/${String(month).padStart(2,"0")}/${String(new Date(year, month, 0).getDate()).padStart(2,"0")}`;
            const fcHistJson = await SC.apiFetch(CONFIG.LEAVE_PATH
                + `?where=${CONFIG.F_LEAVE.TYPE},eq,${encodeURIComponent("值日")}`
                + `&where=${CONFIG.F_LEAVE.DATE},gte,2026/03/30`
                + `&where=${CONFIG.F_LEAVE.DATE},lte,${histEnd}`);
            const fcHist = {};
            Object.entries(fcHistJson)
                .filter(([k,v]) => typeof v === "object" && !k.startsWith("_"))
                .forEach(([id, f]) => {
                    const isAuto = f[CONFIG.F_LEAVE.IS_AUTO] || "";
                    if (isAuto === "未掃") return;
                    const name = f[CONFIG.F_LEAVE.EMP] || "";
                    const note = f[CONFIG.F_LEAVE.NOTE] || "";
                    const floor = /^(1F|2F|3F)$/.test(note) ? note : null;
                    if (!name || !floor) return;
                    if (!fcHist[name]) fcHist[name] = {"1F":0,"2F":0,"3F":0};
                    fcHist[name][floor]++;
                });
            const allEmps = Object.entries(empJson)
                .filter(([k,v]) => typeof v === "object" && !k.startsWith("_"))
                .map(([id, f]) => {
                    const name = f[CONFIG.F_EMP.NAME] || "";
                    return {
                        ragicId: id,
                        name,
                        display: name,
                        dept: f[CONFIG.F_EMP.DEPT] || "",
                        status: f[CONFIG.F_EMP.STATUS] || "",
                        hire: f[CONFIG.F_EMP.HIRE] || "",
                        hireDate: f[CONFIG.F_EMP.HIRE_DATE] || "9999/12/31",
                        birthday: f[CONFIG.F_EMP.BIRTHDAY] || "",
                        fc: fcHist[name] ? {...fcHist[name]} : {"1F":0,"2F":0,"3F":0}
                    };
                })
                .filter(e => e.status === "在職" && e.dept !== "經營階層");
            setAllEmployees(allEmps.filter(e => e.hire !== "兼職").sort((a,b) => a.dept.localeCompare(b.dept) || a.hireDate.localeCompare(b.hireDate)));

            // 排休用：只有承攬 + 韓珊珊 + 設計部 + 瓊安
            const getDeptOrder = (dept) => {
                if (dept.startsWith("管理部")) return 0;
                if (dept === "設計部") return 1;
                if (dept === "租賃部") return 2;
                if (dept === "社宅部") return 3;
                return 4;
            };
            const emps = allEmps
                .filter(e => e.hire === "承攬" || e.name === "韓珊珊" || e.dept === "設計部" || e.name === "張瓊安" || e.dept === "社宅部")
                .map(e => e.name === "韓珊珊" ? {...e, dept: "管理部/秘書"} : e.name === "張瓊安" ? {...e, dept: "管理部/特助"} : e)
                .sort((a,b) => getDeptOrder(a.dept) - getDeptOrder(b.dept) || a.hireDate.localeCompare(b.hireDate));
            setEmployees(emps);
            console.log("生日資料:", emps.map(e => e.name + ":" + (e.birthday || "無")).join(", "));

            // 只拉當月+上月（不拉全表）
            const pm = month === 1 ? 12 : month - 1;
            const py = month === 1 ? year - 1 : year;
            const leaveJson = await SC.apiFetch(CONFIG.LEAVE_PATH + SC.leaveWhere(py, pm, year, month));
            const lmap = {};
            const dmap = {};
            const nrmap = {};
            const pStats = {};
            Object.entries(leaveJson)
                .filter(([k,v]) => typeof v === "object" && !k.startsWith("_"))
                .forEach(([id, f]) => {
                    const emp = f[CONFIG.F_LEAVE.EMP] || "";
                    const date = f[CONFIG.F_LEAVE.DATE] || "";
                    const type = f[CONFIG.F_LEAVE.TYPE] || "排休";
                    if (!emp || !date) return;
                    const parts = date.replace(/\//g,"-").split("-");
                    const y = parseInt(parts[0]), m = parseInt(parts[1]);
                    // 上月值日/值班統計
                    if (y === py && m === pm) {
                        if (!pStats[emp]) pStats[emp] = { duty: 0, zhiban: 0 };
                        if (type === "值日") {
                            const isAuto = f[CONFIG.F_LEAVE.IS_AUTO] || "";
                            if (isAuto !== "未掃") pStats[emp].duty++;
                        } else if (type === "值班") {
                            pStats[emp].zhiban++;
                        }
                    }
                    if (y !== year || m !== month) return;
                    if (type === "禁休") {
                        const reason = f[CONFIG.F_LEAVE.NOTE] || "";
                        nrmap[date] = { ragicId: id, reason };
                    } else if (type === "值日") {
                        const note = f[CONFIG.F_LEAVE.NOTE] || "";
                        const isAuto = f[CONFIG.F_LEAVE.IS_AUTO] || "";
                        const floor = (note.match(/^(1F|2F|3F)$/) || [""])[0];
                        if (!dmap[date]) dmap[date] = [];
                        const missed = isAuto === "未掃";
                        dmap[date].push({ ragicId: id, empName: emp, isAuto, note, floor, missed });
                    } else {
                        // leaves[key] 為陣列，支援同日多種類型（如 排休+值班）
                        const k = `${emp}|${date}`;
                        if (!lmap[k]) lmap[k] = [];
                        lmap[k].push({ ragicId: id, type });
                    }
                });
            setLeaves(lmap);
            setDuties(dmap);
            setNoRest(nrmap);
            setPrevStats(pStats);
        } catch(e) {
            console.error(e);
            showToast("載入失敗: " + e.message, false);
        }
        setLoading(false);
    };

    React.useEffect(() => { load(); }, [year, month]);

    const handleUnlock = () => {
        if (pwInput === EDIT_PASSWORD) {
            setUnlocked(true);
            setPwError(false);
        } else {
            setPwError(true);
        }
    };

    if (!unlocked && !IS_READONLY) {
        return (
            <div className="flex items-center justify-center min-h-screen bg-gray-50">
                <div className="bg-white rounded-2xl shadow-lg p-8 max-w-sm w-full mx-4">
                    <h1 className="text-xl font-bold text-center mb-2" style={{color:"#3f5262"}}>🔒 排班模式</h1>
                    <p className="text-gray-500 text-sm text-center mb-6">每月 20 號後自動開放排班<br/>其他時間需輸入密碼</p>
                    <input type="password" value={pwInput} onChange={e => setPwInput(e.target.value)}
                        onKeyDown={e => e.key === "Enter" && handleUnlock()}
                        className={`w-full px-4 py-3 rounded-lg border-2 text-center text-lg ${pwError ? "border-red-400" : "border-gray-200"} focus:outline-none focus:border-blue-400`}
                        placeholder="密碼" autoFocus />
                    {pwError && <p className="text-red-500 text-sm text-center mt-2">密碼錯誤</p>}
                    <button onClick={handleUnlock} className="w-full mt-4 py-3 bg-blue-500 text-white rounded-lg font-bold hover:bg-blue-600">進入排班</button>
                    <a href="schedule-view.html" className="block text-center text-sm text-gray-400 mt-4 hover:text-gray-600">← 回到閱覽模式</a>
                </div>
            </div>
        );
    }

    // 禁休：點日期欄設定/取消
    const handleNoRest = async (dateStr) => {
        if (IS_READONLY) return;
        const savingKey = `norest|${dateStr}`;
        if (saving[savingKey]) return;
        setSaving(s => ({...s, [savingKey]: true}));
        try {
            const existing = noRest[dateStr];
            if (existing) {
                await SC.apiFetch(`${CONFIG.LEAVE_PATH}/${existing.ragicId}`, { method: "DELETE" });
                setNoRest(nr => { const n = {...nr}; delete n[dateStr]; return n; });
                showToast(`${dateStr} 禁休已取消`);
            } else {
                const reason = prompt("禁休原因（如：開幕活動）：");
                if (reason === null) { setSaving(s => { const n = {...s}; delete n[savingKey]; return n; }); return; }
                const params = new URLSearchParams();
                params.append(CONFIG.F_LEAVE.EMP, "韓珊珊");
                params.append(CONFIG.F_LEAVE.DATE, dateStr);
                params.append(CONFIG.F_LEAVE.YEAR, String(year));
                params.append(CONFIG.F_LEAVE.MONTH, String(month));
                params.append(CONFIG.F_LEAVE.TYPE, "禁休");
                params.append(CONFIG.F_LEAVE.NOTE, reason || "");
                params.append(CONFIG.F_LEAVE.DEPT, "禁休設定");
                const res = await SC.apiFetch(CONFIG.LEAVE_PATH, {
                    method: "POST",
                    headers: {"Content-Type":"application/x-www-form-urlencoded"},
                    body: params.toString()
                });
                setNoRest(nr => ({...nr, [dateStr]: { ragicId: String(res.ragicId), reason: reason || "" }}));
                showToast(`${dateStr} 已設為禁休${reason ? "（" + reason + "）" : ""}`);
            }
        } catch(e) {
            console.error(e);
            showToast("禁休設定失敗: " + e.message, false);
        }
        setSaving(s => { const n = {...s}; delete n[savingKey]; return n; });
    };

    const handleClick = async (empName, dateStr) => {
        if (mode === "值日") {
            // 值日模式：寫入/清除值日生表（支援多樓層）
            const dutyKey = `duty|${dateStr}`;
            if (saving[dutyKey]) return;
            const current = duties[dateStr] || [];
            const myDuties = current.filter(d => d.empName === empName);

            const empObj = allEmployees.find(e => e.name === empName);
            setSaving(s => ({...s, [dutyKey]: true}));
            try {
                if (myDuties.length > 0) {
                    // 同人多層：檢查是否還有空樓層可加
                    const myFloors = myDuties.map(d => d.floor);
                    const usedFloors = current.map(d => d.floor);
                    const canAddFloor = FLOORS.filter(f => !usedFloors.includes(f) && !myFloors.includes(f));
                    if (canAddFloor.length > 0 && !myDuties.some(d => d.missed)) {
                        // 還有空樓層且沒有未掃狀態 → 問要加層還是標未掃
                        const action = prompt(`${empName} 已排 ${myFloors.join("+")}，要？\n1) 加排 ${canAddFloor[0]}\n2) 標記 ${myFloors[myFloors.length-1]} 未掃\n3) 清除 ${myFloors[myFloors.length-1]}\n\n輸入 1/2/3`);
                        if (action === "1") {
                            // 加排新樓層
                            const floor = canAddFloor.sort((a, b) => (empObj?.fc[a]||0) - (empObj?.fc[b]||0))[0];
                            const params = new URLSearchParams();
                            params.append(CONFIG.F_LEAVE.EMP, empName);
                            params.append(CONFIG.F_LEAVE.DATE, dateStr);
                            params.append(CONFIG.F_LEAVE.YEAR, String(year));
                            params.append(CONFIG.F_LEAVE.MONTH, String(month));
                            params.append(CONFIG.F_LEAVE.TYPE, "值日");
                            params.append(CONFIG.F_LEAVE.NOTE, floor);
                            params.append(CONFIG.F_LEAVE.IS_AUTO, "No");
                            params.append(CONFIG.F_LEAVE.DEPT, "手動變更");
                            const res = await SC.apiFetch(CONFIG.LEAVE_PATH, {
                                method: "POST",
                                headers: {"Content-Type":"application/x-www-form-urlencoded"},
                                body: params.toString()
                            });
                            if (floor && empObj) {
                                empObj.fc[floor] = (empObj.fc[floor] || 0) + 1;
                            }
                            setDuties(d => ({...d, [dateStr]: [...(d[dateStr]||[]), {ragicId: String(res.ragicId), empName, isAuto: "No", note: floor, floor}]}));
                            showToast(`${dateStr} ${empName} 加排 ${floor}`);
                            setSaving(s => { const n = {...s}; delete n[dutyKey]; return n; });
                            return;
                        } else if (action === "3") {
                            // 清除最後一層
                            const lastDuty = myDuties[myDuties.length - 1];
                            await SC.apiFetch(`${CONFIG.LEAVE_PATH}/${lastDuty.ragicId}`, { method: "DELETE" });
                            if (lastDuty.floor && empObj) {
                                empObj.fc[lastDuty.floor] = Math.max(0, (empObj.fc[lastDuty.floor]||0) - 1);
                            }
                            setDuties(d => ({...d, [dateStr]: (d[dateStr]||[]).filter(x => x.ragicId !== lastDuty.ragicId)}));
                            showToast(`${empName} ${dateStr} ${lastDuty.floor || "值日"}已清除`);
                            setSaving(s => { const n = {...s}; delete n[dutyKey]; return n; });
                            return;
                        }
                        // action === "2" 或其他 → 繼續走標未掃
                    }
                    // 標記未掃 / 清除（原邏輯，針對最後一筆操作）
                    const lastDuty = myDuties[myDuties.length - 1];
                    if (lastDuty.missed) {
                        // 未掃 → 再點 = 清除
                        await SC.apiFetch(`${CONFIG.LEAVE_PATH}/${lastDuty.ragicId}`, { method: "DELETE" });
                        if (lastDuty.floor && empObj) {
                            empObj.fc[lastDuty.floor] = Math.max(0, (empObj.fc[lastDuty.floor]||0) - 1);
                        }
                        setDuties(d => ({...d, [dateStr]: (d[dateStr]||[]).filter(x => x.ragicId !== lastDuty.ragicId)}));
                        showToast(`${empName} ${dateStr} ${lastDuty.floor || "值日"}已清除`);
                    } else {
                        // 正常 → 標記未掃
                        await SC.apiFetch(`${CONFIG.LEAVE_PATH}/${lastDuty.ragicId}`, {
                            method: "POST",
                            headers: {"Content-Type":"application/x-www-form-urlencoded"},
                            body: new URLSearchParams({ [CONFIG.F_LEAVE.IS_AUTO]: "未掃" }).toString()
                        });
                        setDuties(d => ({...d, [dateStr]: (d[dateStr]||[]).map(x => x.ragicId === lastDuty.ragicId ? {...x, missed: true} : x)}));
                        showToast(`${empName} ${dateStr} 標記未掃 ❌`);
                    }
                } else {
                    // 分配空樓層中此人次數最少的
                    const usedFloors = current.map(d => d.floor);
                    const availFloors = FLOORS.filter(f => !usedFloors.includes(f));
                    if (availFloors.length === 0 && current.length >= 3) {
                        showToast(`${dateStr} 已有 3 位值日生`, false);
                        setSaving(s => { const n = {...s}; delete n[dutyKey]; return n; });
                        return;
                    }
                    // 此人累計次數最少的樓層優先
                    const fc = empObj ? empObj.fc : {};
                    const floor = availFloors.length > 0
                        ? availFloors.sort((a, b) => (fc[a]||0) - (fc[b]||0))[0]
                        : "";
                    const params = new URLSearchParams();
                    params.append(CONFIG.F_LEAVE.EMP, empName);
                    params.append(CONFIG.F_LEAVE.DATE, dateStr);
                    params.append(CONFIG.F_LEAVE.YEAR, String(year));
                    params.append(CONFIG.F_LEAVE.MONTH, String(month));
                    params.append(CONFIG.F_LEAVE.TYPE, "值日");
                    params.append(CONFIG.F_LEAVE.NOTE, floor || "手動變更");
                    params.append(CONFIG.F_LEAVE.IS_AUTO, "No");
                    params.append(CONFIG.F_LEAVE.DEPT, "手動變更");
                    const res = await SC.apiFetch(CONFIG.LEAVE_PATH, {
                        method: "POST",
                        headers: {"Content-Type":"application/x-www-form-urlencoded"},
                        body: params.toString()
                    });
                    // 更新本地樓層次數（員工表 FL 欄位不可寫，僅記憶體內追蹤）
                    if (floor && empObj) {
                        empObj.fc[floor] = (empObj.fc[floor] || 0) + 1;
                    }
                    setDuties(d => ({...d, [dateStr]: [...(d[dateStr]||[]), {ragicId: String(res.ragicId), empName, isAuto: "No", note: floor || "手動變更", floor}]}));
                    showToast(`${dateStr} 值日生：${empName}${floor ? " ("+floor+")" : ""}`);
                }
            } catch(e) {
                console.error(e);
                showToast("儲存失敗: " + e.message, false);
            }
            setSaving(s => { const n = {...s}; delete n[dutyKey]; return n; });
            return;
        }

        // 排休/請假/值班/特休模式：每種類型獨立 toggle，可同日並存（如 排休+值班）
        const key = `${empName}|${dateStr}`;
        if (saving[key]) return;
        const existingList = leaves[key] || [];
        const sameTypeEntry = existingList.find(e => e.type === mode);

        // 值班模式：當天每人最多 1 位，點別人 = 換值班（原子操作）
        // 找出當天已有的其他人值班（不含自己）
        let otherZhibanEntries = [];
        if (mode === "值班" && !sameTypeEntry) {
            Object.entries(leaves).forEach(([k, arr]) => {
                if (!k.endsWith("|" + dateStr)) return;
                const otherEmp = k.split("|")[0];
                if (otherEmp === empName) return;
                if (!Array.isArray(arr)) return;
                arr.forEach(e => {
                    if (e.type === "值班") otherZhibanEntries.push({ key: k, empName: otherEmp, ragicId: e.ragicId });
                });
            });
            if (otherZhibanEntries.length > 0) {
                const oldNames = otherZhibanEntries.map(e => e.empName).join("、");
                if (!window.confirm(`${dateStr} 目前值班是 ${oldNames}，要換成 ${empName} 嗎？`)) return;
            }
        }

        // 排休上限 8 天警告（只在新增時檢查）
        if (mode === "排休" && !sameTypeEntry) {
            const count = Object.entries(leaves).filter(([k,arr]) =>
                k.startsWith(empName + "|") && Array.isArray(arr) && arr.some(e => e.type === "排休")
            ).length;
            if (count >= 8) {
                if (!window.confirm(`${empName} 本月已排休 ${count} 天，超過 8 天上限，確定要繼續？`)) return;
            }
        }

        // 禁休日排休/特休需確認（請假不擋）
        const nrInfo = noRest[dateStr];
        if (nrInfo && (mode === "排休" || mode === "特休") && !sameTypeEntry) {
            if (!window.confirm(`${dateStr} 為禁休日${nrInfo.reason ? "（" + nrInfo.reason + "）" : ""}，確定要排${mode}？`)) return;
        }

        setSaving(s => ({...s, [key]: true}));
        // 值班換人：把舊值班所有人的 key 也鎖住，避免同時點
        if (otherZhibanEntries.length > 0) {
            setSaving(s => {
                const n = {...s};
                otherZhibanEntries.forEach(e => { n[e.key] = true; });
                return n;
            });
        }
        try {
            if (sameTypeEntry) {
                // 同類型已存在 → 清除（保留其他類型）
                await SC.apiFetch(`${CONFIG.LEAVE_PATH}/${sameTypeEntry.ragicId}`, { method:"DELETE" });
                setLeaves(l => {
                    const newList = (l[key] || []).filter(e => e.ragicId !== sameTypeEntry.ragicId);
                    const n = {...l};
                    if (newList.length === 0) delete n[key]; else n[key] = newList;
                    return n;
                });
                showToast(`${empName} ${dateStr} ${mode}已清除`);
            } else {
                // 換值班原子操作：先 DELETE 所有舊值班紀錄，全部成功才 POST 新人
                // 任一 DELETE 失敗 → throw → 不更新 state、不 POST 新人，避免狀態漂移
                if (otherZhibanEntries.length > 0) {
                    for (const oldZ of otherZhibanEntries) {
                        try {
                            await SC.apiFetch(`${CONFIG.LEAVE_PATH}/${oldZ.ragicId}`, { method:"DELETE" });
                        } catch (delErr) {
                            // DELETE 失敗：alert 並中止，不 POST 新人，state 維持原樣
                            const msg = `換值班失敗：舊紀錄（${oldZ.empName}）沒刪掉。請重新整理頁面後再試，或聯絡 Joan 處理。\n\n錯誤：${delErr.message}`;
                            window.alert(msg);
                            throw new Error(`DELETE old 值班 ${oldZ.empName}/${oldZ.ragicId} 失敗：${delErr.message}`);
                        }
                        await sleep(150);
                    }
                    // DELETE 都成功 → 從 state 移除舊值班
                    setLeaves(l => {
                        const n = {...l};
                        otherZhibanEntries.forEach(oldZ => {
                            const newList = (n[oldZ.key] || []).filter(e => e.ragicId !== oldZ.ragicId);
                            if (newList.length === 0) delete n[oldZ.key]; else n[oldZ.key] = newList;
                        });
                        return n;
                    });
                }

                // 新增當前類型（不影響其他類型紀錄）
                const params = new URLSearchParams();
                params.append(CONFIG.F_LEAVE.EMP, empName);
                params.append(CONFIG.F_LEAVE.DATE, dateStr);
                params.append(CONFIG.F_LEAVE.YEAR, String(year));
                params.append(CONFIG.F_LEAVE.MONTH, String(month));
                params.append(CONFIG.F_LEAVE.TYPE, mode);
                const empObj = employees.find(e => e.name === empName);
                // 換值班預設標記為「手動變更」，跟系統預排區分
                if (mode === "值班" && otherZhibanEntries.length > 0) {
                    params.append(CONFIG.F_LEAVE.DEPT, "手動變更");
                } else if (empObj && empObj.dept) {
                    params.append(CONFIG.F_LEAVE.DEPT, empObj.dept);
                }
                let res;
                try {
                    res = await SC.apiFetch(CONFIG.LEAVE_PATH, {
                        method: "POST",
                        headers: {"Content-Type":"application/x-www-form-urlencoded"},
                        body: params.toString()
                    });
                } catch (postErr) {
                    // POST 新人失敗：舊值班已刪、新值班沒進去 → 警告 Joan
                    if (otherZhibanEntries.length > 0) {
                        const oldNames = otherZhibanEntries.map(e => e.empName).join("、");
                        window.alert(`換值班只完成一半：${oldNames} 已從 Ragic 刪除，但 ${empName} 沒寫進去。\n請重新整理頁面後再點 ${empName} 一次。\n\n錯誤：${postErr.message}`);
                    }
                    throw postErr;
                }
                if (!res || !res.ragicId) {
                    if (otherZhibanEntries.length > 0) {
                        const oldNames = otherZhibanEntries.map(e => e.empName).join("、");
                        window.alert(`換值班疑似失敗：${oldNames} 已刪、但 ${empName} 寫入沒拿到 ragicId。請重新整理確認資料狀態。`);
                    }
                    throw new Error("POST 沒拿到 ragicId");
                }
                setLeaves(l => ({...l, [key]: [...(l[key] || []), { ragicId: String(res.ragicId), type: mode }]}));
                if (otherZhibanEntries.length > 0) {
                    showToast(`${dateStr} 值班已換成 ${empName}`);
                } else {
                    showToast(`${empName} ${dateStr} ${mode}`);
                }
            }
        } catch(e) {
            console.error(e);
            showToast("儲存失敗: " + e.message, false);
        }
        setSaving(s => {
            const n = {...s};
            delete n[key];
            otherZhibanEntries.forEach(oz => { delete n[oz.key]; });
            return n;
        });
    };

    const handleAutoSchedule = async () => {
        if (employees.length === 0) { showToast("尚未載入員工資料", false); return; }
        if (!window.confirm(`確定要自動預排 ${year} 年 ${month} 月的值日生？\n每天 3 位（1F/2F/3F），現有的自動排班紀錄會被覆蓋。`)) return;

        setAutoScheduling(true);
        try {
            setProgress({ text: "載入資料...", current: 0, total: 0 });
            // 讀取累計樓層打掃次數（從員工表）
            const fcMap = {}; // fcMap[name] = { "1F":n, "2F":n, "3F":n }
            const empRagicIds = {}; // empRagicIds[name] = ragicId
            allEmployees.forEach(e => {
                fcMap[e.name] = { ...e.fc };
                empRagicIds[e.name] = e.ragicId;
            });

            // 讀上月+當月（上月算 countMap，當月刪舊紀錄+建 zhibanByDate）
            const prevMonth = month === 1 ? 12 : month - 1;
            const prevYear = month === 1 ? year - 1 : year;
            const allLeaveForDuty = await SC.apiFetch(CONFIG.LEAVE_PATH + SC.leaveWhere(prevYear, prevMonth, year, month));
            const countMap = {};
            allEmployees.forEach(e => { countMap[e.name] = 0; });
            Object.entries(allLeaveForDuty)
                .filter(([k,v]) => typeof v === "object" && !k.startsWith("_"))
                .forEach(([id, f]) => {
                    const type = f[CONFIG.F_LEAVE.TYPE] || "";
                    if (type !== "值日") return;
                    const isAutoVal = f[CONFIG.F_LEAVE.IS_AUTO] || "";
                    if (isAutoVal === "未掃") return; // 未掃不計入次數
                    const date = f[CONFIG.F_LEAVE.DATE] || "";
                    const empName = f[CONFIG.F_LEAVE.EMP] || "";
                    if (!date || !empName) return;
                    const parts = date.replace(/\//g,"-").split("-");
                    const y = parseInt(parts[0]), m = parseInt(parts[1]);
                    if (y === prevYear && m === prevMonth && countMap.hasOwnProperty(empName)) {
                        countMap[empName]++;
                    }
                });

            // 新人入池：上月還沒到職的人，起始次數 = 在池老員工的平均（不追入池前的債）
            const prevStart = new Date(prevYear, prevMonth - 1, 1);
            const veteranNames = [];
            const newNames = [];
            allEmployees.forEach(e => {
                const p = e.hireDate.split("/");
                const hired = new Date(+p[0], +p[1]-1, +p[2]);
                if (hired < prevStart) veteranNames.push(e.name);
                else newNames.push(e.name);
            });
            if (veteranNames.length > 0 && newNames.length > 0) {
                const avg = veteranNames.reduce((s, n) => s + (countMap[n]||0), 0) / veteranNames.length;
                newNames.forEach(n => { countMap[n] = Math.round(avg); });
            }

            // === DEBUG: 值日排班診斷 ===
            console.log("=== 值日排班診斷 ===");
            console.log("排班月份:", year, "/", month);
            console.log("上月 countMap (排序):", Object.entries(countMap).sort((a,b) => a[1]-b[1]).map(([n,c]) => `${n}:${c}`).join(", "));
            console.log("新人(用平均):", newNames?.join(", ") || "無");
            console.log("老員工數:", veteranNames?.length || "N/A");

            // 掃描當月值日：保留手動(isAuto=No)並登記佔用樓層/人，其他(Yes/未掃)列入刪除
            setProgress({ text: "清除舊紀錄...", current: 0, total: 0 });
            const manualByDate = {}; // dateStr -> [{ empName, floor }]
            const toDelete = [];
            Object.entries(allLeaveForDuty)
                .filter(([k,v]) => typeof v === "object" && !k.startsWith("_"))
                .forEach(([id, f]) => {
                    const type = f[CONFIG.F_LEAVE.TYPE] || "";
                    if (type !== "值日") return;
                    const date = f[CONFIG.F_LEAVE.DATE] || "";
                    if (!date) return;
                    const parts = date.replace(/\//g,"-").split("-");
                    const y = parseInt(parts[0]), m = parseInt(parts[1]);
                    if (y !== year || m !== month) return;
                    const isAuto = f[CONFIG.F_LEAVE.IS_AUTO] || "";
                    if (isAuto === "No") {
                        const empName = f[CONFIG.F_LEAVE.EMP] || "";
                        const note = f[CONFIG.F_LEAVE.NOTE] || "";
                        const floor = /^(1F|2F|3F)$/.test(note) ? note : "";
                        if (!manualByDate[date]) manualByDate[date] = [];
                        manualByDate[date].push({ empName, floor });
                        if (empName) countMap[empName] = (countMap[empName] || 0) + 1;
                    } else {
                        toDelete.push([id, f]);
                    }
                });
            console.log("保留手動值日天數:", Object.keys(manualByDate).length);
            for (let di = 0; di < toDelete.length; di++) {
                const [id, f] = toDelete[di];
                setProgress({ text: "清除舊值日紀錄", current: di + 1, total: toDelete.length });
                const empName = f[CONFIG.F_LEAVE.EMP] || "";
                const note = f[CONFIG.F_LEAVE.NOTE] || "";
                const floor = /^(1F|2F|3F)$/.test(note) ? note : "";
                if (floor && fcMap[empName]) {
                    fcMap[empName][floor] = Math.max(0, (fcMap[empName][floor] || 0) - 1);
                }
                await SC.apiFetch(`${CONFIG.LEAVE_PATH}/${id}`, { method: "DELETE" });
                await sleep(200);
            }

            // Generate schedule — 每天 3 位值日生，樓層按累計次數公平分配
            const daysInMonth = new Date(year, month, 0).getDate();
            const newDuties = {};
            const lastAssigned = new Set();
            const weeklyAssigned = {}; // weeklyAssigned[name] = Set of week numbers

            // 建立值班表：從 API 直接讀（不依賴 React state，避免時序問題）
            const zhibanByDate = {};
            Object.entries(allLeaveForDuty)
                .filter(([k,v]) => typeof v === "object" && !k.startsWith("_"))
                .forEach(([id, f]) => {
                    const type = f[CONFIG.F_LEAVE.TYPE] || "";
                    if (type !== "值班") return;
                    const date = f[CONFIG.F_LEAVE.DATE] || "";
                    const emp = f[CONFIG.F_LEAVE.EMP] || "";
                    if (!date || !emp) return;
                    const parts = date.replace(/\//g,"-").split("-");
                    const y = parseInt(parts[0]), m = parseInt(parts[1]);
                    if (y === year && m === month) zhibanByDate[date] = emp;
                });
            console.log("值班天數:", Object.keys(zhibanByDate).length, "筆");

            // 計算週數（週一起算）
            const getWeekNum = (day) => {
                const d = new Date(year, month-1, day);
                const jan1 = new Date(year, 0, 1);
                return Math.ceil(((d - jan1) / 86400000 + jan1.getDay()) / 7);
            };

            // 夫妻同排設定（迴圈外宣告，避免重複建立）
            const COUPLES = SC.COUPLES;
            const coupleSet = new Set(COUPLES.flat());

            // 預算夫妻的值班值日天數：值班那天夫妻會一起掃地，先算進 countMap
            // 這樣 Plan A/B 在其他天就會少排他們，總次數跟大家一樣
            const coupleZhibanDays = Object.values(zhibanByDate).filter(emp => coupleSet.has(emp)).length;
            if (coupleZhibanDays > 0) {
                for (const name of coupleSet) {
                    countMap[name] = (countMap[name] || 0) + coupleZhibanDays;
                }
                console.log("夫妻值班值日預算:", coupleZhibanDays, "天，countMap 各 +", coupleZhibanDays);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const mm = String(month).padStart(2,"0");
                const dd = String(day).padStart(2,"0");
                const dateStr = `${year}/${mm}/${dd}`;

                // 禁休日不排值日生（全員打掃）
                if (noRest[dateStr]) continue;

                // 尊重手動值日：跳過已被手動佔用的樓層與人員
                const todayManual = manualByDate[dateStr] || [];
                const manualFloors = new Set(todayManual.map(m => m.floor).filter(f => f));
                const manualEmps = new Set(todayManual.map(m => m.empName).filter(n => n));
                const availFloors = ["1F", "3F", "2F"].filter(f => !manualFloors.has(f));
                if (availFloors.length === 0) continue; // 全部手動排完，無需自動補

                const d = new Date(year, month-1, day);
                const isWknd = d.getDay()===0||d.getDay()===6;
                const weekNum = getWeekNum(day);
                const onLeaveToday = new Set();
                Object.entries(leaves).forEach(([k, arr]) => {
                    if (!k.endsWith("|" + dateStr)) return;
                    if (Array.isArray(arr) && arr.some(e => e.type !== "值班")) onLeaveToday.add(k.split("|")[0]);
                });
                if (!noRest[dateStr] && isGovHoliday(dateStr, isWknd)) {
                    GOV_REST_EMPLOYEES.forEach(name => onLeaveToday.add(name));
                }
                // 生日當天不排值日生
                allEmployees.forEach(e => {
                    if (SC.isBirthday(e, month, day)) onLeaveToday.add(e.name);
                });
                // 手動已排的人今天不重複排
                manualEmps.forEach(n => onLeaveToday.add(n));

                // 值班+值日重疊（夫妻也適用，已預算進 countMap）
                const todayZhiban = zhibanByDate[dateStr] || "";
                const zhibanAvailable = todayZhiban && !onLeaveToday.has(todayZhiban);
                const scoreFn = (name) => {
                    let s = countMap[name] || 0;
                    const wk = weeklyAssigned[name];
                    if (wk && wk.has(weekNum)) s += 5;
                    return s;
                };
                // 自動需補人數 = 可用樓層數 -（是否會 unshift 值班者）
                const needCount = Math.max(0, availFloors.length - (zhibanAvailable ? 1 : 0));

                // 非夫妻個人候選（按 score 排序）
                const mkIndiv = (filterFn) => allEmployees
                    .filter(e => !coupleSet.has(e.name) && filterFn(e) && e.name !== todayZhiban)
                    .map(e => ({ name: e.name, score: scoreFn(e.name) }))
                    .sort((a,b) => a.score - b.score);

                // 值班的人是夫妻一方 → 配偶也一起掃（forcedSpouse）
                let forcedSpouse = null;
                if (zhibanAvailable && coupleSet.has(todayZhiban)) {
                    for (const [a, b] of COUPLES) {
                        const sp = todayZhiban === a ? b : (todayZhiban === b ? a : null);
                        if (sp && !onLeaveToday.has(sp)) forcedSpouse = sp;
                    }
                }

                let chosen;
                if (forcedSpouse) {
                    // 夫妻值班日：配偶保留名額，剩餘從個人選
                    const indivs = mkIndiv(e => !lastAssigned.has(e.name) && !onLeaveToday.has(e.name));
                    chosen = [forcedSpouse, ...indivs.slice(0, needCount - 1).map(c => c.name)];
                } else {
                    // 非夫妻值班日：Plan A vs Plan B 公平比較
                    let coupleNames = null;
                    for (const [a, b] of COUPLES) {
                        const aOk = !lastAssigned.has(a) && !onLeaveToday.has(a) && a !== todayZhiban;
                        const bOk = !lastAssigned.has(b) && !onLeaveToday.has(b) && b !== todayZhiban;
                        if (aOk && bOk && needCount >= 2) coupleNames = [a, b];
                    }
                    const indivs = mkIndiv(e => !lastAssigned.has(e.name) && !onLeaveToday.has(e.name));

                    if (coupleNames) {
                        // Plan A：夫妻 + (N-2) 個人 vs Plan B：N 個人
                        const planA = [...coupleNames, ...indivs.slice(0, needCount - 2).map(c => c.name)];
                        const planB = indivs.slice(0, needCount).map(c => c.name);
                        const scoreA = planA.reduce((s, n) => s + scoreFn(n), 0);
                        const scoreB = planB.reduce((s, n) => s + scoreFn(n), 0);
                        chosen = scoreA < scoreB ? planA : planB;
                    } else {
                        chosen = indivs.slice(0, needCount).map(c => c.name);
                    }
                }
                // Fallback：放寬 lastAssigned
                if (chosen.length < needCount) {
                    const relaxed = mkIndiv(e => !onLeaveToday.has(e.name)).filter(c => !chosen.includes(c.name));
                    while (chosen.length < needCount && relaxed.length > 0) chosen.push(relaxed.shift().name);
                }
                // Final fallback
                if (chosen.length < needCount) {
                    const last = allEmployees.filter(e => e.name !== todayZhiban && !chosen.includes(e.name))
                        .map(e => ({ name: e.name, score: scoreFn(e.name) })).sort((a,b) => a.score - b.score);
                    while (chosen.length < needCount && last.length > 0) chosen.push(last.shift().name);
                }
                if (zhibanAvailable) chosen.unshift(todayZhiban);

                // 分配樓層：僅分配未被手動佔用的樓層，難易度 1F>3F>2F，次數最少的人掃該層
                // 先洗牌（當 fc 全同時，順序隨機；穩定排序會保留 tie 時的隨機序）
                const remaining = [...chosen].sort(() => Math.random() - 0.5);
                const assignments = [];
                for (const floor of availFloors) {
                    if (remaining.length === 0) break;
                    remaining.sort((a, b) => (fcMap[a][floor]||0) - (fcMap[b][floor]||0));
                    const pick = remaining.shift();
                    assignments.push({ empName: pick, floor });
                    fcMap[pick][floor] = (fcMap[pick][floor] || 0) + 1;
                    countMap[pick] = (countMap[pick] || 0) + 1;
                }

                lastAssigned.clear();
                assignments.forEach(a => {
                    lastAssigned.add(a.empName);
                    if (!weeklyAssigned[a.empName]) weeklyAssigned[a.empName] = new Set();
                    weeklyAssigned[a.empName].add(weekNum);
                });
                // 手動已排的人也算今日有排班，避免明天連續
                manualEmps.forEach(n => {
                    lastAssigned.add(n);
                    if (!weeklyAssigned[n]) weeklyAssigned[n] = new Set();
                    weeklyAssigned[n].add(weekNum);
                });
                newDuties[dateStr] = assignments;
            }

            // === DEBUG: 排班結果統計 ===
            const dutyCounts = {};
            Object.values(newDuties).forEach(arr => arr.forEach(a => {
                dutyCounts[a.empName] = (dutyCounts[a.empName] || 0) + 1;
            }));
            console.log("=== 排班結果 ===");
            console.log("總天數:", Object.keys(newDuties).length, "天 ×3 =", Object.keys(newDuties).length * 3, "slots");
            console.log("分配結果 (排序):", Object.entries(dutyCounts).sort((a,b) => b[1]-a[1]).map(([n,c]) => `${n}:${c}`).join(", "));
            console.log("夫妻 Plan A 選中天數:", Object.entries(newDuties).filter(([d, arr]) => {
                const names = arr.map(a => a.empName);
                return names.includes("張忠豪") || names.includes("蕭眞儀");
            }).length);

            // 逐筆寫入值日紀錄
            setProgress({ text: "寫入值日紀錄...", current: 0, total: 0 });
            const batchRecords = [];
            const batchMeta = []; // 記錄順序對照
            for (const [dateStr, assignments] of Object.entries(newDuties)) {
                for (const { empName, floor } of assignments) {
                    batchRecords.push({
                        [CONFIG.F_LEAVE.EMP]: empName,
                        [CONFIG.F_LEAVE.DATE]: dateStr,
                        [CONFIG.F_LEAVE.YEAR]: String(year),
                        [CONFIG.F_LEAVE.MONTH]: String(month),
                        [CONFIG.F_LEAVE.TYPE]: "值日",
                        [CONFIG.F_LEAVE.NOTE]: floor,
                        [CONFIG.F_LEAVE.IS_AUTO]: "Yes",
                        [CONFIG.F_LEAVE.DEPT]: "系統預排"
                    });
                    batchMeta.push({ dateStr, empName, floor });
                }
            }
            const batchRes = await apiBatchCreate(CONFIG.LEAVE_PATH, batchRecords, (cur, tot) => {
                setProgress({ text: "寫入值日紀錄...", current: cur, total: tot });
            });
            const results = batchMeta.map((m, i) => ({ ...m, ragicId: batchRes[i]?.ragicId || "" }));

            // 員工表 FL1/2/3 欄位已移除、不可寫。樓層累計次數改由 load() 直接從 LEAVE 歷史計算。
            // 僅更新記憶體：changedEmps 的 fc 值會透過下方 setAllEmployees 同步到 state。
            const changedEmps = new Set();
            Object.values(newDuties).forEach(arr => arr.forEach(a => changedEmps.add(a.empName)));

            const dmap = {};
            Object.entries(duties).forEach(([dateStr, arr]) => {
                const manual = (arr||[]).filter(d => d.isAuto === "No");
                if (manual.length) dmap[dateStr] = manual;
            });
            results.forEach(({ dateStr, empName, floor, ragicId }) => {
                if (!dmap[dateStr]) dmap[dateStr] = [];
                dmap[dateStr].push({ ragicId, empName, isAuto: "Yes", note: floor, floor });
            });
            setDuties(dmap);
            // 更新本地員工樓層次數
            setAllEmployees(prev => prev.map(e => changedEmps.has(e.name) ? {...e, fc: {...fcMap[e.name]}} : e));
            const totalRecords = Object.values(newDuties).reduce((s, a) => s + a.length, 0);
            showToast(`已完成自動預排 ${Object.keys(newDuties).length} 天 × 3 樓 = ${totalRecords} 筆`);
        } catch(e) {
            console.error(e);
            showToast("自動預排失敗: " + e.message, false);
        }
        setProgress(null);
        setAutoScheduling(false);
    };

    const handleAutoZhiban = async () => {
        if (!window.confirm(`確定要自動預排 ${year} 年 ${month} 月的值班？\n每天 1 人（承攬滿 3 個月），本月所有值班紀錄會被清除重排。`)) return;
        setAutoZhiban(true);
        try {
            setProgress({ text: "載入資料...", current: 0, total: 0 });
            // 承攬 + 到職滿 3 個月
            const schedStart = new Date(year, month - 1, 1);
            const eligible = employees.filter(e => {
                if (e.hire !== "承攬") return false;
                if (e.dept === "社宅部") return false; // 社宅部不值班
                if (e.dept === "設計部") return false; // 設計部不值班
                if (!e.hireDate || e.hireDate === "9999/12/31") return false;
                const p = e.hireDate.split("/");
                const hired = new Date(+p[0], +p[1]-1, +p[2]);
                return (schedStart - hired) / (1000*60*60*24) >= 90;
            });
            if (eligible.length === 0) { showToast("沒有符合條件的值班人員", false); setAutoZhiban(false); return; }

            // 只讀當月（刪除舊紀錄 + 建 onLeave 用，值班不追債不需上月）
            const allLeaveJson = await SC.apiFetch(CONFIG.LEAVE_PATH + SC.leaveWhere(year, month, year, month));
            // 本月從零開始，跨月不追債（新人入池不用補歷史）
            const zCount = {};
            eligible.forEach(e => { zCount[e.name] = 0; });

            // 刪除本月所有值班紀錄（系統預排 + 手動）
            const toDelete = Object.entries(allLeaveJson)
                .filter(([k,v]) => typeof v === "object" && !k.startsWith("_"))
                .filter(([id, f]) => {
                    const type = f[CONFIG.F_LEAVE.TYPE] || "";
                    const date = f[CONFIG.F_LEAVE.DATE] || "";
                    if (type !== "值班") return false;
                    const p = date.replace(/\//g,"-").split("-");
                    return parseInt(p[0]) === year && parseInt(p[1]) === month;
                });
            for (let di = 0; di < toDelete.length; di++) {
                setProgress({ text: "清除舊值班紀錄", current: di + 1, total: toDelete.length });
                await SC.apiFetch(`${CONFIG.LEAVE_PATH}/${toDelete[di][0]}`, { method: "DELETE" });
                await sleep(200);
            }

            setProgress({ text: "計算排班...", current: 0, total: 0 });
            // 每天排 1 人，月內均勻分配
            const totalDays = new Date(year, month, 0).getDate();

            const newZhiban = {};
            let lastPick = "";
            for (let day = 1; day <= totalDays; day++) {
                const mm = String(month).padStart(2,"0");
                const dd = String(day).padStart(2,"0");
                const dateStr = `${year}/${mm}/${dd}`;
                const d = new Date(year, month-1, day);
                const isWknd = d.getDay()===0||d.getDay()===6;
                const onLeave = new Set();
                Object.entries(leaves).forEach(([k, arr]) => {
                    if (!k.endsWith("|" + dateStr)) return;
                    if (Array.isArray(arr) && arr.some(e => e.type !== "值班")) onLeave.add(k.split("|")[0]);
                });
                if (!noRest[dateStr] && isGovHoliday(dateStr, isWknd)) {
                    GOV_REST_EMPLOYEES.forEach(n => onLeave.add(n));
                }
                // 排序：本月次數少的優先（月內均勻），同分時保持原始順序（部門+年資）
                // 跨月不追債：不用歷史次數影響排序
                const sortFn = (a, b) => (zCount[a.name]||0) - (zCount[b.name]||0);
                // 生日當天不排值班
                const isBirthdayToday = (emp) => SC.isBirthday(emp, month, day);
                const cands = eligible
                    .filter(e => e.name !== lastPick && !onLeave.has(e.name) && !isBirthdayToday(e))
                    .sort(sortFn);
                const pool = cands.length > 0 ? cands
                    : eligible.filter(e => !onLeave.has(e.name) && !isBirthdayToday(e)).sort(sortFn);
                const final = pool.length > 0 ? pool
                    : eligible.map(e => ({ name: e.name })).sort(sortFn);
                const chosen = final[0].name;
                zCount[chosen] = (zCount[chosen] || 0) + 1;
                lastPick = chosen;
                newZhiban[dateStr] = chosen;
            }

            setProgress({ text: "寫入值班紀錄...", current: 0, total: 0 });
            // 逐筆寫入 Ragic
            const zBatchRecords = [];
            const zBatchMeta = [];
            for (const [dateStr, empName] of Object.entries(newZhiban)) {
                zBatchRecords.push({
                    [CONFIG.F_LEAVE.EMP]: empName,
                    [CONFIG.F_LEAVE.DATE]: dateStr,
                    [CONFIG.F_LEAVE.YEAR]: String(year),
                    [CONFIG.F_LEAVE.MONTH]: String(month),
                    [CONFIG.F_LEAVE.TYPE]: "值班",
                    [CONFIG.F_LEAVE.DEPT]: "系統預排值班"
                });
                zBatchMeta.push({ empName, dateStr });
            }
            const zBatchRes = await apiBatchCreate(CONFIG.LEAVE_PATH, zBatchRecords, (cur, tot) => {
                setProgress({ text: "寫入值班紀錄...", current: cur, total: tot });
            });
            const newZhibanEntries = []; // [{key, entry}]
            zBatchMeta.forEach((m, i) => {
                newZhibanEntries.push({
                    key: `${m.empName}|${m.dateStr}`,
                    entry: { ragicId: String(zBatchRes[i]?.ragicId || ""), type: "值班" }
                });
            });
            // 更新 state：從每個 key 的陣列移除被刪的 ragicId，再加入新的 值班 entry
            const deletedIds = new Set(toDelete.map(([id]) => id));
            setLeaves(prev => {
                const next = {};
                for (const [k, arr] of Object.entries(prev)) {
                    const filtered = (arr || []).filter(e => !deletedIds.has(e.ragicId));
                    if (filtered.length > 0) next[k] = filtered;
                }
                newZhibanEntries.forEach(({ key, entry }) => {
                    if (!next[key]) next[key] = [];
                    next[key].push(entry);
                });
                return next;
            });
            showToast(`已完成自動預排值班 ${Object.keys(newZhiban).length} 天`);
        } catch(e) {
            console.error(e);
            showToast("自動預排值班失敗: " + e.message, false);
        }
        setProgress(null);
        setAutoZhiban(false);
    };

    const daysInMonth = new Date(year, month, 0).getDate();
    const dates = Array.from({length: daysInMonth}, (_, i) => {
        const d = new Date(year, month-1, i+1);
        return { day: i+1, dow: DAYS[d.getDay()], isWeekend: d.getDay()===0||d.getDay()===6 };
    });
    const today = new Date();
    const todayStr = `${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,"0")}/${String(today.getDate()).padStart(2,"0")}`;

    const changeMonth = (offset) => {
        let m = month + offset, y = year;
        if (m < 1) { m = 12; y--; }
        if (m > 12) { m = 1; y++; }
        setYear(y); setMonth(m);
    };

    const getStats = (empName) => {
        let paixiu = 0, texiu = 0, qingjia = 0, zhiban = 0, f1 = 0, f2 = 0, f3 = 0, dutyOther = 0;
        Object.entries(leaves).forEach(([k, arr]) => {
            if (!k.startsWith(empName + "|") || !Array.isArray(arr)) return;
            arr.forEach(v => {
                if (v.type === "排休") paixiu++;
                else if (v.type === "特休") texiu++;
                else if (v.type === "值班") zhiban++;
                else qingjia++;
            });
        });
        let missed = 0;
        Object.values(duties).forEach(arr => {
            (arr||[]).forEach(d => {
                if (d.empName !== empName) return;
                if (d.missed) { missed++; return; }
                if (d.floor === "1F") f1++;
                else if (d.floor === "2F") f2++;
                else if (d.floor === "3F") f3++;
                else dutyOther++;
            });
        });
        // 計算見紅休天數（該月的週末+國定假日，扣除禁休日）
        let govRestDays = 0;
        if (GOV_REST_EMPLOYEES.has(empName)) {
            const dim = new Date(year, month, 0).getDate();
            for (let d = 1; d <= dim; d++) {
                const mm = String(month).padStart(2,"0");
                const dd = String(d).padStart(2,"0");
                const ds = `${year}/${mm}/${dd}`;
                if (noRest[ds]) continue; // 禁休日不算
                const dt = new Date(year, month-1, d);
                const isWk = dt.getDay()===0||dt.getDay()===6;
                if (isGovHoliday(ds, isWk)) govRestDays++;
            }
        }
        const totalRest = paixiu + texiu + qingjia + govRestDays;
        return { paixiu, texiu, qingjia, zhiban, f1, f2, f3, dutyOther, missed, govRestDays, totalRest };
    };

    const pct = progress && progress.total > 0 ? Math.round(progress.current / progress.total * 100) : null;

    return (
        <div className="max-w-full mx-auto p-4">
            {progress && (
                <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[100]">
                    <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full mx-4 text-center">
                        <div className="cell-spin w-10 h-10 border-4 border-blue-200 border-t-blue-600 rounded-full mx-auto mb-4"></div>
                        <div className="text-lg font-bold mb-2" style={{color:"#3f5262"}}>{progress.text}</div>
                        {progress.total > 0 && (
                            <>
                                <div className="w-full bg-gray-200 rounded-full h-4 mb-2 overflow-hidden">
                                    <div className="h-full rounded-full transition-all duration-300" style={{width: pct + "%", background: "linear-gradient(90deg, #3b82f6, #8b5cf6)"}}></div>
                                </div>
                                <div className="text-sm text-gray-500">{progress.current} / {progress.total}（{pct}%）</div>
                            </>
                        )}
                        {!progress.total && <div className="text-sm text-gray-400">請稍候...</div>}
                    </div>
                </div>
            )}
            <div className="flex items-center justify-between mb-4 bg-white rounded-xl shadow-sm p-4">
                <h1 className="text-xl font-bold" style={{color:"#3f5262"}}>🗓️ 窩的家 — 排班表{IS_READONLY ? "（閱覽）" : ""}</h1>
                <div className="flex items-center gap-3">
                    <button onClick={() => changeMonth(-1)} className="px-3 py-1.5 bg-gray-100 rounded-lg hover:bg-gray-200 font-bold">◀</button>
                    <span className="text-lg font-bold min-w-[140px] text-center">{year} 年 {month} 月</span>
                    <button onClick={() => changeMonth(1)} className="px-3 py-1.5 bg-gray-100 rounded-lg hover:bg-gray-200 font-bold">▶</button>
                    <button onClick={load} className="ml-2 px-3 py-1.5 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 text-sm">重新載入</button>
                    {!IS_READONLY && <button
                        onClick={handleAutoSchedule}
                        disabled={autoScheduling || loading}
                        className="px-3 py-1.5 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-100 text-sm disabled:opacity-50 disabled:cursor-not-allowed">
                        {autoScheduling ? "預排中..." : "一鍵預排值日生"}
                    </button>}
                    {!IS_READONLY && <button
                        onClick={handleAutoZhiban}
                        disabled={autoZhiban || loading}
                        className="px-3 py-1.5 bg-orange-50 text-orange-600 rounded-lg hover:bg-orange-100 text-sm disabled:opacity-50 disabled:cursor-not-allowed">
                        {autoZhiban ? "預排中..." : "一鍵排值班"}
                    </button>}
                    <button
                        onClick={() => setShowRules(true)}
                        className="w-7 h-7 rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 hover:text-gray-700 text-sm font-bold flex items-center justify-center"
                        title="排班規則說明">?</button>
                </div>
            </div>

            {showRules && (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={() => setShowRules(false)}>
                    <div className="bg-white rounded-2xl shadow-xl max-w-lg w-full max-h-[80vh] overflow-y-auto p-6" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-lg font-bold" style={{color:"#3f5262"}}>排班規則說明</h2>
                            <button onClick={() => setShowRules(false)} className="text-gray-400 hover:text-gray-600 text-xl">✕</button>
                        </div>
                        <div className="space-y-4 text-sm text-gray-700 leading-relaxed">
                            <div>
                                <h3 className="font-bold text-base mb-1">📋 狀態說明</h3>
                                <table className="w-full text-left text-sm">
                                    <tbody>
                                        <tr><td className="pr-2 py-0.5"><span className="inline-block px-1.5 rounded bg-green-100 text-green-700">排休</span></td><td>月休（計入 8 天上限）</td></tr>
                                        <tr><td className="pr-2 py-0.5"><span className="inline-block px-1.5 rounded bg-yellow-100 text-yellow-700">特休</span></td><td>特別休假</td></tr>
                                        <tr><td className="pr-2 py-0.5"><span className="inline-block px-1.5 rounded bg-red-100 text-red-700">請假</span></td><td>事假/病假</td></tr>
                                        <tr><td className="pr-2 py-0.5"><span className="inline-block px-1.5 rounded bg-orange-100 text-orange-700">值班</span></td><td>19:00-20:00 多留 1 小時</td></tr>
                                        <tr><td className="pr-2 py-0.5"><span className="inline-block px-1.5 rounded bg-blue-100 text-blue-700">值日</span></td><td>打掃（1F/2F/3F 每天各 1 人）</td></tr>
                                        <tr><td className="pr-2 py-0.5"><span className="inline-block px-1.5 rounded bg-gray-100 text-gray-500">休假</span></td><td>見紅休（設計部＋瓊安，週末/國定假日自動標記）</td></tr>
                                    </tbody>
                                </table>
                            </div>
                            <hr className="border-gray-200" />
                            <div>
                                <h3 className="font-bold text-base mb-1">⚡ 一鍵排值班</h3>
                                <ul className="list-disc pl-4 space-y-1">
                                    <li><b>資格</b>：承攬＋到職滿 3 個月（社宅部除外）</li>
                                    <li><b>每月從零開始</b>：不追歷史累計，當月均勻分配</li>
                                    <li>每天 1 人，月內次數差距 ≤ 1</li>
                                    <li>不連續排同一人，排除當天休假者</li>
                                    <li>新人入池不用補前人的值班次數</li>
                                </ul>
                            </div>
                            <hr className="border-gray-200" />
                            <div>
                                <h3 className="font-bold text-base mb-1">🧹 一鍵預排值日生</h3>
                                <ul className="list-disc pl-4 space-y-1">
                                    <li><b>資格</b>：全部在職（不含經營階層、兼職）</li>
                                    <li><b>公平輪轉</b>：上月次數少的人優先排，多的少排</li>
                                    <li><b>新人不追入池前的債</b>：起始次數 = 老員工平均值</li>
                                    <li>每天 3 位，分配 1F / 2F / 3F（難度：1F &gt; 3F &gt; 2F）</li>
                                    <li>盡量一週排一次（本週已排過 +5 分降低優先）</li>
                                    <li>不連續排同一人，排除當天休假/見紅休者</li>
                                    <li>值班的人同天順便掃地（佔 1 個值日名額）</li>
                                    <li>禁休日全員打掃，不排值日生</li>
                                </ul>
                                <div className="mt-3 p-3 bg-blue-50 rounded-lg text-xs text-blue-800">
                                    <p className="font-bold mb-1">💡 怎麼決定誰多排？（舉例）</p>
                                    <p>假設上個月大家平均打掃 2 次：</p>
                                    <table className="w-full mt-1 text-xs">
                                        <thead><tr className="text-left"><th className="pr-2">人</th><th className="pr-2">上月實際</th><th className="pr-2">跟平均的差</th><th>本月結果</th></tr></thead>
                                        <tbody>
                                            <tr><td>瓊安</td><td>2 次</td><td>剛好</td><td>排 ~4 次（正常）</td></tr>
                                            <tr><td>瓊安（如果上月 0 次）</td><td>0 次</td><td>少 2 次</td><td>排 ~6 次（多排 2 次拉平）</td></tr>
                                        </tbody>
                                    </table>
                                    <p className="mt-1.5 text-blue-600">大家都是按上月打掃次數排的 — 次數少的這個月多排一點，次數多的少排一點，確保長期下來每個人差不多。每位員工名字下方的 🧹 數字就是上月打掃次數，可以對照確認。</p>
                                </div>
                            </div>
                            <hr className="border-gray-200" />
                            <div>
                                <h3 className="font-bold text-base mb-1">💑 夫妻同排（張忠豪 &amp; 蕭眞儀）</h3>
                                <ul className="list-disc pl-4 space-y-1">
                                    <li>值日生必須一起排（一組佔 2 個名額）</li>
                                    <li>作為一個「家庭單位」跟個人公平競爭</li>

                                    <li>值班各自獨立，不受夫妻規則影響</li>
                                </ul>

                            <hr className="border-gray-200" />

                            <div>
                                <h3 className="font-bold text-base mb-1">📅 權限</h3>
                                <ul className="list-disc pl-4 space-y-1">

                        </div>
                        <button onClick={() => setShowRules(false)} className="mt-5 w-full py-2.5 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 font-bold">關閉</button>
                    </div>
                </div>
            )}

            <div className="flex items-center gap-2 mb-3">
                {!IS_READONLY && <>

                    {id:"排休", color:"bg-green-500", label:"排休"},

                        {m.label}
