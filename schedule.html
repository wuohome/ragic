<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>窩的家 — 排班表</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f8fafc; font-family: "Microsoft JhengHei","Noto Sans TC",sans-serif; }
        .cell-spin { animation: spin .6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        table { border-collapse: collapse; }
        th, td { border: 1px solid #e2e8f0; }
        .sticky-left { position: sticky; left: 0; z-index: 2; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const CONFIG = {
    BASE: "https://ap15.ragic.com",
    KEY: "VEZsOEwzYzVJdWdoWXRDM3ptS2YwRytLV21BaWhPTDRLWXhPb2FLZ3VBUm1BZE90VzJtZzlTNjVlbCszRnZkRw==",
    EMP_PATH: "/wuohome/ragicforms4/20004",
    LEAVE_PATH: "/wuohome/ragicforms4/2",
    F_EMP: { NAME:"3000933", DISPLAY:"1000848", DEPT:"3000937", STATUS:"3000945", HIRE:"3000955", HIRE_DATE:"3000943" },
    F_LEAVE: { EMP:"1000961", DATE:"1000963", YEAR:"1000964", MONTH:"1000965", TYPE:"1002025", DEPT:"1002026" },
    DUTY_PATH: "/wuohome/ragicforms4/3",
    F_DUTY: { DATE:"1000971", EMP:"1000972", YEAR:"1000973", MONTH:"1000974", IS_AUTO:"1000975", NOTE:"1000976" }
};

const apiFetch = async (path, opts={}) => {
    const sep = path.includes("?") ? "&" : "?";
    const url = `${CONFIG.BASE}${path}${sep}api=true&v=3&naming=EID&APIKey=${encodeURIComponent(CONFIG.KEY)}`;
    const res = await fetch(url, opts);
    if (!res.ok) throw new Error(`API ${res.status}`);
    if (opts.method === "DELETE") return {};
    return res.json();
};

const DAYS = ["日","一","二","三","四","五","六"];
const DEPT_COLORS = { "租賃部":"#f97316", "設計部":"#10b981", "管理部":"#8b5cf6", "管理部/秘書":"#8b5cf6" };
const DEPT_ORDER = { "租賃部":0, "設計部":1, "管理部":2, "管理部/秘書":3 };

const App = () => {
    const [year, setYear] = React.useState(new Date().getFullYear());
    const [month, setMonth] = React.useState(new Date().getMonth() + 1);
    const [employees, setEmployees] = React.useState([]);
    const [allEmployees, setAllEmployees] = React.useState([]);
    const [leaves, setLeaves] = React.useState({});
    const [loading, setLoading] = React.useState(true);
    const [saving, setSaving] = React.useState({});
    const [duties, setDuties] = React.useState({});  // key: "YYYY/MM/DD" → {ragicId, empName, isAuto}
    const [toast, setToast] = React.useState(null);
    const [autoScheduling, setAutoScheduling] = React.useState(false);

    const showToast = (msg, ok=true) => {
        setToast({msg, ok});
        setTimeout(() => setToast(null), 2500);
    };

    const load = async () => {
        setLoading(true);
        try {
            const empJson = await apiFetch(CONFIG.EMP_PATH);
            const allEmps = Object.entries(empJson)
                .filter(([k,v]) => typeof v === "object" && !k.startsWith("_"))
                .map(([id, f]) => ({
                    name: f[CONFIG.F_EMP.NAME] || "",
                    display: f[CONFIG.F_EMP.NAME] || "",
                    dept: f[CONFIG.F_EMP.DEPT] || "",
                    status: f[CONFIG.F_EMP.STATUS] || "",
                    hire: f[CONFIG.F_EMP.HIRE] || "",
                    hireDate: f[CONFIG.F_EMP.HIRE_DATE] || "9999/12/31"
                }))
                .filter(e => e.status === "在職" && e.dept !== "經營階層");
            setAllEmployees(allEmps.sort((a,b) => a.dept.localeCompare(b.dept) || a.name.localeCompare(b.name)));

            // 排休用：只有承攬 + 韓珊珊
            const emps = allEmps
                .filter(e => e.hire === "承攬" || e.name === "韓珊珊")
                .map(e => e.name === "韓珊珊" ? {...e, dept: "管理部/秘書"} : e)
                .sort((a,b) => (DEPT_ORDER[a.dept]||99) - (DEPT_ORDER[b.dept]||99) || a.hireDate.localeCompare(b.hireDate));
            setEmployees(emps);

            const leaveJson = await apiFetch(CONFIG.LEAVE_PATH);
            const lmap = {};
            Object.entries(leaveJson)
                .filter(([k,v]) => typeof v === "object" && !k.startsWith("_"))
                .forEach(([id, f]) => {
                    const emp = f[CONFIG.F_LEAVE.EMP] || "";
                    const date = f[CONFIG.F_LEAVE.DATE] || "";
                    const type = f[CONFIG.F_LEAVE.TYPE] || "排休";
                    if (!emp || !date) return;
                    const parts = date.replace(/\//g,"-").split("-");
                    const y = parseInt(parts[0]), m = parseInt(parts[1]);
                    if (y === year && m === month) {
                        lmap[`${emp}|${date}`] = { ragicId: id, type };
                    }
                });
            setLeaves(lmap);

            // Fetch duties for current month
            const dutyJson = await apiFetch(CONFIG.DUTY_PATH);
            const dmap = {};
            Object.entries(dutyJson)
                .filter(([k,v]) => typeof v === "object" && !k.startsWith("_"))
                .forEach(([id, f]) => {
                    const date = f[CONFIG.F_DUTY.DATE] || "";
                    const empName = f[CONFIG.F_DUTY.EMP] || "";
                    const isAuto = f[CONFIG.F_DUTY.IS_AUTO] || "";
                    const note = f[CONFIG.F_DUTY.NOTE] || "";
                    if (!date || !empName) return;
                    const parts = date.replace(/\//g,"-").split("-");
                    const y = parseInt(parts[0]), m = parseInt(parts[1]);
                    if (y === year && m === month) {
                        dmap[date] = { ragicId: id, empName, isAuto, note };
                    }
                });
            setDuties(dmap);
        } catch(e) {
            console.error(e);
            showToast("載入失敗: " + e.message, false);
        }
        setLoading(false);
    };

    React.useEffect(() => { load(); }, [year, month]);

    const handleClick = async (empName, dateStr) => {
        const key = `${empName}|${dateStr}`;
        if (saving[key]) return;

        setSaving(s => ({...s, [key]: true}));
        try {
            const existing = leaves[key];
            if (!existing) {
                // Empty -> 排休
                const params = new URLSearchParams();
                params.append(CONFIG.F_LEAVE.EMP, empName);
                params.append(CONFIG.F_LEAVE.DATE, dateStr);
                params.append(CONFIG.F_LEAVE.YEAR, String(year));
                params.append(CONFIG.F_LEAVE.MONTH, String(month));
                params.append(CONFIG.F_LEAVE.TYPE, "排休");
                // 找到員工的部門，一起寫入
                const empObj = employees.find(e => e.name === empName);
                if (empObj && empObj.dept) params.append(CONFIG.F_LEAVE.DEPT, empObj.dept);
                const res = await apiFetch(CONFIG.LEAVE_PATH, {
                    method: "POST",
                    headers: {"Content-Type":"application/x-www-form-urlencoded"},
                    body: params.toString()
                });
                setLeaves(l => ({...l, [key]: {ragicId: String(res.ragicId), type:"排休"}}));
                showToast(`${empName} ${dateStr} 排休`);
            } else if (existing.type === "排休") {
                // 排休 -> 請假
                const params = new URLSearchParams();
                params.append(CONFIG.F_LEAVE.TYPE, "請假");
                await apiFetch(`${CONFIG.LEAVE_PATH}/${existing.ragicId}`, {
                    method: "POST",
                    headers: {"Content-Type":"application/x-www-form-urlencoded"},
                    body: params.toString()
                });
                setLeaves(l => ({...l, [key]: {...existing, type:"請假"}}));
                showToast(`${empName} ${dateStr} 請假`);
            } else {
                // 請假 -> 刪除
                await apiFetch(`${CONFIG.LEAVE_PATH}/${existing.ragicId}`, { method:"DELETE" });
                setLeaves(l => { const n = {...l}; delete n[key]; return n; });
                showToast(`${empName} ${dateStr} 已清除`);
            }
        } catch(e) {
            console.error(e);
            showToast("儲存失敗: " + e.message, false);
        }
        setSaving(s => { const n = {...s}; delete n[key]; return n; });
    };

    const handleDutyClick = async (dateStr) => {
        const dutyKey = `duty|${dateStr}`;
        if (saving[dutyKey]) return;

        const empNames = allEmployees.map(e => e.name);
        if (empNames.length === 0) return;

        const current = duties[dateStr];
        const currentName = current ? current.empName : "";

        // Build prompt with options
        const options = ["（清除）", ...empNames];
        const promptMsg = `選擇 ${dateStr} 的值日生：\n` +
            options.map((n, i) => `${i}. ${n}`).join("\n") +
            `\n\n目前：${currentName || "（無）"}\n請輸入編號：`;
        const input = window.prompt(promptMsg);
        if (input === null) return; // cancelled

        const idx = parseInt(input);
        if (isNaN(idx) || idx < 0 || idx >= options.length) {
            showToast("無效的選擇", false);
            return;
        }

        setSaving(s => ({...s, [dutyKey]: true}));
        try {
            if (idx === 0) {
                // Clear duty
                if (current && current.ragicId) {
                    await apiFetch(`${CONFIG.DUTY_PATH}/${current.ragicId}`, { method: "DELETE" });
                }
                setDuties(d => { const n = {...d}; delete n[dateStr]; return n; });
                showToast(`${dateStr} 值日生已清除`);
            } else {
                const selectedName = empNames[idx - 1];
                const params = new URLSearchParams();
                params.append(CONFIG.F_DUTY.DATE, dateStr);
                params.append(CONFIG.F_DUTY.EMP, selectedName);
                params.append(CONFIG.F_DUTY.YEAR, String(year));
                params.append(CONFIG.F_DUTY.MONTH, String(month));
                params.append(CONFIG.F_DUTY.IS_AUTO, "No");
                params.append(CONFIG.F_DUTY.NOTE, "手動變更");

                if (current && current.ragicId) {
                    // Update existing record
                    await apiFetch(`${CONFIG.DUTY_PATH}/${current.ragicId}`, {
                        method: "POST",
                        headers: {"Content-Type":"application/x-www-form-urlencoded"},
                        body: params.toString()
                    });
                    setDuties(d => ({...d, [dateStr]: {...current, empName: selectedName, isAuto: "No", note: "手動變更"}}));
                } else {
                    // Create new record
                    const res = await apiFetch(CONFIG.DUTY_PATH, {
                        method: "POST",
                        headers: {"Content-Type":"application/x-www-form-urlencoded"},
                        body: params.toString()
                    });
                    setDuties(d => ({...d, [dateStr]: {ragicId: String(res.ragicId), empName: selectedName, isAuto: "No", note: "手動變更"}}));
                }
                showToast(`${dateStr} 值日生：${selectedName}`);
            }
        } catch(e) {
            console.error(e);
            showToast("儲存失敗: " + e.message, false);
        }
        setSaving(s => { const n = {...s}; delete n[dutyKey]; return n; });
    };

    const handleAutoSchedule = async () => {
        if (employees.length === 0) { showToast("尚未載入員工資料", false); return; }
        if (!window.confirm(`確定要自動預排 ${year} 年 ${month} 月的值日生？\n現有的自動排班紀錄會被覆蓋。`)) return;

        setAutoScheduling(true);
        try {
            // Fetch previous month's duties to get counts
            const prevMonth = month === 1 ? 12 : month - 1;
            const prevYear = month === 1 ? year - 1 : year;
            const prevDutyJson = await apiFetch(CONFIG.DUTY_PATH);
            const countMap = {};
            allEmployees.forEach(e => { countMap[e.name] = 0; });

            Object.entries(prevDutyJson)
                .filter(([k,v]) => typeof v === "object" && !k.startsWith("_"))
                .forEach(([id, f]) => {
                    const date = f[CONFIG.F_DUTY.DATE] || "";
                    const empName = f[CONFIG.F_DUTY.EMP] || "";
                    if (!date || !empName) return;
                    const parts = date.replace(/\//g,"-").split("-");
                    const y = parseInt(parts[0]), m = parseInt(parts[1]);
                    if (y === prevYear && m === prevMonth && countMap.hasOwnProperty(empName)) {
                        countMap[empName]++;
                    }
                });

            // Generate schedule for each day of the month
            const daysInMonth = new Date(year, month, 0).getDate();
            const newDuties = {};
            let lastAssigned = "";

            for (let day = 1; day <= daysInMonth; day++) {
                const mm = String(month).padStart(2,"0");
                const dd = String(day).padStart(2,"0");
                const dateStr = `${year}/${mm}/${dd}`;

                // Sort employees by duty count (ascending), avoid same as yesterday
                const candidates = allEmployees
                    .map(e => ({ name: e.name, count: countMap[e.name] || 0 }))
                    .filter(e => e.name !== lastAssigned)
                    .sort((a,b) => a.count - b.count);

                // If all employees are the same as lastAssigned (only 1 employee), fallback
                const pool = candidates.length > 0 ? candidates : allEmployees.map(e => ({ name: e.name, count: countMap[e.name] || 0 })).sort((a,b) => a.count - b.count);
                const chosen = pool[0].name;
                countMap[chosen] = (countMap[chosen] || 0) + 1;
                lastAssigned = chosen;
                newDuties[dateStr] = chosen;
            }

            // Write all records to Ragic (delete existing auto records first, then create)
            // Delete existing auto-scheduled records for this month
            const existingDutyJson = await apiFetch(CONFIG.DUTY_PATH);
            const deletePromises = [];
            Object.entries(existingDutyJson)
                .filter(([k,v]) => typeof v === "object" && !k.startsWith("_"))
                .forEach(([id, f]) => {
                    const date = f[CONFIG.F_DUTY.DATE] || "";
                    const isAuto = f[CONFIG.F_DUTY.IS_AUTO] || "";
                    if (!date) return;
                    const parts = date.replace(/\//g,"-").split("-");
                    const y = parseInt(parts[0]), m = parseInt(parts[1]);
                    if (y === year && m === month && isAuto !== "No") {
                        deletePromises.push(apiFetch(`${CONFIG.DUTY_PATH}/${id}`, { method: "DELETE" }));
                    }
                });
            await Promise.all(deletePromises);

            // Create new records
            const createPromises = Object.entries(newDuties).map(async ([dateStr, empName]) => {
                const params = new URLSearchParams();
                params.append(CONFIG.F_DUTY.DATE, dateStr);
                params.append(CONFIG.F_DUTY.EMP, empName);
                params.append(CONFIG.F_DUTY.YEAR, String(year));
                params.append(CONFIG.F_DUTY.MONTH, String(month));
                params.append(CONFIG.F_DUTY.IS_AUTO, "Yes");
                params.append(CONFIG.F_DUTY.NOTE, "系統預排");
                const res = await apiFetch(CONFIG.DUTY_PATH, {
                    method: "POST",
                    headers: {"Content-Type":"application/x-www-form-urlencoded"},
                    body: params.toString()
                });
                return { dateStr, empName, ragicId: String(res.ragicId) };
            });

            const results = await Promise.all(createPromises);
            const dmap = {};
            // Keep manually-changed duties
            Object.entries(duties).forEach(([dateStr, d]) => {
                if (d.isAuto === "No") dmap[dateStr] = d;
            });
            results.forEach(({ dateStr, empName, ragicId }) => {
                if (!dmap[dateStr]) {
                    dmap[dateStr] = { ragicId, empName, isAuto: "Yes", note: "系統預排" };
                }
            });
            setDuties(dmap);
            showToast(`已完成自動預排 ${Object.keys(newDuties).length} 天`);
        } catch(e) {
            console.error(e);
            showToast("自動預排失敗: " + e.message, false);
        }
        setAutoScheduling(false);
    };

    const daysInMonth = new Date(year, month, 0).getDate();
    const dates = Array.from({length: daysInMonth}, (_, i) => {
        const d = new Date(year, month-1, i+1);
        return { day: i+1, dow: DAYS[d.getDay()], isWeekend: d.getDay()===0||d.getDay()===6 };
    });
    const today = new Date();
    const todayStr = `${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,"0")}/${String(today.getDate()).padStart(2,"0")}`;

    const changeMonth = (offset) => {
        let m = month + offset, y = year;
        if (m < 1) { m = 12; y--; }
        if (m > 12) { m = 1; y++; }
        setYear(y); setMonth(m);
    };

    const getStats = (empName) => {
        let paixiu = 0, qingjia = 0;
        Object.entries(leaves).forEach(([k,v]) => {
            if (k.startsWith(empName + "|")) {
                if (v.type === "排休") paixiu++; else qingjia++;
            }
        });
        return { paixiu, qingjia };
    };

    return (
        <div className="max-w-full mx-auto p-4">
            <div className="flex items-center justify-between mb-4 bg-white rounded-xl shadow-sm p-4">
                <h1 className="text-xl font-bold" style={{color:"#3f5262"}}>🗓️ 窩的家 — 排班表</h1>
                <div className="flex items-center gap-3">
                    <button onClick={() => changeMonth(-1)} className="px-3 py-1.5 bg-gray-100 rounded-lg hover:bg-gray-200 font-bold">◀</button>
                    <span className="text-lg font-bold min-w-[140px] text-center">{year} 年 {month} 月</span>
                    <button onClick={() => changeMonth(1)} className="px-3 py-1.5 bg-gray-100 rounded-lg hover:bg-gray-200 font-bold">▶</button>
                    <button onClick={load} className="ml-2 px-3 py-1.5 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 text-sm">重新載入</button>
                    <button
                        onClick={handleAutoSchedule}
                        disabled={autoScheduling || loading}
                        className="px-3 py-1.5 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-100 text-sm disabled:opacity-50 disabled:cursor-not-allowed">
                        {autoScheduling ? "預排中..." : "一鍵預排值日生"}
                    </button>
                </div>
            </div>

            <div className="flex gap-4 mb-3 text-sm">
                <span className="flex items-center gap-1"><span className="w-4 h-4 rounded bg-green-500 inline-block"></span> 排休</span>
                <span className="flex items-center gap-1"><span className="w-4 h-4 rounded bg-red-500 inline-block"></span> 請假</span>
                <span className="flex items-center gap-1"><span className="w-4 h-4 rounded bg-blue-500 inline-block"></span> 值日生</span>
                <span className="text-gray-400">點格子循環：空 → 排休 → 請假 → 空</span>
            </div>

            {loading ? (
                <div className="flex items-center justify-center py-20">
                    <div className="cell-spin w-8 h-8 border-4 border-blue-200 border-t-blue-600 rounded-full"></div>
                    <span className="ml-3 text-gray-500">載入中...</span>
                </div>
            ) : (
                <div className="overflow-x-auto bg-white rounded-xl shadow-sm">
                    <table className="w-full text-sm">
                        <thead>
                            <tr>
                                <th className="sticky-left bg-white p-2 min-w-[80px]" rowSpan={2}>
                                    <span className="text-gray-500 text-xs">日期</span>
                                </th>
                                <th className="p-1 text-white text-xs font-medium" style={{backgroundColor:"#3b82f6", minWidth:"56px"}} rowSpan={2}>
                                    值日
                                </th>
                                {(() => {
                                    const result = [];
                                    let i = 0;
                                    while (i < employees.length) {
                                        const dept = employees[i].dept;
                                        let count = 0;
                                        while (i + count < employees.length && employees[i + count].dept === dept) count++;
                                        const color = DEPT_COLORS[dept] || "#6b7280";
                                        result.push(
                                            <th key={dept} colSpan={count} className="p-1 text-white text-xs font-medium" style={{backgroundColor: color}}>
                                                {dept}
                                            </th>
                                        );
                                        i += count;
                                    }
                                    return result;
                                })()}
                            </tr>
                            <tr className="bg-gray-50">
                                {employees.map(emp => (
                                    <th key={emp.name} className="p-2 text-center font-medium text-gray-700 min-w-[56px] text-xs whitespace-nowrap">
                                        {emp.display}
                                    </th>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {dates.map(({day, dow, isWeekend}) => {
                                const mm = String(month).padStart(2,"0");
                                const dd = String(day).padStart(2,"0");
                                const dateStr = `${year}/${mm}/${dd}`;
                                const isToday = dateStr === todayStr;
                                const rowBg = isToday ? "bg-yellow-50" : isWeekend ? "bg-blue-50/40" : "";
                                const duty = duties[dateStr];
                                const dutyKey = `duty|${dateStr}`;
                                const isDutySaving = saving[dutyKey];

                                // Check if duty person is also on leave
                                const dutyOnLeave = duty && leaves[`${duty.empName}|${dateStr}`];

                                return (
                                    <tr key={day} className={rowBg}>
                                        <td className={`sticky-left p-2 text-center font-medium whitespace-nowrap ${isToday ? "bg-yellow-50" : isWeekend ? "bg-blue-50" : "bg-white"} ${isWeekend ? "text-red-500" : "text-gray-700"}`}>
                                            <span className="text-sm">{day}</span>
                                            <span className="text-xs ml-1 text-gray-400">({dow})</span>
                                        </td>
                                        <td
                                            onClick={() => handleDutyClick(dateStr)}
                                            className={`p-0 text-center cursor-pointer hover:opacity-80 transition-opacity select-none ${isDutySaving ? "opacity-50" : ""}`}
                                            style={{minWidth:"56px", height:"32px", backgroundColor: duty ? "#3b82f6" : "#f1f5f9"}}>
                                            {isDutySaving ? (
                                                <span className="cell-spin inline-block w-4 h-4 border-2 border-gray-300 border-t-blue-500 rounded-full"></span>
                                            ) : duty ? (
                                                <span className="inline-block w-full leading-[32px] text-xs font-bold" style={{color: dutyOnLeave ? "#fca5a5" : "white"}}>
                                                    {dutyOnLeave && "⚠️"}
                                                    {duty.empName.slice(0, 3)}
                                                </span>
                                            ) : null}
                                        </td>
                                        {employees.map(emp => {
                                            const key = `${emp.name}|${dateStr}`;
                                            const leave = leaves[key];
                                            const isSaving = saving[key];
                                            return (
                                                <td key={key}
                                                    onClick={() => handleClick(emp.name, dateStr)}
                                                    className={`p-0 text-center cursor-pointer hover:bg-gray-100 transition-colors select-none ${isSaving ? "opacity-50" : ""}`}
                                                    style={{minWidth:"56px", height:"32px"}}>
                                                    {isSaving ? (
                                                        <span className="cell-spin inline-block w-4 h-4 border-2 border-gray-300 border-t-blue-500 rounded-full"></span>
                                                    ) : leave ? (
                                                        <span className={`inline-block w-full leading-[32px] text-xs font-bold text-white ${leave.type === "排休" ? "bg-green-500" : "bg-red-500"}`}>
                                                            {leave.type === "排休" ? "休" : "假"}
                                                        </span>
                                                    ) : null}
                                                </td>
                                            );
                                        })}
                                    </tr>
                                );
                            })}
                        </tbody>
                        <tfoot>
                            <tr className="bg-gray-50 font-medium">
                                <td className="sticky-left bg-gray-50 p-2 text-center text-xs text-gray-500">合計</td>
                                <td className="p-1 text-center text-xs text-gray-400">
                                    {Object.keys(duties).length > 0 ? <span className="text-blue-500">{Object.keys(duties).length}日</span> : <span className="text-gray-300">-</span>}
                                </td>
                                {employees.map(emp => {
                                    const s = getStats(emp.name);
                                    return (
                                        <td key={emp.name} className="p-1 text-center text-xs">
                                            {s.paixiu > 0 && <span className="text-green-600">{s.paixiu}休</span>}
                                            {s.paixiu > 0 && s.qingjia > 0 && " "}
                                            {s.qingjia > 0 && <span className="text-red-600">{s.qingjia}假</span>}
                                            {s.paixiu === 0 && s.qingjia === 0 && <span className="text-gray-300">-</span>}
                                        </td>
                                    );
                                })}
                            </tr>
                        </tfoot>
                    </table>
                </div>
            )}

            {toast && (
                <div className={`fixed bottom-6 right-6 px-5 py-3 rounded-lg shadow-lg text-white font-medium z-50 ${toast.ok ? "bg-gray-800" : "bg-red-500"}`}>
                    {toast.msg}
                </div>
            )}
        </div>
    );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
