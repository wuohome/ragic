    * { box-sizing: border-box; }
    body { font-family: "Microsoft JhengHei","Noto Sans TC",sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
    .sched-table { border-collapse: separate; border-spacing: 0; }
    .sched-table thead th { position: sticky; top: 0; z-index: 20; }
    .sched-table td.col-date,
    .sched-table th.col-date { position: sticky; left: 0; z-index: 10; }
    .sched-table thead th.col-date { z-index: 30; }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-cell {
      min-height: 72px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      background: #fff;
      padding: 4px 6px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .cal-cell.today { border-color: #f59e0b; background: #fffbeb; }
    .cal-cell.weekend { background: #eff6ff; }
    .cal-cell.clickable { cursor: pointer; transition: box-shadow 0.12s, border-color 0.12s; }
    .cal-cell.clickable:hover { box-shadow: 0 2px 10px rgba(139,92,246,0.25); border-color: #a78bfa; }
    .cal-cell.saving { opacity: 0.7; pointer-events: none; }
    @keyframes toastIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; } }
    .toast-in  { animation: toastIn 0.22s ease; }
    .toast-out { animation: toastOut 0.3s ease forwards; }
    @media (max-width: 480px) {
      .cal-cell { min-height: 56px; padding: 2px 4px; }
    }
  </style>
</head>

<div id="root"></div>
<script type="text/babel">

/* ── Constants ─────────────────────────────────────────────── */
const API_KEY   = 'VEZsOEwzYzVJdWdoWXRDM3ptS2YwRytLV21BaWhPTDRLWXhPb2FLZ3VBUm1BZE90VzJtZzlTNjVlbCszRnZkRw==';
const BASE_URL  = 'https://ap15.ragic.com';
const API_P     = `api=true&v=3&naming=EID&APIKey=${API_KEY}`;
const EMP_FORM  = '/wuohome/ragicforms4/20004';
const LEAVE_FORM= '/wuohome/ragicforms4/2';
const DUTY_FORM = '/wuohome/ragicforms4/3';

// Employee fields
const F_NAME    = '3000933';
const F_DEPT    = '3000937';
const F_STATUS  = '3000945';
const F_HIRE    = '3000955';
// Leave fields
const F_L_EMP   = '1000961';
const F_L_DATE  = '1000963';
const F_L_YEAR  = '1000964';
const F_L_MONTH = '1000965';
const F_L_TYPE  = '1002025';
// Duty fields
const F_D_DATE  = '1000971';
const F_D_EMP   = '1000972';
const F_D_YEAR  = '1000973';
const F_D_MONTH = '1000974';
const F_D_NO    = '1000975';
const F_D_CHANGE= '1000976';

const DAYS_TW = ['日','一','二','三','四','五','六'];

// 見紅休 applies to these names
const JIAN_HONG_NAMES = new Set(['張瓊安','沈郁雯','呂鴻墀']);
// 2026 public holidays
const PUBLIC_HOLIDAYS_2026 = new Set([
  '2026/01/01','2026/02/16','2026/02/17','2026/02/18','2026/02/19','2026/02/20',
  '2026/02/27','2026/04/03','2026/04/06','2026/05/01','2026/06/19',
  '2026/09/25','2026/09/28','2026/10/09','2026/10/26','2026/12/25',
]);

// Department display overrides
const DEPT_DISPLAY = { '韓珊珊':'管理部/秘書', '張瓊安':'管理部/特助' };

// Department header colors
const DEPT_COLORS = {
  '管理部/秘書': { bg:'#ede9fe', border:'#c4b5fd', text:'#5b21b6', header:'#8b5cf6' },
  '管理部/特助': { bg:'#ede9fe', border:'#c4b5fd', text:'#5b21b6', header:'#8b5cf6' },
  '設計部':      { bg:'#d1fae5', border:'#6ee7b7', text:'#065f46', header:'#10b981' },
  '租賃部':      { bg:'#ffedd5', border:'#fdba74', text:'#9a3412', header:'#f97316' },
};
function getDeptColor(dept) {
  return DEPT_COLORS[dept] || { bg:'#f1f5f9', border:'#cbd5e1', text:'#475569', header:'#64748b' };
}

// Status display config
const STATUS_CONFIG = {
  '排休': { bg:'#16a34a', text:'#fff', label:'休' },
  '請假': { bg:'#dc2626', text:'#fff', label:'假' },
  '值班': { bg:'#f97316', text:'#fff', label:'班' },
  '值日': { bg:'#3b82f6', text:'#fff', label:'值' },
  '1F':   { bg:'#3b82f6', text:'#fff', label:'1F' },
  '2F':   { bg:'#8b5cf6', text:'#fff', label:'2F' },
  '3F':   { bg:'#0891b2', text:'#fff', label:'3F' },
  '見紅休':{ bg:'#9ca3af', text:'#fff', label:'休' },
};

// Returns true if today is in the open editing period (20th–31st)
function isOpenPeriod() { return new Date().getDate() >= 20; }

// Compute the display month: during open period, show next month
function getInitialMonth() {
  const now = new Date();
  let y = now.getFullYear(), m = now.getMonth() + 1;
  if (isOpenPeriod()) { m++; if (m > 12) { m = 1; y++; } }
  return { y, m };
}

/* ── Helpers ────────────────────────────────────────────────── */
function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
function getDOW(y, m, d)   { return new Date(y, m-1, d).getDay(); }
function fmtDate(y, m, d)  {
  return y + '/' + String(m).padStart(2,'0') + '/' + String(d).padStart(2,'0');
}
function isRedHoliday(y, m, d) {
  const dow = getDOW(y, m, d);
  if (dow === 0 || dow === 6) return true;
  return PUBLIC_HOLIDAYS_2026.has(fmtDate(y, m, d));
}

// Ordering: 韓珊珊=0, 張瓊安=1, 設計部=2, else=3
function getOrder(emp) {
  if (emp.name === '韓珊珊') return 0;
  if (emp.name === '張瓊安') return 1;
  if (emp.rawDept === '設計部' || emp.dept === '設計部') return 2;
  return 3;
}

/* ── API ────────────────────────────────────────────────────── */
async function loadEmployees() {
  const res = await fetch(BASE_URL + EMP_FORM + '?' + API_P);
  if (!res.ok) throw new Error('員工資料載入失敗 (' + res.status + ')');
  const data = await res.json();
  const raw = Object.entries(data)
    .filter(([, r]) => r && typeof r === 'object' && r[F_NAME])
    .filter(([, r]) => {
      const name = r[F_NAME];
      const dept = r[F_DEPT];
      const status = r[F_STATUS];
      const hire = r[F_HIRE];
      if (status !== '在職') return false;
      if (dept === '經營階層') return false;
      if (hire === '承攬') return true;
      if (name === '韓珊珊') return true;
      if (dept === '設計部') return true;
      if (name === '張瓊安') return true;
      return false;
    })
    .map(([rid, r]) => {
      const name = r[F_NAME];
      const rawDept = r[F_DEPT];
      const dept = DEPT_DISPLAY[name] || rawDept;
      return { id: rid, name, dept, rawDept };
    });
  raw.sort((a, b) => getOrder(a) - getOrder(b));
  return raw;
}

async function loadLeaves(year, month) {
  const url = BASE_URL + LEAVE_FORM + '?' + API_P
    + '&where=' + F_L_YEAR + ',eq,' + year
    + '&and=' + F_L_MONTH + ',eq,' + month;
  const res = await fetch(url);
  if (!res.ok) throw new Error('排班資料載入失敗 (' + res.status + ')');
  const data = await res.json();
  // map: empName__date -> array of records (support multiple per cell)
  const map = {};
  for (const [rid, r] of Object.entries(data)) {
    if (!r || typeof r !== 'object' || !r[F_L_DATE]) continue;
    const key = r[F_L_EMP] + '__' + r[F_L_DATE];
    if (!map[key]) map[key] = [];
    map[key].push({ ragicId: rid, type: r[F_L_TYPE], empName: r[F_L_EMP], date: r[F_L_DATE] });
  }
  return map;
}

async function loadDuties(year, month) {
  const url = BASE_URL + DUTY_FORM + '?' + API_P
    + '&where=' + F_D_YEAR + ',eq,' + year
    + '&and=' + F_D_MONTH + ',eq,' + month;
  const res = await fetch(url);
  if (!res.ok) throw new Error('值日資料載入失敗 (' + res.status + ')');
  const data = await res.json();
  const map = {};
  for (const [rid, r] of Object.entries(data)) {
    if (!r || typeof r !== 'object' || !r[F_D_DATE]) continue;
    const empName = r[F_D_EMP];
    const date    = r[F_D_DATE];
    const key = empName + '__' + date;
    const note = r[F_D_CHANGE] || '';
    const floor = /^(1F|2F|3F)$/.test(note) ? note : '';
    map[key] = { ragicId: rid, empName, date, floor };
  }
  return map;
}

/* ── Write API helpers ──────────────────────────────────────── */
async function apiCreateLeave(empName, date, year, month, type) {
  const url = `${BASE_URL}${LEAVE_FORM}?${API_P}`;
  const body = new URLSearchParams({
    [F_L_EMP]:   empName,
    [F_L_DATE]:  date,
    [F_L_YEAR]:  String(year),
    [F_L_MONTH]: String(month),
    [F_L_TYPE]:  type,
  }).toString();
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body,
  });
  if (!res.ok) throw new Error('建立失敗 (' + res.status + ')');
  const data = await res.json();
  return data.ragicId || data._ragicId || Object.keys(data)[0];
}

async function apiDeleteLeave(ragicId) {
  const url = `${BASE_URL}${LEAVE_FORM}/${ragicId}?${API_P}`;
  const res = await fetch(url, { method: 'DELETE' });
  if (!res.ok) throw new Error('刪除失敗 (' + res.status + ')');
}

async function apiUpdateLeaveType(ragicId, newType) {

async function apiCreateDuty(empName, date, year, month) {
  const url = `${BASE_URL}${DUTY_FORM}?${API_P}`;
  const body = new URLSearchParams({
    [F_D_DATE]:   date,
    [F_D_EMP]:    empName,
    [F_D_YEAR]:   String(year),
    [F_D_MONTH]:  String(month),

  if (!res.ok) throw new Error('建立值日失敗 (' + res.status + ')');
  const data = await res.json();
  return data.ragicId || data._ragicId || Object.keys(data)[0];
}

async function apiDeleteDuty(ragicId) {
  const url = `${BASE_URL}${DUTY_FORM}/${ragicId}?${API_P}`;
  const res = await fetch(url, { method: 'DELETE' });
  if (!res.ok) throw new Error('刪除值日失敗 (' + res.status + ')');
}

/* ── Shared logic: get statuses for a cell ─────────────────── */
function getCellStatuses(emp, y, m, d, leaves, duties) {
  const date = fmtDate(y, m, d);
  const result = [];
  // 值日（有樓層顯示樓層，無樓層顯示「值」）
  const dutyRec = duties[emp.name + '__' + date];
  if (dutyRec) result.push(dutyRec.floor || '值日');
  // Leave types from leave records
  const recs = leaves[emp.name + '__' + date] || [];
  for (const r of recs) {
    if (r.type && !result.includes(r.type)) result.push(r.type);
  }
  // 見紅休: only if no other status AND employee qualifies
  if (result.length === 0 && JIAN_HONG_NAMES.has(emp.name) && isRedHoliday(y, m, d)) {
    result.push('見紅休');
  }
  return result;
}

/* ── Toast notification ─────────────────────────────────────── */
function Toast({ toasts }) {
  return (
    <div style={{
      position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)',
      zIndex: 9999, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8,
      pointerEvents: 'none',
    }}>
      {toasts.map(t => (
        <div key={t.id} className={t.leaving ? 'toast-out' : 'toast-in'} style={{
          background: t.type === 'error' ? '#dc2626' : '#16a34a',
          color: '#fff', borderRadius: 8, padding: '9px 22px',
          fontSize: 14, fontWeight: 700,
          boxShadow: '0 4px 20px rgba(0,0,0,0.22)',
          whiteSpace: 'nowrap',
        }}>{t.msg}</div>
      ))}
    </div>
  );
}

function useToast() {
  const [toasts, setToasts] = React.useState([]);
  const show = React.useCallback((msg, type = 'success') => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, msg, type, leaving: false }]);
    setTimeout(() => {
      setToasts(prev => prev.map(t => t.id === id ? { ...t, leaving: true } : t));
      setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 320);
    }, 2000);
  }, []);
  return { toasts, show };
}

/* ── Personal Calendar View ─────────────────────────────────── */
function PersonalView({ emp, onBack }) {
  const today = new Date();
  const open = isOpenPeriod();
  const initDate = getInitialMonth();
  const [year,        setYear]        = React.useState(initDate.y);
  const [month,       setMonth]       = React.useState(initDate.m);
  const [leaves,      setLeaves]      = React.useState({});
  const [duties,      setDuties]      = React.useState({});
  const [loading,     setLoading]     = React.useState(true);
  const [err,         setErr]         = React.useState(null);
  const [savingCells, setSavingCells] = React.useState({}); // key -> true

  const { toasts, show: showToast } = useToast();

  React.useEffect(() => {
    setLoading(true);
    setErr(null);
    Promise.all([loadLeaves(year, month), loadDuties(year, month)])
      .then(([lv, du]) => { setLeaves(lv); setDuties(du); setLoading(false); })
      .catch(e => { setErr(e.message); setLoading(false); });
  }, [year, month]);

  const prevMonth = () => { if (month===1){setYear(y=>y-1);setMonth(12);}else setMonth(m=>m-1); };
  const nextMonth = () => { if (month===12){setYear(y=>y+1);setMonth(1);}else setMonth(m=>m+1); };

  const navBtn = {
    padding: '5px 14px', background: 'rgba(255,255,255,0.15)', color: '#fff',
    border: 'none', borderRadius: 5, cursor: 'pointer', fontSize: 13, fontWeight: 700,
  };

  // ── Actual cell toggle (called after unlock confirmed) ──────
  const doToggleCell = async (d) => {
    const date = fmtDate(year, month, d);
    const cellKey = emp.name + '__' + date;
    const existingRecs = leaves[cellKey] || [];
    const existingForMode = existingRecs.find(r => r.type === '排休');

    setSavingCells(prev => ({ ...prev, [cellKey]: true }));
    try {
      if (existingForMode) {
        await apiDeleteLeave(existingForMode.ragicId);
        setLeaves(prev => {
          const next = { ...prev };
          const filtered = (next[cellKey] || []).filter(r => r.ragicId !== existingForMode.ragicId);
          if (filtered.length === 0) delete next[cellKey];
          else next[cellKey] = filtered;
          return next;
        });
        showToast(`已移除 ${month}/${d} 排休`);
      } else {
        const ragicId = await apiCreateLeave(emp.name, date, year, month, '排休');
        const newRec = { ragicId: String(ragicId), type: '排休', empName: emp.name, date };
        setLeaves(prev => ({
          ...prev,
          [cellKey]: [...(prev[cellKey] || []), newRec],
        }));
        showToast(`已新增 ${month}/${d} 排休`);
      }
    } catch (e) {
      showToast(e.message, 'error');
    } finally {
      setSavingCells(prev => { const n = { ...prev }; delete n[cellKey]; return n; });
    }
  };

  // ── Cell click handler ──────────────────────────────────────
  const handleCellClick = (d) => {
    if (!open) {
      showToast('每月 20 號後開放排班', 'error');
      return;
    }
    doToggleCell(d);
  };

  // Can this cell be edited?
  function isCellEditable(d) {
    if (!open) return false;
    if (JIAN_HONG_NAMES.has(emp.name) && isRedHoliday(year, month, d)) return false;
    return true;
  }

  function renderCalendar() {
    const totalDays = daysInMonth(year, month);
    const firstDOW  = getDOW(year, month, 1);
    const dc = getDeptColor(emp.dept);

    const cells = [];
    for (let i = 0; i < firstDOW; i++) cells.push({ blank: true, key: 'b' + i });
    for (let d = 1; d <= totalDays; d++) {
      const dow       = getDOW(year, month, d);
      const isToday   = today.getFullYear()===year && today.getMonth()+1===month && today.getDate()===d;
      const isWeekend = dow===0||dow===6;
      const statuses  = getCellStatuses(emp, year, month, d, leaves, duties);
      cells.push({ blank: false, key: 'd'+d, d, dow, isToday, isWeekend, statuses });
    }

    return (
      <div style={{ flex: 1, minWidth: 0 }}>
        {/* Name/dept tag */}
        <div style={{
          textAlign: 'center', marginBottom: 10, padding: '6px 0',
          background: dc.bg, border: '1px solid ' + dc.border,
          borderRadius: 8, fontSize: 14, fontWeight: 800, color: dc.text,
        }}>
          {emp.name}{' '}
          <span style={{ fontWeight: 400, fontSize: 12 }}>({emp.dept})</span>
        </div>

        {/* Weekday header */}
        <div className="cal-grid" style={{ marginBottom: 4 }}>
          {DAYS_TW.map((d, i) => (
            <div key={d} style={{
              textAlign: 'center', fontSize: 12, fontWeight: 700, padding: '4px 0',
              color: i===0 ? '#dc2626' : i===6 ? '#3b82f6' : '#64748b',
            }}>{d}</div>
          ))}
        </div>

        {/* Day cells */}
        <div className="cal-grid">
          {cells.map(cell => {
            if (cell.blank) return <div key={cell.key} style={{ minHeight: 72 }}></div>;
            const date = fmtDate(year, month, cell.d);
            const cellKey = emp.name + '__' + date;
            const isSaving = !!savingCells[cellKey];
            const canEdit = isCellEditable(cell.d);
            let extraClass = '';
            if (cell.isToday) extraClass = ' today';
            else if (cell.isWeekend) extraClass = ' weekend';
            if (canEdit) extraClass += ' clickable';
            if (isSaving) extraClass += ' saving';

            return (
              <div
                key={cell.key}
                className={'cal-cell' + extraClass}
                onClick={canEdit && !isSaving ? () => handleCellClick(cell.d) : undefined}
                title={canEdit ? '點擊切換排休' : undefined}
              >
                <span style={{
                  fontSize: 12, fontWeight: cell.isToday ? 800 : 500,
                  color: cell.isToday ? '#d97706'
                       : cell.dow===0 ? '#dc2626'
                       : cell.dow===6 ? '#3b82f6'
                       : '#475569',
                }}>{cell.d}</span>
                {isSaving ? (
                  <div style={{ marginTop: 4 }}><Spinner small /></div>
                ) : (
                  <div style={{ marginTop: 2, display: 'flex', flexWrap: 'wrap', gap: 1 }}>
                    {cell.statuses.map(s => <StatusBadge key={s} type={s}/>)}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: '100vh', background: '#f8fafc',
      fontFamily: '"Microsoft JhengHei","Noto Sans TC",sans-serif' }}>

      <header style={{
        background: '#3f5262', color: '#fff', padding: '10px 16px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        boxShadow: '0 2px 8px rgba(0,0,0,0.25)', position: 'sticky', top: 0, zIndex: 40,
        flexWrap: 'wrap', gap: 8,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <button onClick={onBack} style={navBtn}>← 返回</button>
          <span style={{ fontSize: 15, fontWeight: 800 }}>
            {emp.name} 的排班
            {!open && (
              <span style={{
                background: '#dc2626', color: '#fff',
                borderRadius: 6, padding: '2px 8px', fontSize: 11, fontWeight: 800,
                marginLeft: 8, verticalAlign: 'middle',
              }}>🔒 鎖定中</span>
            )}
          </span>
          {loading && <Spinner/>}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <button style={navBtn} onClick={prevMonth}>‹ 上月</button>
          <span style={{ minWidth: 104, textAlign: 'center', fontWeight: 700, fontSize: 14 }}>
            {year} 年 {month} 月
          </span>
          <button style={navBtn} onClick={nextMonth}>下月 ›</button>
        </div>
      </header>

      {/* Status hint bar */}
      <div style={{
        background: open ? '#f0fdf4' : '#fef2f2',
        borderBottom: '1px solid ' + (open ? '#bbf7d0' : '#fecaca'),
        padding: '7px 16px', fontSize: 12,
        color: open ? '#15803d' : '#dc2626',
        display: 'flex', alignItems: 'center', gap: 6,
      }}>
        {open
          ? <><span>開放排班期間（每月 20–31 日）</span><span>· 點擊日期格子可新增／移除</span><StatusBadge type="排休"/></>
          : <span>排班鎖定中（每月 1–19 日）· 每月 20 號後開放排班</span>
        }
        <span style={{ color: '#64748b', marginLeft: 4 }}>灰色格（見紅休）無法編輯</span>
      </div>

      {/* Legend bar */}
      <div style={{
        background: '#fff', borderBottom: '1px solid #e2e8f0',
        padding: '8px 16px', display: 'flex', flexWrap: 'wrap', gap: 14, fontSize: 12,
      }}>
        {Object.entries(STATUS_CONFIG).map(([type, cfg]) => (
          <span key={type} style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            <span style={{ width: 13, height: 13, borderRadius: 3, background: cfg.bg, display: 'inline-block' }}></span>
            <span style={{ color: '#475569' }}>{type}</span>
          </span>
        ))}
      </div>

      <div style={{ padding: '16px', maxWidth: 960, margin: '0 auto' }}>
        {err ? (
          <div style={{ textAlign: 'center', color: '#dc2626', padding: '40px 0', fontSize: 14 }}>
            ⚠️ {err}
          </div>
        ) : (
          <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap' }}>
            {renderCalendar()}
          </div>
        )}
      </div>

      <div style={{ textAlign: 'center', fontSize: 11, color: '#94a3b8', padding: '12px 0 28px' }}>
        可編輯排休 · 其他狀態請聯絡管理員 · 資料來源：Ragic
      </div>

      <Toast toasts={toasts}/>
    </div>
  );
}

/* ── Team View (whiteboard, read-only) ──────────────────────── */
function TeamView({ emps, onBack }) {
  const today = new Date();
  const [year,    setYear]    = React.useState(today.getFullYear());
  const [month,   setMonth]   = React.useState(today.getMonth() + 1);
  const [leaves,  setLeaves]  = React.useState({});
  const [duties,  setDuties]  = React.useState({});
  const [loading, setLoading] = React.useState(true);
  const [err,     setErr]     = React.useState(null);

  React.useEffect(() => {
    setLoading(true);
    setErr(null);
    Promise.all([loadLeaves(year, month), loadDuties(year, month)])
      .then(([lv, du]) => { setLeaves(lv); setDuties(du); setLoading(false); })
      .catch(e => { setErr(e.message); setLoading(false); });
  }, [year, month]);

  const prevMonth = () => { if (month===1){setYear(y=>y-1);setMonth(12);}else setMonth(m=>m-1); };
  const nextMonth = () => { if (month===12){setYear(y=>y+1);setMonth(1);}else setMonth(m=>m+1); };

  // Group emps by dept (already ordered)
  const deptGroups = React.useMemo(() => {
    const m = {};
    for (const e of emps) {
      if (!m[e.dept]) m[e.dept] = [];
      m[e.dept].push(e);
    }
    return m;
  }, [emps]);
  const depts = Object.keys(deptGroups);

  // Footer summary counts
  const summary = React.useMemo(() => {
    const s = {};
    for (const e of emps) {
      s[e.name] = { '排休':0, '請假':0, '值班':0, '值日':0, '見紅休':0 };
    }
    // Count leaves
    for (const recs of Object.values(leaves)) {
      for (const r of recs) {
        if (s[r.empName] && r.type) {
          s[r.empName][r.type] = (s[r.empName][r.type] || 0) + 1;
        }
      }
    }
    // Count duties
    for (const key of Object.keys(duties)) {
      const empName = key.split('__')[0];
      if (s[empName]) s[empName]['值日'] = (s[empName]['值日'] || 0) + 1;
    }
    // Count 見紅休 days for qualified employees
    const totalDays = daysInMonth(year, month);
    for (const e of emps) {
      if (!JIAN_HONG_NAMES.has(e.name)) continue;
      let cnt = 0;
      for (let d = 1; d <= totalDays; d++) {
        if (isRedHoliday(year, month, d)) cnt++;
      }
      s[e.name]['見紅休'] = cnt;
    }
    return s;
  }, [leaves, duties, emps, year, month]);

  const navBtn = {
    padding: '4px 14px', background: 'rgba(255,255,255,0.15)', color: '#fff',
    border: 'none', borderRadius: 5, cursor: 'pointer', fontSize: 13, fontWeight: 700,
  };

  if (err) return (
    <div style={{
      minHeight: '100vh', background: '#f8fafc',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      flexDirection: 'column', gap: 16, color: '#dc2626',
      fontFamily: '"Microsoft JhengHei",sans-serif',
    }}>
      <div style={{ fontSize: 40 }}>⚠️</div>
      <div style={{ fontSize: 15 }}>{err}</div>
      <button onClick={() => window.location.reload()} style={{
        padding: '8px 24px', background: '#3f5262', color: '#fff',
        border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 14,
      }}>重新載入</button>
    </div>
  );

  const totalDays = daysInMonth(year, month);

  return (
    <div style={{ minHeight: '100vh', background: '#f8fafc',
      fontFamily: '"Microsoft JhengHei","Noto Sans TC",sans-serif' }}>

      <header style={{
        background: '#3f5262', color: '#fff', padding: '10px 16px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        boxShadow: '0 2px 8px rgba(0,0,0,0.3)', position: 'sticky', top: 0, zIndex: 40,
        flexWrap: 'wrap', gap: 8,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <button onClick={onBack} style={navBtn}>← 返回</button>
          <span style={{ fontSize: 16, fontWeight: 800, letterSpacing: 1 }}>👥 全體排班</span>
          {loading && <Spinner/>}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <button style={navBtn} onClick={prevMonth}>‹ 上月</button>
          <span style={{ minWidth: 104, textAlign: 'center', fontWeight: 700, fontSize: 14 }}>
            {year} 年 {month} 月
          </span>
          <button style={navBtn} onClick={nextMonth}>下月 ›</button>
        </div>
        {/* Legend */}
        <div style={{ display: 'flex', gap: 10, fontSize: 11, color: 'rgba(255,255,255,0.8)', flexWrap: 'wrap' }}>
          {Object.entries(STATUS_CONFIG).map(([type, cfg]) => (
            <span key={type} style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
              <span style={{
                width: 11, height: 11, borderRadius: 2, background: cfg.bg, display: 'inline-block',
              }}></span>
              {type}
            </span>
          ))}
        </div>
      </header>

      <div style={{ overflowX: 'auto', padding: '8px 4px' }}>
        {!loading && emps.length === 0 ? (
          <div style={{ textAlign: 'center', color: '#9ca3af', padding: '80px 0', fontSize: 16 }}>
            無員工資料
          </div>
        ) : (
          <table className="sched-table"
            style={{ tableLayout: 'fixed', width: '100%', fontSize: 12 }}>
            <thead>
              {/* Department header row */}
              <tr style={{ background: '#f1f5f9', borderBottom: '1px solid #cbd5e1' }}>
                <th className="col-date" style={{
                  minWidth: 76, padding: '4px 8px', borderRight: '1px solid #cbd5e1',
                  background: '#f1f5f9', textAlign: 'left', fontSize: 11, color: '#64748b', fontWeight: 700,
                }}></th>
                {depts.map(dept => {
                  const dc = getDeptColor(dept);
                  return (
                    <th key={dept} colSpan={deptGroups[dept].length} style={{
                      padding: '4px 8px', borderRight: '1px solid #cbd5e1', textAlign: 'center',
                      fontSize: 11, fontWeight: 800,
                      background: dc.bg, color: dc.text,
                      borderTop: '2px solid ' + dc.border,
                    }}>{dept}</th>
                  );
                })}
              </tr>
              {/* Name row */}
              <tr style={{ background: '#f1f5f9', borderBottom: '2px solid #94a3b8' }}>
                <th className="col-date" style={{
                  minWidth: 76, padding: '6px 8px', borderRight: '1px solid #cbd5e1',
                  background: '#f1f5f9', textAlign: 'left', fontSize: 11, color: '#64748b', fontWeight: 700,
                }}>日期</th>
                {emps.map(emp => {
                  const dc = getDeptColor(emp.dept);
                  return (
                    <th key={emp.name} style={{
                      minWidth: 48, padding: '6px 6px',
                      borderRight: '1px solid #e2e8f0', textAlign: 'center',
                      fontWeight: 700, fontSize: 12,
                      background: dc.bg, color: dc.text,
                    }}>{emp.name}</th>
                  );
                })}
              </tr>
            </thead>

            <tbody>
              {Array.from({ length: totalDays }, (_, i) => i+1).map(day => {
                const dow       = getDOW(year, month, day);
                const isWeekend = dow===0||dow===6;
                const isToday   = today.getFullYear()===year &&
                                  today.getMonth()+1===month &&
                                  today.getDate()===day;
                const rowBg   = isToday ? '#fffbeb' : isWeekend ? '#eff6ff' : '#ffffff';
                const dtColor = isToday ? '#dd6650' : isWeekend ? '#3b82f6' : '#475569';

                return (
                  <tr key={day} style={{ background: rowBg, borderBottom: '1px solid #f1f5f9' }}>
                    <td className="col-date" style={{
                      padding: '2px 8px', borderRight: '1px solid #e2e8f0',
                      background: rowBg, fontSize: 12, fontWeight: isToday ? 800 : 500,
                      color: dtColor, whiteSpace: 'nowrap',
                    }}>
                      {month}/{day}{' '}
                      <span style={{ color: '#94a3b8', fontSize: 11 }}>({DAYS_TW[dow]})</span>
                    </td>
                    {emps.map(emp => {
                      const statuses = getCellStatuses(emp, year, month, day, leaves, duties);
                      return (
                        <td key={emp.name} style={{
                          borderRight: '1px solid #f1f5f9',
                          padding: '2px 1px', textAlign: 'center', verticalAlign: 'middle',
                        }}>
                          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 1 }}>
                            {statuses.map(s => {
                              const cfg = STATUS_CONFIG[s];
                              if (!cfg) return null;
                              return (
                                <span key={s} style={{
                                  display: 'inline-block',
                                  background: cfg.bg, color: cfg.text,
                                  borderRadius: 4, padding: '1px 4px',
                                  fontSize: 11, fontWeight: 700, minWidth: 22,
                                }}>{cfg.label}</span>
                              );
                            })}
                          </div>
                        </td>
                      );
                    })}
                  </tr>
                );
              })}
            </tbody>

            <tfoot>
              <tr style={{ background: '#f1f5f9', borderTop: '2px solid #94a3b8' }}>
                <td className="col-date" style={{
                  padding: '6px 8px', borderRight: '1px solid #cbd5e1',
                  background: '#f1f5f9', fontSize: 12, fontWeight: 700, color: '#475569',
                }}>小計</td>
                {emps.map(emp => {
                  const s = summary[emp.name] || {};
                  const items = Object.entries(STATUS_CONFIG)
                    .map(([type, cfg]) => ({ type, cfg, cnt: s[type] || 0 }))
                    .filter(x => x.cnt > 0);
                  return (
                    <td key={emp.name} style={{
                      padding: '4px 4px', borderRight: '1px solid #e2e8f0', textAlign: 'center',
                    }}>
                      {items.length === 0
                        ? <span style={{ fontSize: 11, color: '#cbd5e1' }}>—</span>
                        : items.map(({ type, cfg, cnt }) => (
                          <div key={type} style={{
                            fontSize: 11, fontWeight: 700, color: cfg.bg, lineHeight: 1.5,
                          }}>{cfg.label}{cnt}</div>
                        ))
                      }
                    </td>
                  );
                })}
              </tr>
            </tfoot>
          </table>
        )}
      </div>

      <div style={{ textAlign: 'center', fontSize: 11, color: '#94a3b8', padding: '14px 0 28px' }}>
        唯讀模式 · 僅供查閱，不可編輯 · 資料來源：Ragic
      </div>
    </div>
  );
}

/* ── Root App ───────────────────────────────────────────────── */
function App() {
  // Screens: 'entry' | 'name-select' | 'personal' | 'team'
  const [mode,        setMode]        = React.useState('entry');
  const [emps,        setEmps]        = React.useState([]);
  const [selectedEmp, setSelectedEmp] = React.useState(null);
  const [empLoading,  setEmpLoading]  = React.useState(false);
  const [empErr,      setEmpErr]      = React.useState(null);

  // Load employees once, shared between both modes
  const ensureEmps = React.useCallback(() => {
    if (emps.length > 0) return Promise.resolve(emps);
    setEmpLoading(true);
    setEmpErr(null);
    return loadEmployees()
      .then(rows => { setEmps(rows); setEmpLoading(false); return rows; })
      .catch(e   => { setEmpErr(e.message); setEmpLoading(false); throw e; });
  }, [emps]);

  const goPersonal = () => { ensureEmps().then(() => setMode('name-select')).catch(() => {}); };
  const goTeam     = () => { ensureEmps().then(() => setMode('team')).catch(() => {}); };

  if (empLoading) return (
    <div style={{
      minHeight: '100vh', background: '#f8fafc',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      flexDirection: 'column', gap: 16,
      fontFamily: '"Microsoft JhengHei","Noto Sans TC",sans-serif',
    }}>
      <Spinner/>
      <div style={{ fontSize: 14, color: '#64748b' }}>載入員工資料中…</div>
    </div>
  );

  if (empErr) return (
    <div style={{
      minHeight: '100vh', background: '#f8fafc',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      flexDirection: 'column', gap: 16, color: '#dc2626',
      fontFamily: '"Microsoft JhengHei",sans-serif',
    }}>
      <div style={{ fontSize: 40 }}>⚠️</div>
      <div style={{ fontSize: 15, maxWidth: 360, textAlign: 'center' }}>{empErr}</div>
      <button onClick={() => { setEmpErr(null); setMode('entry'); }} style={{
        padding: '8px 24px', background: '#3f5262', color: '#fff',
        border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 14,
      }}>返回</button>
    </div>
  );

  if (mode === 'entry') {
    return <EntryScreen onPersonal={goPersonal} onTeam={goTeam}/>;
  }
  if (mode === 'name-select') {
    return (
      <NameSelect
        emps={emps}
        onSelect={(emp) => {
          setSelectedEmp(emp);
          setMode('personal');
        }}
        onBack={() => setMode('entry')}
      />
    );
  }
  if (mode === 'personal' && selectedEmp) {
    return (
      <PersonalView
        emp={selectedEmp}
        onBack={() => setMode('name-select')}
      />
    );
  }
  if (mode === 'team') {
    return (
      <div style={{ minHeight: '100vh', background: '#f8fafc', fontFamily: '"Microsoft JhengHei","Noto Sans TC",sans-serif' }}>
        <header style={{
          background: '#3f5262', color: '#fff', padding: '10px 16px',
          display: 'flex', alignItems: 'center', gap: 10,
          boxShadow: '0 2px 8px rgba(0,0,0,0.3)', position: 'sticky', top: 0, zIndex: 40,
        }}>
          <button onClick={() => setMode('entry')} style={{
            padding: '4px 14px', background: 'rgba(255,255,255,0.15)', color: '#fff',
            border: 'none', borderRadius: 5, cursor: 'pointer', fontSize: 13, fontWeight: 700,
          }}>← 返回</button>
          <span style={{ fontSize: 16, fontWeight: 800, letterSpacing: 1 }}>👥 全體排班</span>
        </header>
        <iframe src="schedule.html?readonly=1" style={{
          width: '100%', height: 'calc(100vh - 48px)', border: 'none',
        }}/>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
